<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Material Depot — Admin Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  :root{
    --navy:#1F3A5F;--navy2:#16294a;--blue:#2E6CA8;--yellow:#F4C20D;
    --ink:#1b2230;--muted:#67748a;--line:#dde3ec;--bg:#eef1f6;--card:#fff;
    --lighter:#eef3f9;--green:#1f7a3f;--greenbg:#e6f3ea;
    --red:#b3261e;--redbg:#fbeae8;--amber:#9a6200;--amberbg:#fdf2da;
    --purple:#5b3aa6;--purplebg:#efeaf8;
    --shadow:0 1px 2px rgba(20,40,80,.06),0 4px 14px rgba(20,40,80,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;min-height:100vh;}

  header{background:var(--navy);color:#fff;padding:0 20px;display:flex;align-items:center;gap:14px;height:56px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .logo{width:34px;height:34px;border-radius:8px;background:var(--yellow);color:var(--navy);font-weight:800;display:grid;place-items:center;font-size:15px;flex:0 0 auto;}
  .brand-text .t{font-size:10px;color:#9fb2cd;letter-spacing:1px;font-weight:700;}
  .brand-text .h{font-size:15px;font-weight:700;line-height:1.1;}
  .admin-badge{background:var(--yellow);color:var(--navy);font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.5px;}
  .hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
  .user-pill{font-size:13px;color:#cdd8e8;}
  .user-pill b{color:#fff;}
  .signout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#cdd8e8;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;}
  .signout-btn:hover{background:rgba(255,255,255,.2);}

  .layout{display:flex;min-height:calc(100vh - 56px);}

  .rail{width:210px;background:#fff;border-right:1px solid var(--line);padding:12px 8px;flex:0 0 auto;display:flex;flex-direction:column;}
  .rail-section{font-size:10px;letter-spacing:.8px;color:var(--muted);font-weight:800;margin:14px 10px 5px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;color:var(--ink);font-weight:600;font-size:13.5px;cursor:pointer;border:0;background:transparent;width:100%;text-align:left;}
  .nav-item .ico{width:18px;text-align:center;flex:0 0 auto;}
  .nav-item:hover{background:var(--lighter);}
  .nav-item.active{background:var(--navy);color:#fff;}
  .nav-badge{margin-left:auto;font-size:11px;background:var(--lighter);color:var(--navy);border-radius:20px;padding:1px 7px;font-weight:800;}
  .nav-item.active .nav-badge{background:rgba(255,255,255,.18);color:#fff;}

  main{flex:1;min-width:0;padding:22px 24px 60px;overflow:auto;}
  .page-head{margin-bottom:20px;}
  .page-head h1{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.4px;}
  .page-head p{color:var(--muted);font-size:13px;margin-top:3px;}

  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);}
  .stat-card .val{font-size:28px;font-weight:800;color:var(--navy);letter-spacing:-.5px;}
  .stat-card .lbl{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px;}
  .stat-card .bar{height:3px;border-radius:3px;margin-top:10px;background:var(--line);overflow:hidden;}
  .stat-card .bar-fill{height:100%;border-radius:3px;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
  .card-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .card-head h2{font-size:15px;font-weight:800;color:var(--navy);}

  .toolbar{display:flex;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;min-width:180px;}
  .search-wrap input{width:100%;padding:8px 10px 8px 30px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;color:var(--ink);}
  .search-wrap input:focus{outline:none;border-color:var(--blue);}
  .search-ico{position:absolute;left:9px;top:9px;color:var(--muted);font-size:13px;}

  table{width:100%;border-collapse:collapse;}
  thead th{background:#f7f9fc;text-align:left;font-size:10.5px;letter-spacing:.5px;color:var(--muted);font-weight:800;padding:10px 14px;border-bottom:1px solid var(--line);text-transform:uppercase;white-space:nowrap;}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:0;}
  tbody tr:hover td{background:#fafbfd;}

  .role-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:800;border-radius:20px;padding:4px 10px;white-space:nowrap;}
  .rb-admin{background:var(--purplebg);color:var(--purple);}
  .rb-service_mgr{background:#e3edf7;color:var(--navy);}
  .rb-site_auditor{background:#e4f0fb;color:var(--blue);}
  .rb-installer{background:var(--greenbg);color:var(--green);}
  .rb-auditor_installer{background:#e0f4f4;color:#0f6e74;}

  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:20px;padding:4px 10px;white-space:nowrap;}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex:0 0 auto;}
  .c-pending{background:#eef1f6;color:#5a6b86;}
  .c-scheduled{background:#e4f0fb;color:var(--blue);}
  .c-onway{background:var(--amberbg);color:var(--amber);}
  .c-atsite{background:#fff4d6;color:#7a5800;}
  .c-completed{background:var(--greenbg);color:var(--green);}
  .c-reschedule{background:var(--redbg);color:var(--red);}

  .btn-icon{background:transparent;border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:12px;cursor:pointer;color:var(--muted);font-weight:700;}
  .btn-icon:hover{border-color:var(--blue);color:var(--blue);}
  .btn-icon.del:hover{border-color:var(--red);color:var(--red);}
  .btn-primary{background:var(--navy);color:#fff;border:0;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary:hover{background:var(--navy2);}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;}
  .modal.wide{max-width:720px;max-height:88vh;overflow-y:auto;}
  .jd-head{display:flex;align-items:center;gap:12px;padding:20px 24px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2;}
  .jd-pi{font-size:15px;font-weight:800;color:var(--navy);flex:1;}
  .jd-info{padding:14px 24px;display:flex;flex-direction:column;gap:7px;border-bottom:1px solid var(--line);}
  .jd-row{display:flex;gap:10px;font-size:13px;align-items:flex-start;}
  .jd-label{color:var(--muted);font-weight:700;min-width:88px;flex-shrink:0;font-size:12px;}
  .jd-section{padding:14px 24px;border-bottom:1px solid var(--line);}
  .jd-sec-head{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
  .jc-room{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
  .jc-room-head{font-size:12px;font-weight:800;color:var(--navy);margin-bottom:6px;}
  .jc-kvs{display:flex;flex-wrap:wrap;gap:4px 16px;}
  .jc-kv{font-size:12px;line-height:1.4;}
  .jc-k{color:var(--muted);font-size:11px;}
  .jc-v{font-weight:700;}
  .jc-photos{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .jd-log{display:flex;flex-direction:column;gap:5px;}
  .jd-tl{font-size:12px;padding:4px 0;border-bottom:1px solid var(--line);}
  .jd-tl:last-child{border-bottom:none;}
  .jd-tl-t{font-weight:600;color:var(--ink);}
  .jd-tl-d{color:var(--muted);font-size:11px;margin-top:1px;}
  .jd-btns{padding:16px 24px 20px;display:flex;gap:10px;flex-wrap:wrap;}
  .btn-ghost{background:#f0f2f5;border:0;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink);}
  .btn-ghost:hover{background:#e0e4ea;}
  .modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;}
  .modal-head h3{font-size:16px;font-weight:800;color:var(--navy);}
  .modal-close{margin-left:auto;background:transparent;border:0;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px;}
  .modal-body{padding:20px;}
  .form-group{margin-bottom:14px;}
  .form-group label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
  .form-group input,.form-group select{width:100%;padding:10px 12px;border:2px solid var(--line);border-radius:9px;font-size:14px;color:var(--ink);background:#fff;}
  .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--blue);}
  .form-error{background:var(--redbg);color:var(--red);border-radius:8px;padding:9px 12px;font-size:12.5px;font-weight:600;margin-top:10px;display:none;}
  .form-error.show{display:block;}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;}
  .btn-cancel{background:#f0f2f5;border:0;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink);}

  .role-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
  .role-card{background:var(--card);border:2px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;text-align:center;transition:border-color .15s;}
  .role-card:hover{border-color:var(--blue);}
  .role-card.active{border-color:var(--navy);background:var(--navy);color:#fff;}
  .role-card .rc-ico{font-size:28px;margin-bottom:8px;}
  .role-card .rc-name{font-weight:800;font-size:14px;}
  .role-card .rc-desc{font-size:12px;color:var(--muted);margin-top:4px;}
  .role-card.active .rc-desc{color:#9fb2cd;}
  .iframe-wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;height:620px;}
  .iframe-wrap iframe{width:100%;height:100%;border:0;}

  .perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
  .perf-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow);}
  .perf-card .pc-head{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
  .pc-av{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;flex:0 0 auto;}
  .pc-name{font-weight:800;font-size:14px;}
  .pc-role{font-size:11.5px;color:var(--muted);}
  .perf-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .perf-row:last-child{border-bottom:0;}
  .pr-val{font-weight:800;color:var(--navy);}

  .user-av{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-weight:800;font-size:12px;color:#fff;flex:0 0 auto;}

  .empty{text-align:center;padding:48px 20px;color:var(--muted);}
  .empty .e-ico{font-size:36px;margin-bottom:10px;}
  .empty .e-msg{font-size:14px;font-weight:600;}

  .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(31,58,95,.15);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-row{text-align:center;padding:40px;color:var(--muted);}

  /* Analytics */
  .an-section{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:20px;}
  .an-section-head{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line);background:#f8f9fc;}
  .an-section-ico{font-size:24px;flex:0 0 auto;}
  .an-section-title{font-size:16px;font-weight:800;color:var(--navy);}
  .an-section-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .an-hero{margin-left:auto;text-align:right;flex:0 0 auto;}
  .an-hero-val{font-size:40px;font-weight:900;color:var(--navy);line-height:1;}
  .an-hero-label{font-size:11px;color:var(--muted);margin-top:2px;}
  .an-grid{display:grid;grid-template-columns:repeat(3,1fr);}
  .an-card{padding:16px 18px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:110px;}
  .an-card:nth-child(3n){border-right:none;}
  .an-card-na{background:#fafbfc;}
  .an-card-ico{font-size:14px;margin-bottom:5px;}
  .an-label{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
  .an-val{font-size:30px;font-weight:900;line-height:1;margin-bottom:5px;}
  .an-bar{height:4px;background:var(--lighter,#e8edf4);border-radius:2px;margin:5px 0 6px;}
  .an-bar-fill{height:100%;border-radius:2px;}
  .an-sub{font-size:11.5px;color:var(--muted);}
  .an-sub2{font-size:11px;color:var(--muted);margin-top:2px;}
  .an-stars{font-size:19px;color:var(--amber,#9a6200);margin:4px 0 3px;letter-spacing:1px;}
  .an-nps-row{display:flex;flex-direction:column;gap:2px;margin:5px 0 4px;font-size:11.5px;font-weight:700;}
  .an-nps-p{color:var(--green);}
  .an-nps-n{color:var(--muted);font-weight:500;}
  .an-nps-d{color:var(--red);}
  .an-note{font-size:11px;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--line);line-height:1.5;}
  @media(max-width:780px){.an-grid{grid-template-columns:repeat(2,1fr);}.an-card:nth-child(3n){border-right:1px solid var(--line);}.an-card:nth-child(2n){border-right:none;}}

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:200;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .notice{background:var(--amberbg);border:1px solid #e8c97a;border-radius:9px;padding:10px 14px;font-size:12.5px;color:var(--amber);font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .filt-btn{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:7px;padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .filt-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
</style>
</head>
<body>

<div id="app" hidden>
  <header>
    <div class="logo">MD</div>
    <div class="brand-text">
      <div class="t">MATERIAL DEPOT</div>
      <div class="h">Admin Console</div>
    </div>
    <span class="admin-badge">ADMIN</span>
    <div class="hdr-right">
      <span class="user-pill">Signed in as <b id="hdr-name">—</b></span>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="layout">
    <nav class="rail">
      <div class="rail-section">Dashboard</div>
      <button class="nav-item active" data-view="overview"><span class="ico">🏠</span>Overview</button>
      <div class="rail-section">Manage</div>
      <button class="nav-item" data-view="users"><span class="ico">👥</span>Users<span class="nav-badge" id="users-count">—</span></button>
      <div class="rail-section">Insights</div>
      <button class="nav-item" data-view="roleviewer"><span class="ico">👁</span>Role Viewer</button>
      <button class="nav-item" data-view="jobs"><span class="ico">📋</span>Job Overview</button>
      <button class="nav-item" data-view="perf"><span class="ico">📊</span>Performance</button>
      <button class="nav-item" data-view="analytics"><span class="ico">📉</span>Analytics</button>
    </nav>

    <main id="main"></main>
  </div>
</div>

<div id="overlay" class="overlay">
  <div class="modal" id="modal"></div>
</div>

<div id="toast"></div>

<script>
const SB_URL = 'https://jqrdfnjfxqxrazfkaofm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmRmbmpmeHF4cmF6Zmthb2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTU5NTcsImV4cCI6MjA5NjY3MTk1N30.2mvCPc0E_vDn2WaID5sEjwU4Dyj53rhevGrSPBa3__g';
const H = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

async function sbGet(q){const r=await fetch(SB_URL+'/rest/v1/'+q,{headers:H});return r.json();}
async function sbPost(t,b){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});return r.json();}
async function sbPatch(t,id,b){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});return r.json();}
async function sbDel(t,id){await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'DELETE',headers:H});}

let SESSION = null;
function getSession(){try{return JSON.parse(localStorage.getItem('md_user')||'null');}catch{return null;}}
function signOut(){localStorage.removeItem('md_user');window.location.href='Login.html';}

const ROLES = {
  admin:              {label:'Admin',                    color:'#5b3aa6'},
  service_mgr:        {label:'Service Manager',          color:'#1F3A5F', file:'SM_Audit_Dashboard.html'},
  site_auditor:       {label:'Site Auditor',             color:'#2E6CA8', file:'Site_Auditor_App.html'},
  installer:          {label:'Site Installer',           color:'#1f7a3f', file:'Site_Installer_App.html'},
  auditor_installer:  {label:'Auditor + Installer',      color:'#0f6e74', file:'Site_Auditor_App.html'},
};
const ROLE_ICONS = {service_mgr:'📋', site_auditor:'🔍', installer:'🔧', auditor_installer:'🔍🔧'};
const ROLE_DESCS = {
  service_mgr:'Audit scheduling & installation tracking dashboard',
  site_auditor:'Field audit mobile app — site visits & reports',
  installer:'Field installation app — job checklist & progress',
  auditor_installer:'Both audit and installer apps — can switch between them',
};

function roleBadge(r){const c=ROLES[r]||{label:r,color:'#999'};return `<span class="role-badge rb-${r}">${c.label}</span>`;}
function initials(n){return(n||'').split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();}
function fmtDate(s){if(!s)return '—';const d=new Date(s);return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}

const JOB_STATUS={
  pending:    {l:'Pending',      c:'c-pending'},
  assigned:   {l:'Assigned',     c:'c-scheduled'},
  callpending:{l:'Call Pending', c:'c-scheduled'},
  scheduled:  {l:'Scheduled',    c:'c-scheduled'},
  onway:      {l:'On the Way',   c:'c-onway'},
  atsite:     {l:'At Site',      c:'c-atsite'},
  completed:  {l:'Completed',    c:'c-completed'},
  reschedule: {l:'Reschedule',   c:'c-reschedule'},
};
function jobChip(s){const st=JOB_STATUS[s]||{l:s,c:'c-pending'};return `<span class="chip ${st.c}"><span class="dot"></span>${st.l}</span>`;}

let realJobs=[];

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}
function showModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('overlay').style.display='flex';}
function closeModal(){document.getElementById('overlay').style.display='none';}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

let currentView='overview';
function navigate(view){
  if(currentView!==view)jobsSearch='';
  currentView=view;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  renderView(view);
}
document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>navigate(b.dataset.view)));

async function renderView(v){
  const m=document.getElementById('main');
  if(v==='overview')     await renderOverview(m);
  else if(v==='users')   await renderUsers(m);
  else if(v==='roleviewer') await renderRoleViewer(m);
  else if(v==='jobs')    await renderJobs(m);
  else if(v==='perf')    await renderPerf(m);
  else if(v==='analytics') await renderAnalytics(m);
}

let usersCache=[], usersQ='';

  m.innerHTML='<div class="loading-row"><span class="spinner"></span></div>';

async function submitAddUser(){
  const name=document.getElementById('f-name').value.trim();
  const email=document.getElementById('f-email').value.trim().toLowerCase();
  const role=document.getElementById('f-role').value;
  const err=document.getElementById('f-err');
  const btn=document.getElementById('f-submit');
  err.classList.remove('show');
  if(!name){err.textContent='Please enter a full name.';err.classList.add('show');return;}
  if(!email||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){err.textContent='Please enter a valid email address.';err.classList.add('show');return;}
  if(!role){err.textContent='Please select a role.';err.classList.add('show');return;}
  const itypeEl=document.getElementById('f-itype');
  const installer_type=(role==='installer'||role==='auditor_installer')&&itypeEl?itypeEl.value:'flooring';
  btn.disabled=true;btn.textContent='Adding…';
  const res=await sbPost('profiles',{name,email,role,installer_type});
  btn.disabled=false;btn.innerHTML='Add User';
  if(res&&(res.code||res.error)){
    const msg=res.message||'';
    err.textContent=msg.includes('unique')||msg.includes('duplicate')?'This email is already added.':msg||'Something went wrong.';
    err.classList.add('show');return;
  }
  closeModal();
  toast(`✓ ${name} added as ${ROLES[role].label}`);
  await renderUsers(document.getElementById('main'));
}

async function resetPasscode(id,name){
  if(!confirm(`Reset ${name}'s passcode? They will be asked to create a new one on their next sign-in.`))return;
  await sbPatch('profiles',id,{passcode:null});
  closeModal();
  toast(`✓ ${name}'s passcode has been reset`);
}

async function submitEditRole(id,name){
  const role=document.getElementById('e-role').value;
  const itypeEl=document.getElementById('e-itype');
  const installer_type=(role==='installer'||role==='auditor_installer')&&itypeEl?itypeEl.value:'flooring';
  const res=await sbPatch('profiles',id,{role,installer_type});
  if(Array.isArray(res)&&res.length>0){
    closeModal();
    toast(`✓ ${name}'s role updated to ${ROLES[role].label}`);
    await renderUsers(document.getElementById('main'));
  } else {
    const msg=(res&&res.message)||'Unknown error';
    toast(`Error: ${msg}`);
  }
}

function confirmDelete(id,name){

}

async function deleteUser(id,name){

/* ---- ROLE VIEWER ---- */
let rvRole=null, rvPersonEmail=null, rvPersons={}, rvSmTab='audit', rvAiTab='auditor';

async function renderRoleViewer(m){
  m.innerHTML='<div class="loading-row"><span class="spinner"></span></div>';
  const users=await sbGet('profiles?role=neq.admin&select=id,name,email,role&order=name.asc');
  rvPersons={};
  if(Array.isArray(users)) users.forEach(u=>{if(!rvPersons[u.role])rvPersons[u.role]=[];rvPersons[u.role].push(u);});
  drawRoleViewer(m);
}

function drawRoleViewer(m){
  const persons=rvRole?(rvPersons[rvRole]||[]):[];
  let frameHtml='';
  if(rvRole&&rvPersonEmail){
    const p=persons.find(x=>x.email===rvPersonEmail);
    const smTabs=rvRole==='service_mgr'?`<div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="filt-btn${rvSmTab==='audit'?' active':''}" onclick="setSmTab('audit')">Audit Dashboard</button>
      <button class="filt-btn${rvSmTab==='install'?' active':''}" onclick="setSmTab('install')">Install Dashboard</button>
    </div>`:rvRole==='auditor_installer'?`<div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="filt-btn${rvAiTab==='auditor'?' active':''}" onclick="setAiTab('auditor')">Site Auditor App</button>
      <button class="filt-btn${rvAiTab==='installer'?' active':''}" onclick="setAiTab('installer')">Installer App</button>
    </div>`:'';
    frameHtml=smTabs+`<div class="iframe-wrap" id="rv-iframe-wrap">
      <div class="loading-row"><span class="spinner"></span> Loading ${p?p.name+"'s":'their'} view…</div>
    </div>`;
  } else if(rvRole&&!persons.length){
    frameHtml=`<div class="card"><div class="empty"><div class="e-ico">👥</div><div class="e-msg">No ${ROLES[rvRole].label}s found. Add team members in Users.</div></div></div>`;
  } else {
    frameHtml=`<div class="card"><div class="empty"><div class="e-ico">👆</div><div class="e-msg">${rvRole?'Select a person above to view their dashboard':'Select a role above to preview their dashboard'}</div></div></div>`;
  }

  m.innerHTML=`
    <div class="page-head"><h1>Role Viewer</h1><p>Preview exactly what each role sees when they log in.</p></div>
    <div class="role-cards">
      ${['service_mgr','site_auditor','installer','auditor_installer'].map(k=>{
        const cnt=(rvPersons[k]||[]).length;
        return `<div class="role-card${rvRole===k?' active':''}" onclick="setRoleView('${k}')">
          <div class="rc-ico">${ROLE_ICONS[k]}</div>
          <div class="rc-name">${ROLES[k].label}</div>
          <div class="rc-desc">${cnt} ${cnt===1?'member':'members'}</div>
        </div>`;
      }).join('')}
    </div>
    ${rvRole&&persons.length?`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${persons.map(p=>`<button class="filt-btn${rvPersonEmail===p.email?' active':''}" onclick="setRvPerson('${p.email}')">${p.name}</button>`).join('')}
    </div>`:''}
    <div id="rv-frame">${frameHtml}</div>`;

  if(rvRole&&rvPersonEmail) loadRvIframe();
}

function loadRvIframe(){
  const persons=rvPersons[rvRole]||[];
  const person=persons.find(p=>p.email===rvPersonEmail);
  if(!person) return;
  const wrap=document.getElementById('rv-iframe-wrap');
  if(!wrap) return;
  const file=rvRole==='service_mgr'
    ?(rvSmTab==='audit'?'SM_Audit_Dashboard.html':'SM_Install_Dashboard.html')
    :rvRole==='auditor_installer'
    ?(rvAiTab==='auditor'?'Site_Auditor_App.html':'Site_Installer_App.html')
    :ROLES[rvRole].file;
  const adminSession=localStorage.getItem('md_user');
  localStorage.setItem('md_user',JSON.stringify({name:person.name,email:person.email,role:rvRole}));
  const iframe=document.createElement('iframe');
  iframe.style.cssText='width:100%;height:100%;border:0';
  iframe.onload=()=>{ localStorage.setItem('md_user',adminSession); };
  iframe.src=file;
  wrap.innerHTML='';
  wrap.appendChild(iframe);
}

function setRoleView(k){rvRole=k;rvPersonEmail=null;drawRoleViewer(document.getElementById('main'));}
function setRvPerson(email){rvPersonEmail=email;drawRoleViewer(document.getElementById('main'));}
function setSmTab(tab){rvSmTab=tab;drawRoleViewer(document.getElementById('main'));}
function setAiTab(tab){rvAiTab=tab;drawRoleViewer(document.getElementById('main'));}

/* ---- JOBS OVERVIEW ---- */
let jobsFilter='all',jobsDateFilter='',jobsSearch='';
function setJobDateFilter(d){jobsDateFilter=d;drawJobs(document.getElementById('main'));}

async function renderJobs(m){
  m.innerHTML='<div class="loading-row"><span class="spinner"></span></div>';
  const [auditRes,installRes,profileRes]=await Promise.all([
    sbGet('audit_orders?select=pi,customer_name,addr,auditor_name,auditor_email,status,date&order=created_at.desc'),
    sbGet('install_orders?select=pi,customer_name,addr,subjobs,status,delivery_date&order=created_at.desc'),
    sbGet('profiles?select=name,email&role=neq.admin'),
  ]);
  const nameMap={};
  if(Array.isArray(profileRes)) profileRes.forEach(p=>{nameMap[p.email]=p.name;});
  realJobs=[];
  if(Array.isArray(auditRes)){
    auditRes.forEach(r=>realJobs.push({
      id:r.pi||'—', type:'audit',
      customer:r.customer_name||'—', addr:r.addr||'—',
      assignee:r.auditor_name||(r.auditor_email?nameMap[r.auditor_email]:null),
      status:r.status||'pending', date:r.date||null,
    }));
  }
  if(Array.isArray(installRes)){
    installRes.forEach(r=>{
      const emails=[...new Set((r.subjobs||[]).filter(sj=>sj.installer_email).map(sj=>sj.installer_email))];
      const installDates=[...new Set((r.subjobs||[]).flatMap(sj=>{
        const asgns=sj.assignments&&sj.assignments.length?sj.assignments:(sj.installer?[{date:sj.date,mode:'standard',dates:[]}]:[]);
        return asgns.flatMap(a=>a.mode==='custom'?(a.dates||[]):(a.date?[a.date]:[]));
      }))];
      realJobs.push({
        id:r.pi||'—', type:'install',
        customer:r.customer_name||'—', addr:r.addr||'—',
        assignee:emails.length?emails.map(e=>nameMap[e]||e.split('@')[0]).join(', '):null,
        status:r.status||'pending', date:r.delivery_date||null,
        installDates,
      });
    });
  }
  drawJobs(m);
}

function drawJobs(m){
  const jc={total:realJobs.length,active:0,done:0,unassigned:0};
  realJobs.forEach(j=>{
    if(['assigned','onway','atsite','scheduled'].includes(j.status))jc.active++;
    if(j.status==='completed')jc.done++;
    if(!j.assignee)jc.unassigned++;
  });
  const filtered=realJobs.filter(j=>{
    if(jobsFilter==='audit')return j.type==='audit';
    if(jobsFilter==='install')return j.type==='install';
    if(JOB_STATUS[jobsFilter])return j.status===jobsFilter;
    return true;
  }).filter(j=>{
    if(!jobsDateFilter)return true;
    if(j.type==='audit')return j.date===jobsDateFilter;
    return (j.installDates||[]).includes(jobsDateFilter);
  }).filter(j=>{
    if(!jobsSearch)return true;
    const q=jobsSearch.toLowerCase();
    return j.id.toLowerCase().includes(q)||j.customer.toLowerCase().includes(q);
  });

  m.innerHTML=`
    <div class="page-head"><h1>Jobs Overview</h1><p>All audit and installation jobs across your team.</p></div>
    <div class="stats" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><div class="val">${jc.total}</div><div class="lbl">Total Jobs</div></div>
      <div class="stat-card"><div class="val">${jc.active}</div><div class="lbl">Active Now</div></div>
      <div class="stat-card"><div class="val">${jc.done}</div><div class="lbl">Completed</div></div>
      <div class="stat-card"><div class="val">${jc.unassigned}</div><div class="lbl">Unassigned</div></div>
    </div>
    ${!realJobs.length?'<div class="card"><div class="empty"><div class="e-ico">📋</div><div class="e-msg">No jobs yet — orders will appear here once Service Managers start adding them.</div></div></div>':`
    <div class="card">
      <div class="toolbar">
        <div class="search-wrap" style="max-width:280px;min-width:180px;flex-shrink:0">
          <span class="search-ico">🔍</span>
          <input id="jobsSearchInput" type="text" placeholder="Search Enquiry ID or customer…" value="${jobsSearch}" oninput="jobsSearch=this.value;drawJobs(document.getElementById('main'))">
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${['all','audit','install','pending','assigned','scheduled','onway','atsite','completed','reschedule'].map(f=>`
            <button class="filt-btn${jobsFilter===f?' active':''}" onclick="setJobFilter('${f}')">
              ${f==='all'?'All Jobs':f==='audit'?'Audit':f==='install'?'Install':JOB_STATUS[f]?.l||f}
            </button>`).join('')}
        </div>

async function renderPerf(m){
  m.innerHTML='<div class="loading-row"><span class="spinner"></span></div>';
  const [usersRes,auditRes,installRes]=await Promise.all([
    sbGet('profiles?select=*&role=neq.admin&order=name.asc'),
    sbGet('audit_orders?select=auditor_email,status,created_at,created_by_email'),
    sbGet('install_orders?select=subjobs,status,created_at,created_by_email'),
  ]);
  const field=Array.isArray(usersRes)?usersRes.filter(u=>u.role!=='admin'):[];
  if(!field.length){
    m.innerHTML=`<div class="page-head"><h1>Performance</h1></div><div class="card"><div class="empty"><div class="e-ico">📊</div><div class="e-msg">No field staff found. Add users with Site Auditor or Installer roles first.</div></div></div>`;
    return;
  }
  const auditOrders=Array.isArray(auditRes)?auditRes:[];
  const installOrders=Array.isArray(installRes)?installRes:[];
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const statsFor=u=>{
    if(u.role==='site_auditor'||u.role==='auditor_installer'){
      const mine=auditOrders.filter(o=>o.auditor_email===u.email);
      const atotal=mine.length, adone=mine.filter(o=>o.status==='completed').length;
      const amonthly=mine.filter(o=>(o.created_at||'').startsWith(ym)).length;
      if(u.role==='site_auditor') return {total:atotal,done:adone,pending:atotal-adone,monthly:amonthly,pct:atotal?Math.round(adone/atotal*100):0};
      // auditor_installer: combine audit + install stats
      let itotal=0,idone=0,imonthly=0;
      installOrders.forEach(o=>{
        (o.subjobs||[]).forEach(sj=>{
          const asgn=sj.assignments||[];
          const inAsgn=asgn.length?asgn.some(a=>a.installer_email===u.email):sj.installer_email===u.email;
          if(inAsgn){itotal++;if(sj.status==='completed')idone++;if((o.created_at||'').startsWith(ym))imonthly++;}
        });
      });
      const total=atotal+itotal,done=adone+idone,monthly=amonthly+imonthly;
      return {total,done,pending:total-done,monthly,pct:total?Math.round(done/total*100):0};
    }
    if(u.role==='installer'){
      let total=0,done=0,monthly=0;
      installOrders.forEach(o=>{
        (o.subjobs||[]).forEach(sj=>{
          if(sj.installer_email===u.email){
            total++;
            if(sj.status==='completed')done++;
            if((o.created_at||'').startsWith(ym))monthly++;
          }
        });
      });
      return {total,done,pending:total-done,monthly,pct:total?Math.round(done/total*100):0};
    }
    // service_mgr: orders they created
    const myA=auditOrders.filter(o=>o.created_by_email===u.email);
    const myI=installOrders.filter(o=>o.created_by_email===u.email);
    const total=myA.length+myI.length;
    const done=myA.filter(o=>o.status==='completed').length+myI.filter(o=>o.status==='completed').length;
    const monthly=myA.filter(o=>(o.created_at||'').startsWith(ym)).length+myI.filter(o=>(o.created_at||'').startsWith(ym)).length;
    return {total,done,pending:total-done,monthly,pct:total?Math.round(done/total*100):0};
  };

  m.innerHTML=`
    <div class="page-head"><h1>Performance</h1><p>Completion stats per team member, computed from live order data.</p></div>
    <div class="perf-grid">
      ${field.map(u=>{
        const color=ROLES[u.role]?.color||'#999';
        const s=statsFor(u);
        const pctColor=s.pct>=90?'var(--green)':s.pct>=75?'var(--amber)':'var(--red)';
        const pctDisplay=s.total?s.pct+'%':'—';
        return `<div class="perf-card">
          <div class="pc-head">
            <div class="pc-av" style="background:${color}">${initials(u.name)}</div>
            <div><div class="pc-name">${u.name}</div><div class="pc-role">${ROLES[u.role]?.label||u.role}</div></div>
          </div>
          <div class="perf-row"><span>Total Jobs</span><span class="pr-val">${s.total}</span></div>
          <div class="perf-row"><span>Completed</span><span class="pr-val" style="color:var(--green)">${s.done}</span></div>
          <div class="perf-row"><span>Pending</span><span class="pr-val" style="color:var(--amber)">${s.pending}</span></div>
          <div class="perf-row"><span>This Month</span><span class="pr-val">${s.monthly}</span></div>
          <div class="perf-row"><span>Completion Rate</span><span class="pr-val" style="color:${s.total?pctColor:'var(--muted)'}">${pctDisplay}</span></div>
          ${s.total?`<div style="height:5px;background:var(--line);border-radius:5px;margin-top:10px;overflow:hidden">
            <div style="height:100%;width:${s.pct}%;background:${pctColor};border-radius:5px;transition:width .5s"></div>
          </div>`:''}
        </div>`;
      }).join('')}
    </div>`;
}

const FLOOR_FIELDS_A=[{k:'area',label:'Area (sq.ft)'},{k:'boxes',label:'Boxes'},{k:'skirt',label:'Skirting (nos)'},{k:'skirtH',label:'Skirting height (mm)'},{k:'lprof',label:'L-profile (nos)'},{k:'rprof',label:'R-profile / Reducer (nos)'},{k:'tprof',label:'T-profile (nos)'},{k:'corner',label:'Corner beading (nos)'}];
const WALL_FIELDS_A=[{k:'warea',label:'Wall area (sq.ft)'},{k:'rolls',label:'No. of rolls'},{k:'repeat',label:'Pattern repeat (mm)'},{k:'match',label:'Match type'},{k:'adh',label:'Adhesive (packs)'},{k:'primer',label:'Primer needed'}];
function fieldsForA(t){return t==='wallpaper'?WALL_FIELDS_A:FLOOR_FIELDS_A;}
function imgFmtA(d){if(/webp/i.test(d.slice(0,20)))return 'WEBP';return /png/i.test(d.slice(0,20))?'PNG':'JPEG';}
function renderSketchA(r){
  if(!r.sketchStrokes||!r.sketchStrokes.length)return null;
  const W=1000,H=500;const c=document.createElement('canvas');c.width=W;c.height=H;const x=c.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,H);const s=Math.round(22*(W/360));x.fillStyle='#b2b8c1';
  for(let yy=s;yy<H;yy+=s)for(let xx=s;xx<W;xx+=s){x.beginPath();x.arc(xx,yy,2,0,7);x.fill();}
  x.strokeStyle='#1F3A5F';x.lineWidth=3.2;x.lineJoin='round';x.lineCap='round';
  for(const st of r.sketchStrokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*W,Y=p.y*H;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}
  return c.toDataURL('image/jpeg',0.85);
}
function fmtDateA(ds){if(!ds)return '—';const d=new Date(ds+'T00:00');return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});}

function genAuditPDF(order,ticked){
  const {jsPDF}=window.jspdf;const doc=new jsPDF('p','pt','a4');
  const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight(),M=40;let y=M;

    doc.setFontSize(10);doc.setTextColor(...blue);doc.text('MATERIAL DEPOT',M+44,y+13);doc.setFontSize(15);doc.setTextColor(...navy);doc.text('Site Audit Job Card',M+44,y+30);y+=46;doc.setDrawColor(...navy);doc.setLineWidth(1.2);doc.line(M,y,W-M,y);y+=14;}
  header();

  y=doc.lastAutoTable.finalY+10;
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...navy);doc.text('Rooms summary',M,y+4);y+=10;
  doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',headStyles:{fillColor:navy,fontSize:8.5},styles:{fontSize:8.5,cellPadding:4,lineColor:[210,216,225]},
    head:[['#','Room','Type','SKU No.']],body:rooms.map((r,i)=>[String(i+1),r.name||'-',r.type==='wallpaper'?'Wallpaper':'Flooring',r.sku||'NA'])});
  rooms.forEach((r,i)=>{
    doc.addPage();y=M;header();
    const fields=fieldsForA(r.type);
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...navy);doc.text('Room '+(i+1)+': '+(r.name||'-'),M,y+2);y+=14;
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(...muted);doc.text((r.type==='wallpaper'?'Wallpaper':'Wooden Flooring')+'  ·  SKU: '+(r.sku||'NA'),M,y+10);y+=24;
    doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',headStyles:{fillColor:navy,fontSize:9},styles:{fontSize:9,cellPadding:5,lineColor:[210,216,225]},columnStyles:{0:{cellWidth:230,fontStyle:'bold',textColor:navy,fillColor:[238,243,249]}},
      head:[['Calculation','Value']],body:fields.map(f=>[f.label,(r.calc&&r.calc[f.k])||''])});
    y=doc.lastAutoTable.finalY+12;const colW=(W-2*M-12)/2;const ih=colW*0.78;
    const sketchImg=renderSketchA(r);
    if(sketchImg){doc.setFontSize(8.5);doc.setTextColor(...muted);doc.text('2D Diagram',M,y);try{doc.addImage(sketchImg,'JPEG',M,y+6,colW,ih);}catch(e){}}
    const rPhotosA=r.photos&&r.photos.length?r.photos:(r.photo?[r.photo]:[]);

    sbGet('audit_orders?status=eq.completed&select=*&order=created_at.desc'),

    <div class="card">

        <thead><tr><th>Type</th><th>PI No.</th><th>Customer</th><th>Assigned To</th><th>Date</th><th></th></tr></thead>
        <tbody>
          ${filtered.map((c,i)=>`<tr>
            <td><span style="background:${c.type==='audit'?'#fff4d6':'var(--greenbg)'};color:${c.type==='audit'?'#7a5800':'var(--green)'};border-radius:6px;padding:3px 8px;font-size:11px;font-weight:800">${c.type==='audit'?'Audit':('Install · '+(c.subtype==='wallpaper'?'Wallpaper':'Flooring'))}</span></td>
            <td><b style="font-family:monospace;font-size:12px;color:var(--navy)">${c.pi}</b></td>

            <td><button class="btn-primary" style="font-size:12px;padding:6px 12px" onclick="dlJobCard(${i})">Download PDF</button></td>

function setJcFilter(f){jcFilter=f;renderJobCards(document.getElementById('main'));}
function dlJobCard(i){
  const c=window._jcCards[i];if(!c)return;
  if(c.type==='audit')genAuditPDF(c.order,c.ticked);

/* ---- ANALYTICS ---- */
let analyticsPeriod='30';

async function renderAnalytics(m){
  m.innerHTML='<div class="loading-row"><span class="spinner"></span></div>';
  const [auditRes,installRes,ratingsRes]=await Promise.all([
    sbGet('audit_orders?select=pi,status,date,log,created_at&status=neq.deleted&order=created_at.desc'),
    sbGet('install_orders?select=pi,status,matched_audit,delivery_date,created_at,log,service&status=neq.deleted&order=created_at.desc'),
    sbGet('ratings?select=order_type,pi,q1_score,q2_score,q3_score,created_at&order=created_at.desc'),
  ]);
  window._anData={
    audits:Array.isArray(auditRes)?auditRes:[],
    installs:Array.isArray(installRes)?installRes:[],
    ratings:Array.isArray(ratingsRes)?ratingsRes:[],
  };
  drawAnalytics(m);
}

function drawAnalytics(m){
  const {audits,installs,ratings}=window._anData||{audits:[],installs:[],ratings:[]};
  const days=parseInt(analyticsPeriod)||0;
  const cutoff=days>0?new Date(Date.now()-days*86400000):null;
  const inP=r=>!cutoff||new Date(r.created_at)>=cutoff;

  const A=audits.filter(inP);
  const I=installs.filter(inP);
  const AR=ratings.filter(r=>r.order_type==='audit').filter(inP);
  const IR=ratings.filter(r=>r.order_type==='install').filter(inP);

  /* ---- Audit calcs ---- */
  const A_total=A.length;
  const A_slotBooked=A.filter(o=>o.date).length;
  const A_rescheduled=A.filter(o=>(o.log||[]).some(l=>(l.t||'').toLowerCase().includes('reschedule'))).length;
  const A_activated=A.filter(o=>!['pending','created'].includes(o.status)).length;
  const A_reachedSite=A.filter(o=>['atsite','completed'].includes(o.status)).length;
  const A_completed=A.filter(o=>o.status==='completed').length;
  const avgF=(arr,k)=>arr.length?+(arr.reduce((s,r)=>s+(+r[k]||0),0)/arr.length).toFixed(1):null;
  const AR_q1=avgF(AR,'q1_score'); const AR_q2=avgF(AR,'q2_score'); const AR_q3=avgF(AR,'q3_score');
  const AR_prom=AR.filter(r=>r.q1_score>=9).length;
  const AR_det=AR.filter(r=>r.q1_score<=7).length;
  const AR_nps=AR.length?Math.round((AR_prom-AR_det)/AR.length*100):null;
  // Unique audited PIs with ratings = completed with signature (ratings written post-sign)
  const AR_pis=new Set(AR.map(r=>r.pi)).size;

  /* ---- Install calcs ---- */
  const I_total=I.length;
  const I_withSvc=I.filter(o=>o.service).length;
  const I_extAudit=I.filter(o=>o.service&&o.service.audit_by==='customer').length;
  const I_smFollowUp=I.filter(o=>o.status!=='pending').length;
  const I_delayed=I.filter(o=>(o.log||[]).some(l=>(l.t||'').toLowerCase().includes('delay'))).length;
  const I_completed=I.filter(o=>['completed','partial'].includes(o.status)).length;
  const IR_q1=avgF(IR,'q1_score'); const IR_q2=avgF(IR,'q2_score'); const IR_q3=avgF(IR,'q3_score');
  const IR_prom=IR.filter(r=>r.q1_score>=9).length;
  const IR_det=IR.filter(r=>r.q1_score<=7).length;
  const IR_nps=IR.length?Math.round((IR_prom-IR_det)/IR.length*100):null;
  const IR_pis=new Set(IR.map(r=>r.pi)).size;

  /* ---- Render helpers ---- */
  const pc=(n,d)=>d>0?Math.round(n/d*100):null;
  const pcColor=p=>p===null?'var(--muted)':p>=80?'var(--green)':p>=50?'var(--amber)':'var(--red)';
  const npsColor=n=>n===null?'var(--muted)':n>=50?'var(--green)':n>=0?'var(--amber)':'var(--red)';

  function pctCard(ico,label,num,den,sub){
    const p=pc(num,den);const c=pcColor(p);
    const v=p!==null?p+'%':'N/A';
    const bar=p!==null?`<div class="an-bar"><div class="an-bar-fill" style="width:${p}%;background:${c}"></div></div>`:'';
    return `<div class="an-card">
      <div class="an-card-ico">${ico}</div><div class="an-label">${label}</div>
      <div class="an-val" style="color:${c}">${v}</div>${bar}
      <div class="an-sub">${den>0?num+' of '+den+' orders':'No data yet'}</div>
      ${sub?`<div class="an-sub2">${sub}</div>`:''}
    </div>`;
  }
  function ratingCard(ico,label,avgVal,count){
    if(avgVal===null)return `<div class="an-card an-card-na"><div class="an-card-ico">${ico}</div><div class="an-label">${label}</div><div class="an-val" style="color:var(--muted)">N/A</div><div class="an-sub">No ratings yet</div></div>`;
    const fv=parseFloat(avgVal);const c=fv>=8?'var(--green)':fv>=6?'var(--amber)':'var(--red)';
    const filled=Math.min(5,Math.round(fv/2));const empty=5-filled;
    return `<div class="an-card">
      <div class="an-card-ico">${ico}</div><div class="an-label">${label}</div>
      <div class="an-val" style="color:${c}">${avgVal}<span style="font-size:14px;font-weight:600;color:var(--muted)">/10</span></div>
      <div class="an-stars">${'★'.repeat(filled)+'☆'.repeat(empty)}</div>
      <div class="an-sub">${count} rating${count!==1?'s':''}</div>
    </div>`;
  }
  function npsCard(ico,label,nps,prom,det,total){
    if(nps===null)return `<div class="an-card an-card-na"><div class="an-card-ico">${ico}</div><div class="an-label">${label}</div><div class="an-val" style="color:var(--muted)">N/A</div><div class="an-sub">No ratings yet</div></div>`;
    const c=npsColor(nps);const pass=total-prom-det;
    return `<div class="an-card">
      <div class="an-card-ico">${ico}</div><div class="an-label">${label}</div>
      <div class="an-val" style="color:${c}">${nps>=0?'+':''}${nps}</div>
      <div class="an-nps-row">
        <span class="an-nps-p">▲ ${total?Math.round(prom/total*100):0}% Promoters (9–10)</span>
        <span class="an-nps-n">● ${total?Math.round(pass/total*100):0}% Neutral (7–8)</span>
        <span class="an-nps-d">▼ ${total?Math.round(det/total*100):0}% Detractors (0–6)</span>
      </div>
      <div class="an-sub">${total} response${total!==1?'s':''}</div>
    </div>`;
  }
  function naCard(ico,label,note){
    return `<div class="an-card an-card-na"><div class="an-card-ico">${ico}</div><div class="an-label">${label}</div><div class="an-val" style="color:var(--muted)">N/A</div><div class="an-sub">${note}</div></div>`;
  }

  const periodLabel={'7':'This Week','30':'This Month','90':'Last 90 Days','0':'All Time'}[analyticsPeriod]||'';

  m.innerHTML=`
    <div class="page-head"><h1>Analytics</h1><p>Operational metrics across all job entries. Filtered: ${periodLabel}.</p></div>
    <div style="display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap">
      ${[['7','This Week'],['30','This Month'],['90','Last 90 Days'],['0','All Time']].map(([v,l])=>
        `<button class="filt-btn${analyticsPeriod===v?' active':''}" onclick="analyticsPeriod='${v}';drawAnalytics(document.getElementById('main'))">${l}</button>`
      ).join('')}
    </div>

    <div class="an-section">
      <div class="an-section-head">
        <span class="an-section-ico">🔍</span>
        <div><div class="an-section-title">Site Audit</div><div class="an-section-sub">Parameters tracked across all site audit orders</div></div>
        <div class="an-hero"><div class="an-hero-val">${A_total}</div><div class="an-hero-label">Total Orders · ${periodLabel}</div></div>
      </div>
      <div class="an-grid">
        ${pctCard('📞','SM Slot Booking %',A_slotBooked,A_total,'Orders where SM booked a date & slot')}
        ${pctCard('🔄','Slot Postpone Rate',A_rescheduled,A_slotBooked,'Booked orders that were rescheduled at least once')}
        ${pctCard('🚗','Auditor Visit Success %',A_reachedSite,A_activated,'Assigned audits where auditor reached the site')}
        ${pctCard('📋','Job Card Filling %',AR_pis,A_completed,'Completed audits with a rated job card')}
        ${pctCard('✍️','Signature & Acknowledgement %',AR_pis,A_completed,'Completed audits with customer sign + rating recorded')}
        ${npsCard('📈','NPS Score',AR_nps,AR_prom,AR_det,AR.length)}
        ${ratingCard('⭐','Overall Service Rating',AR_q1,AR.length)}
        ${ratingCard('👤','Auditor Rating',AR_q2,AR.length)}
        ${ratingCard('🧹','Site Cleanliness (post-audit)',AR_q3,AR.length)}
      </div>
    </div>

    <div class="an-section">
      <div class="an-section-head">
        <span class="an-section-ico">🔧</span>
        <div><div class="an-section-title">Site Installation</div><div class="an-section-sub">Parameters tracked across all site installation orders</div></div>
        <div class="an-hero"><div class="an-hero-val">${I_total}</div><div class="an-hero-label">Total Orders · ${periodLabel}</div></div>
      </div>
      <div class="an-grid">
        ${pctCard('🔍','External Audit %',I_extAudit,I_withSvc,'Installations where customer provided their own measurement')}
        ${pctCard('📞','SM Follow-Up %',I_smFollowUp,I_total,'Orders SM progressed past initial pending stage')}
        ${pctCard('🚚','Delivery Delay %',I_delayed,I_total,'Orders with a delivery delay event logged')}
        ${pctCard('🚗','Installer Visit Success %',I_completed,I_total,'Install orders fully or partially completed')}
        ${pctCard('📋','Job Card Filling %',IR_pis,I_completed,'Completed installs with rated job card')}
        ${pctCard('✍️','Signature & Acknowledgement %',IR_pis,I_completed,'Completed installs with customer sign + rating')}
        ${npsCard('📈','NPS Score',IR_nps,IR_prom,IR_det,IR.length)}
        ${ratingCard('⭐','Overall Service Rating',IR_q1,IR.length)}
        ${ratingCard('👤','Installer Rating',IR_q2,IR.length)}
        ${ratingCard('🧹','Site Cleanliness (post-install)',IR_q3,IR.length)}
      </div>
    </div>

    <div class="an-note" style="margin-top:0;background:#f8f9fc;border-radius:0 0 14px 14px;padding:14px 20px;font-size:12px;color:var(--muted);line-height:1.7;border:1px solid var(--line);border-top:none">
      <b>How metrics are derived:</b>
      Job Card % &amp; Signature % use the <b>ratings table</b> as proxy — a rating is written immediately after the customer signs, so a rating entry confirms both card filled and signature obtained.
      Auditor/Installer Visit Success = audits/installs that progressed past assignment to site or completion.
      Reschedule Rate counts any order whose log contains a reschedule event (includes SM-initiated rebooking and auditor requests).
      NPS = % Promoters (Q1 ≥ 9) − % Detractors (Q1 ≤ 7) from customer ratings.
      External Audit % = installs where service.audit_by = 'customer' (customer provided own measurement).
      Site Cleanliness Rating = average Q3 score (added June 2026 — older orders will show N/A).
    </div>`;
}
