<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="manifest" href="/manifest_admin.json"/>
<meta name="theme-color" content="#1F3A5F"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Material Depot — Admin Console</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --navy:#1F3A5F;--navy2:#16294a;--blue:#2E6CA8;--yellow:#F4C20D;
    --ink:#1b2230;--muted:#67748a;--line:#dde3ec;--bg:#eef1f6;--card:#fff;
    --lighter:#eef3f9;--green:#1f7a3f;--greenbg:#e6f3ea;
    --red:#b3261e;--redbg:#fbeae8;--amber:#9a6200;--amberbg:#fdf2da;
    --purple:#5b3aa6;--purplebg:#efeaf8;
    --shadow:0 1px 2px rgba(20,40,80,.06),0 4px 14px rgba(20,40,80,.06);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;min-height:100vh;}

  header{background:var(--navy);color:#fff;padding:0 20px;display:flex;align-items:center;gap:14px;height:56px;position:sticky;top:0;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .logo{width:34px;height:34px;border-radius:8px;background:var(--yellow);color:var(--navy);font-weight:800;display:grid;place-items:center;font-size:15px;flex:0 0 auto;}
  .brand-text .t{font-size:10px;color:#9fb2cd;letter-spacing:1px;font-weight:700;}
  .brand-text .h{font-size:15px;font-weight:700;line-height:1.1;}
  .admin-badge{background:var(--yellow);color:var(--navy);font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.5px;}
  .hdr-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
  .user-pill{font-size:13px;color:#cdd8e8;}
  .user-pill b{color:#fff;}
  .signout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#cdd8e8;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;}
  .signout-btn:hover{background:rgba(255,255,255,.2);}

  .layout{display:flex;min-height:calc(100vh - 56px);}

  .rail{width:210px;background:#fff;border-right:1px solid var(--line);padding:12px 8px;flex:0 0 auto;display:flex;flex-direction:column;}
  .rail-section{font-size:10px;letter-spacing:.8px;color:var(--muted);font-weight:800;margin:14px 10px 5px;text-transform:uppercase;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:9px;color:var(--ink);font-weight:600;font-size:13.5px;cursor:pointer;border:0;background:transparent;width:100%;text-align:left;}
  .nav-item .ico{width:18px;text-align:center;flex:0 0 auto;}
  .nav-item:hover{background:var(--lighter);}
  .nav-item.active{background:var(--navy);color:#fff;}
  .nav-badge{margin-left:auto;font-size:11px;background:var(--lighter);color:var(--navy);border-radius:20px;padding:1px 7px;font-weight:800;}
  .nav-item.active .nav-badge{background:rgba(255,255,255,.18);color:#fff;}

  main{flex:1;min-width:0;padding:22px 24px 60px;overflow:auto;}
  .page-head{margin-bottom:20px;}
  .page-head h1{font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.4px;}
  .page-head p{color:var(--muted);font-size:13px;margin-top:3px;}

  .stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:20px;}
  .stat-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);}
  .stat-card .val{font-size:28px;font-weight:800;color:var(--navy);letter-spacing:-.5px;}
  .stat-card .lbl{font-size:12px;color:var(--muted);font-weight:700;margin-top:2px;}
  .stat-card .bar{height:3px;border-radius:3px;margin-top:10px;background:var(--line);overflow:hidden;}
  .stat-card .bar-fill{height:100%;border-radius:3px;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;}
  .card-head{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;}
  .card-head h2{font-size:15px;font-weight:800;color:var(--navy);}

  .toolbar{display:flex;gap:8px;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .search-wrap{position:relative;flex:1;min-width:180px;}
  .search-wrap input{width:100%;padding:8px 10px 8px 30px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;color:var(--ink);}
  .search-wrap input:focus{outline:none;border-color:var(--blue);}
  .search-ico{position:absolute;left:9px;top:9px;color:var(--muted);font-size:13px;}

  table{width:100%;border-collapse:collapse;}
  thead th{background:#f7f9fc;text-align:left;font-size:10.5px;letter-spacing:.5px;color:var(--muted);font-weight:800;padding:10px 14px;border-bottom:1px solid var(--line);text-transform:uppercase;white-space:nowrap;}
  tbody td{padding:11px 14px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:0;}
  tbody tr:hover td{background:#fafbfd;}

  .role-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:800;border-radius:20px;padding:4px 10px;white-space:nowrap;}
  .rb-admin{background:var(--purplebg);color:var(--purple);}
  .rb-service_mgr{background:#e3edf7;color:var(--navy);}
  .rb-site_auditor{background:#e4f0fb;color:var(--blue);}
  .rb-installer{background:var(--greenbg);color:var(--green);}
  .rb-auditor_installer{background:#e0f4f4;color:#0f6e74;}
  .rb-store_staff{background:var(--amberbg);color:var(--amber);}

  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:20px;padding:4px 10px;white-space:nowrap;}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex:0 0 auto;}
  .c-pending{background:#eef1f6;color:#5a6b86;}
  .c-scheduled{background:#e4f0fb;color:var(--blue);}
  .c-onway{background:var(--amberbg);color:var(--amber);}
  .c-atsite{background:#fff4d6;color:#7a5800;}
  .c-completed{background:var(--greenbg);color:var(--green);}
  .c-reschedule{background:var(--redbg);color:var(--red);}

  .btn-icon{background:transparent;border:1px solid var(--line);border-radius:7px;padding:5px 9px;font-size:12px;cursor:pointer;color:var(--muted);font-weight:700;}
  .btn-icon:hover{border-color:var(--blue);color:var(--blue);}
  .btn-icon.del:hover{border-color:var(--red);color:var(--red);}
  .btn-primary{background:var(--navy);color:#fff;border:0;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .btn-primary:hover{background:var(--navy2);}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);overflow:hidden;}
  .modal.wide{max-width:720px;max-height:88vh;overflow-y:auto;}
  .jd-head{display:flex;align-items:center;gap:12px;padding:20px 24px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:#fff;z-index:2;}
  .jd-pi{font-size:15px;font-weight:800;color:var(--navy);flex:1;}
  .jd-info{padding:14px 24px;display:flex;flex-direction:column;gap:7px;border-bottom:1px solid var(--line);}
  .jd-row{display:flex;gap:10px;font-size:13px;align-items:flex-start;}
  .jd-label{color:var(--muted);font-weight:700;min-width:88px;flex-shrink:0;font-size:12px;}
  .jd-section{padding:14px 24px;border-bottom:1px solid var(--line);}
  .jd-sec-head{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
  .jc-room{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
  .jc-room-head{font-size:12px;font-weight:800;color:var(--navy);margin-bottom:6px;}
  .jc-kvs{display:flex;flex-wrap:wrap;gap:4px 16px;}
  .jc-kv{font-size:12px;line-height:1.4;}
  .jc-k{color:var(--muted);font-size:11px;}
  .jc-v{font-weight:700;}
  .jc-photos{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;}
  .jd-log{display:flex;flex-direction:column;gap:5px;}
  .jd-tl{font-size:12px;padding:4px 0;border-bottom:1px solid var(--line);}
  .jd-tl:last-child{border-bottom:none;}
  .jd-tl-t{font-weight:600;color:var(--ink);}
  .jd-tl-d{color:var(--muted);font-size:11px;margin-top:1px;}
  .jd-btns{padding:16px 24px 20px;display:flex;gap:10px;flex-wrap:wrap;}
  .btn-ghost{background:#f0f2f5;border:0;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink);}
  .btn-ghost:hover{background:#e0e4ea;}
  .modal-head{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;}
  .modal-head h3{font-size:16px;font-weight:800;color:var(--navy);}
  .modal-close{margin-left:auto;background:transparent;border:0;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px;}
  .modal-body{padding:20px;}
  .form-group{margin-bottom:14px;}
  .form-group label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px;}
  .form-group input,.form-group select{width:100%;padding:10px 12px;border:2px solid var(--line);border-radius:9px;font-size:14px;color:var(--ink);background:#fff;}
  .form-group input:focus,.form-group select:focus{outline:none;border-color:var(--blue);}
  .form-error{background:var(--redbg);color:var(--red);border-radius:8px;padding:9px 12px;font-size:12.5px;font-weight:600;margin-top:10px;display:none;}
  .form-error.show{display:block;}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;}
  .btn-cancel{background:#f0f2f5;border:0;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink);}

  .role-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
  .role-card{background:var(--card);border:2px solid var(--line);border-radius:12px;padding:18px;cursor:pointer;text-align:center;transition:border-color .15s;}
  .role-card:hover{border-color:var(--blue);}
  .role-card.active{border-color:var(--navy);background:var(--navy);color:#fff;}
  .role-card .rc-ico{font-size:28px;margin-bottom:8px;}
  .role-card .rc-name{font-weight:800;font-size:14px;}
  .role-card .rc-desc{font-size:12px;color:var(--muted);margin-top:4px;}
  .role-card.active .rc-desc{color:#9fb2cd;}
  .iframe-wrap{background:var(--card);border:1px solid var(--line);border-radius:12px;overflow:hidden;height:620px;}
  .iframe-wrap iframe{width:100%;height:100%;border:0;}

  .perf-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
  .perf-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow);}
  .perf-card .pc-head{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
  .pc-av{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:14px;color:#fff;flex:0 0 auto;}
  .pc-name{font-weight:800;font-size:14px;}
  .pc-role{font-size:11.5px;color:var(--muted);}
  .perf-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .perf-row:last-child{border-bottom:0;}
  .pr-val{font-weight:800;color:var(--navy);}

  .user-av{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-weight:800;font-size:12px;color:#fff;flex:0 0 auto;}

  .empty{text-align:center;padding:48px 20px;color:var(--muted);}
  .empty .e-ico{font-size:36px;margin-bottom:10px;}
  .empty .e-msg{font-size:14px;font-weight:600;}

  .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(31,58,95,.15);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-row{text-align:center;padding:40px;color:var(--muted);}

  /* Analytics */
  .an-section{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-bottom:20px;}
  .an-section-head{display:flex;align-items:center;gap:14px;padding:16px 20px;border-bottom:1px solid var(--line);background:#f8f9fc;}
  .an-section-ico{font-size:24px;flex:0 0 auto;}
  .an-section-title{font-size:16px;font-weight:800;color:var(--navy);}
  .an-section-sub{font-size:12px;color:var(--muted);margin-top:2px;}
  .an-hero{margin-left:auto;text-align:right;flex:0 0 auto;}
  .an-hero-val{font-size:40px;font-weight:900;color:var(--navy);line-height:1;}
  .an-hero-label{font-size:11px;color:var(--muted);margin-top:2px;}
  .an-grid{display:grid;grid-template-columns:repeat(3,1fr);}
  .an-grid .an-card:nth-child(3n){border-right:none;}
  .an-grid4{display:grid;grid-template-columns:repeat(4,1fr);}
  .an-grid4 .an-card:nth-child(4n){border-right:none;}
  .an-card{padding:16px 18px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);min-height:110px;}
  .an-card-na{background:#fafbfc;}
  .an-label{font-size:10.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
  .an-val{font-size:30px;font-weight:900;line-height:1;margin-bottom:5px;}
  .an-bar{height:4px;background:var(--lighter,#e8edf4);border-radius:2px;margin:5px 0 6px;}
  .an-bar-fill{height:100%;border-radius:2px;}
  .an-sub{font-size:11.5px;color:var(--muted);}
  .an-sub2{font-size:11px;color:var(--muted);margin-top:2px;}
  .an-stars{font-size:19px;color:var(--amber,#9a6200);margin:4px 0 3px;letter-spacing:1px;}
  .an-nps-row{display:flex;flex-direction:column;gap:2px;margin:5px 0 4px;font-size:11.5px;font-weight:700;}
  .an-nps-p{color:var(--green);}
  .an-nps-n{color:var(--muted);font-weight:500;}
  .an-nps-d{color:var(--red);}
  /* Analytics V2 additions */
  .an-date-row{display:flex;align-items:center;gap:10px;margin-bottom:22px;flex-wrap:wrap;}
  .an-date-label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .an-date-inp{padding:7px 10px;border:1.5px solid var(--line);border-radius:8px;font-size:13px;color:var(--navy);background:#fff;font-weight:600;cursor:pointer;}
  .an-date-inp:focus{outline:none;border-color:var(--navy);}
  .an-apply-btn{padding:7px 16px;background:var(--navy);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;}
  .an-sub-head{padding:10px 18px;background:#f9fafc;border-top:1px solid var(--line);border-bottom:1px solid var(--line);font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);}
  .an-inst-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .an-inst-table thead th{padding:9px 14px;text-align:left;font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid var(--line);white-space:nowrap;background:#f8f9fc;}
  .an-inst-table tbody td{padding:10px 14px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .an-inst-table tbody tr:last-child td{border-bottom:none;}
  .an-inst-table tbody tr:hover td{background:#f8fbff;}
  .an-inst-table small{font-size:9px;color:var(--muted);font-weight:400;display:block;margin-top:2px;}
  .an-deliv-row{display:flex;gap:24px;flex-wrap:wrap;padding:14px 20px;border-bottom:1px solid var(--line);align-items:center;}
  .an-deliv-stat{display:flex;flex-direction:column;gap:3px;}
  .an-deliv-val{font-size:26px;font-weight:800;line-height:1.1;}
  .an-deliv-lbl{font-size:11px;color:var(--muted);font-weight:600;}
  .an-na-note{padding:20px;text-align:center;color:var(--muted);font-size:13px;border-bottom:1px solid var(--line);}
  .an-footer{font-size:11.5px;color:var(--muted);padding:14px 20px;background:#f8f9fc;border-radius:10px;border:1px solid var(--line);line-height:1.8;margin-top:4px;}
  @media(max-width:780px){
    .an-grid{grid-template-columns:repeat(2,1fr);}
    .an-grid .an-card:nth-child(3n){border-right:1px solid var(--line);}
    .an-grid .an-card:nth-child(2n){border-right:none;}
    .an-grid4{grid-template-columns:repeat(2,1fr);}
    .an-grid4 .an-card:nth-child(4n){border-right:1px solid var(--line);}
    .an-grid4 .an-card:nth-child(2n){border-right:none;}
  }

  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:200;white-space:nowrap;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .notice{background:var(--amberbg);border:1px solid #e8c97a;border-radius:9px;padding:10px 14px;font-size:12.5px;color:var(--amber);font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .filt-btn{border:1px solid var(--line);background:#fff;color:var(--muted);border-radius:7px;padding:6px 12px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .filt-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
</style>
</head>
<body>

<div id="app" hidden>
  <header>
    <div class="logo">MD</div>
    <div class="brand-text">
      <div class="t">MATERIAL DEPOT</div>
      <div class="h">Admin Console</div>
    </div>
    <span class="admin-badge">ADMIN</span>
    <div class="hdr-right">
      <span class="user-pill">Signed in as <b id="hdr-name">—</b></span>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <div class="layout">
    <nav class="rail">
      <div class="rail-section">Dashboard</div>
      <button class="nav-item active" data-view="overview"><span class="ico">🏠</span>Overview</button>
      <div class="rail-section">Manage</div>
      <button class="nav-item" data-view="users"><span class="ico">👥</span>Users<span class="nav-badge" id="users-count">—</span></button>
      <div class="rail-section">Insights</div>
      <button class="nav-item" data-view="roleviewer"><span class="ico">👁</span>Role Viewer</button>
      <button class="nav-item" data-view="jobs"><span class="ico">📋</span>Job Overview</button>
      <button class="nav-item" data-view="perf"><span class="ico">📊</span>Performance</button>
      <button class="nav-item" data-view="analytics"><span class="ico">📉</span>Analytics</button>
      <button class="nav-item" data-view="live"><span class="ico">📍</span>Live</button>
    </nav>

    <main id="main"></main>
  </div>
</div>

<div id="overlay" class="overlay">
  <div class="modal" id="modal"></div>
</div>

<div id="toast"></div>

<script>
const SB_URL = 'https://jqrdfnjfxqxrazfkaofm.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmRmbmpmeHF4cmF6Zmthb2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTU5NTcsImV4cCI6MjA5NjY3MTk1N30.2mvCPc0E_vDn2WaID5sEjwU4Dyj53rhevGrSPBa3__g';
const H = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

async function sbGet(q){const ac=new AbortController();const tid=setTimeout(()=>ac.abort(),12000);try{const r=await fetch(SB_URL+'/rest/v1/'+q,{headers:H,signal:ac.signal});return r.json();}finally{clearTimeout(tid);}}
async function sbGetLong(q){const ac=new AbortController();const tid=setTimeout(()=>ac.abort(),45000);try{const r=await fetch(SB_URL+'/rest/v1/'+q,{headers:H,signal:ac.signal});return r.json();}finally{clearTimeout(tid);}}
async function sbPost(t,b){const ac=new AbortController();const tid=setTimeout(()=>ac.abort(),12000);try{const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b),signal:ac.signal});const j=await r.json();if(!r.ok)throw new Error(j.message||j.error||'DB error '+r.status);return j;}finally{clearTimeout(tid);}}
async function sbPatch(t,id,b){const ac=new AbortController();const tid=setTimeout(()=>ac.abort(),12000);try{const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b),signal:ac.signal});const j=await r.json();if(!r.ok)throw new Error(j.message||j.error||'DB error '+r.status);return j;}finally{clearTimeout(tid);}}
async function sbDel(t,id){const ac=new AbortController();const tid=setTimeout(()=>ac.abort(),12000);try{await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'DELETE',headers:H,signal:ac.signal});}finally{clearTimeout(tid);}}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}
function showModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('overlay').style.display='flex';}
function closeModal(){document.getElementById('overlay').style.display='none';}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal();});

let currentView='overview';
let _liveLocTimer=null;
function navigate(view){
  if(currentView!==view)jobsSearch='';
  currentView=view;
  if(view!=='live'&&_liveLocTimer){clearInterval(_liveLocTimer);_liveLocTimer=null;}
  if(view!=='jobs'&&_jobsPollTid){clearInterval(_jobsPollTid);_jobsPollTid=null;}
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  renderView(view);
}
document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>navigate(b.dataset.view)));

async function renderView(v){
  const m=document.getElementById('main');
  if(v==='overview')     await renderOverview(m);
  else if(v==='users')   await renderUsers(m);
  else if(v==='roleviewer') await renderRoleViewer(m);
  else if(v==='jobs')    await renderJobs(m);
  else if(v==='perf')    await renderPerf(m);
  else if(v==='analytics') await renderAnalytics(m);
  else if(v==='live')      await renderLiveLocations(m);
}

/* ---- USERS ---- */
let usersCache=[], usersQ='';
async function renderUsers(m){
  m.innerHTML='<div class="loading-row"><span class="spinner"></span></div>';
  const res=await sbGet('profiles?select=*&order=created_at.desc');
  if(!Array.isArray(res)){
    m.innerHTML=`<div class="card" style="padding:24px"><div class="notice">⚠️ Could not load users. Make sure you've run the setup SQL in Supabase.</div></div>`;
    return;
  }
  usersCache=res;
  document.getElementById('users-count').textContent=res.length;
  drawUsersTable(m);
}

function drawUsersTable(m){
  const q=usersQ.toLowerCase();
  const filtered=usersCache.filter(u=>!q||(u.name+u.email+u.role).toLowerCase().includes(q));

        <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Passcode</th><th>Added</th><th>Actions</th></tr></thead>
        <tbody>
          ${filtered.length?filtered.map(u=>`
            <tr>
              <td><div style="display:flex;align-items:center;gap:9px"><div class="user-av" style="background:${ROLES[u.role]?.color||'#999'}">${initials(u.name)}</div><b>${u.name}</b></div></td>
              <td style="color:var(--muted);font-family:monospace;font-size:12px">${u.email}</td>
              <td>${roleBadge(u.role)}${u.role==='installer'?`<span style="font-size:11px;color:var(--muted);margin-left:6px">${(u.installer_type||'flooring')==='wallpaper'?'Wallpaper':'Flooring'}</span>`:''}</td>

async function submitAddUser(){
  const name=document.getElementById('f-name').value.trim();
  const email=document.getElementById('f-email').value.trim().toLowerCase();
  const role=document.getElementById('f-role').value;
  const err=document.getElementById('f-err');
  const btn=document.getElementById('f-submit');
  err.classList.remove('show');
  if(!name){err.textContent='Please enter a full name.';err.classList.add('show');return;}
  if(!email||!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){err.textContent='Please enter a valid email address.';err.classList.add('show');return;}
  if(!role){err.textContent='Please select a role.';err.classList.add('show');return;}
  const itypeEl=document.getElementById('f-itype');
  const installer_type=(role==='installer'||role==='auditor_installer')&&itypeEl?itypeEl.value:'flooring';
  btn.disabled=true;btn.textContent='Adding…';
  try{
    await sbPost('profiles',{name,email,role,installer_type});
    closeModal();
    toast(`✓ ${name} added as ${ROLES[role]?.label||role}`);
    await renderUsers(document.getElementById('main'));
  }catch(e){
    btn.disabled=false;btn.textContent='Add User';
    const msg=e.message||'';
    err.textContent=msg.includes('unique')||msg.includes('duplicate')?'This email is already added.':msg.includes('violates')||msg.includes('check')?'Role not allowed — ask IT to run the DB constraint update.':msg||'Something went wrong.';
    err.classList.add('show');
  }
}

async function resetPasscode(id,name){
  if(!confirm(`Reset ${name}'s passcode? They will be asked to create a new one on their next sign-in.`))return;
  await sbPatch('profiles',id,{passcode:null});
  closeModal();
  toast(`✓ ${name}'s passcode has been reset`);
}

async function submitEditRole(id,name){
  const role=document.getElementById('e-role').value;
  const itypeEl=document.getElementById('e-itype');
  const installer_type=(role==='installer'||role==='auditor_installer')&&itypeEl?itypeEl.value:'flooring';
  try{
    await sbPatch('profiles',id,{role,installer_type});
    closeModal();
    toast(`✓ ${name}'s role updated to ${ROLES[role]?.label||role}`);
    await renderUsers(document.getElementById('main'));
  }catch(e){
    const msg=e.message||'';
    toast('Error: '+(msg.includes('violates')||msg.includes('check')?'Role not allowed — run the DB constraint update in Supabase SQL Editor.':msg||'Unknown error'));
  }
}

function confirmDelete(id,name){
  showModal(`
    <div class="modal-head"><h3>Remove User</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p style="font-size:14px;color:var(--ink);line-height:1.6">Are you sure you want to remove <b>${name}</b>? They will lose access immediately.</p>

async function deleteUser(id,name){

/* ---- ROLE VIEWER ---- */
let rvRole=null, rvPersonEmail=null, rvPersons={}, rvSmTab='audit', rvAiTab='auditor';

async function renderRoleViewer(m){
  m.innerHTML='<div class="loading-row"><span class="spinner"></span></div>';
  const users=await sbGet('profiles?role=neq.admin&select=id,name,email,role&order=name.asc');
  rvPersons={};
  if(Array.isArray(users)) users.forEach(u=>{if(!rvPersons[u.role])rvPersons[u.role]=[];rvPersons[u.role].push(u);});
  drawRoleViewer(m);
}

function drawRoleViewer(m){
  const persons=rvRole?(rvPersons[rvRole]||[]):[];
  let frameHtml='';
  if(rvRole&&rvPersonEmail){
    const p=persons.find(x=>x.email===rvPersonEmail);
    const smTabs=rvRole==='service_mgr'?`<div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="filt-btn${rvSmTab==='audit'?' active':''}" onclick="setSmTab('audit')">Audit Dashboard</button>
      <button class="filt-btn${rvSmTab==='install'?' active':''}" onclick="setSmTab('install')">Install Dashboard</button>
    </div>`:rvRole==='auditor_installer'?`<div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="filt-btn${rvAiTab==='auditor'?' active':''}" onclick="setAiTab('auditor')">Site Auditor App</button>
      <button class="filt-btn${rvAiTab==='installer'?' active':''}" onclick="setAiTab('installer')">Installer App</button>
    </div>`:'';
    frameHtml=smTabs+`<div class="iframe-wrap" id="rv-iframe-wrap">
      <div class="loading-row"><span class="spinner"></span> Loading ${p?p.name+"'s":'their'} view…</div>
    </div>`;
  } else if(rvRole&&!persons.length){
    frameHtml=`<div class="card"><div class="empty"><div class="e-ico">👥</div><div class="e-msg">No ${ROLES[rvRole].label}s found. Add team members in Users.</div></div></div>`;
  } else {
    frameHtml=`<div class="card"><div class="empty"><div class="e-ico">👆</div><div class="e-msg">${rvRole?'Select a person above to view their dashboard':'Select a role above to preview their dashboard'}</div></div></div>`;
  }

  m.innerHTML=`
    <div class="page-head"><h1>Role Viewer</h1><p>Preview exactly what each role sees when they log in.</p></div>
    <div class="role-cards">
      ${['service_mgr','site_auditor','installer','auditor_installer','store_staff'].map(k=>{
        const cnt=(rvPersons[k]||[]).length;
        return `<div class="role-card${rvRole===k?' active':''}" onclick="setRoleView('${k}')">
          <div class="rc-ico">${ROLE_ICONS[k]}</div>
          <div class="rc-name">${ROLES[k].label}</div>
          <div class="rc-desc">${cnt} ${cnt===1?'member':'members'}</div>
        </div>`;
      }).join('')}
    </div>
    ${rvRole&&persons.length?`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
      ${persons.map(p=>`<button class="filt-btn${rvPersonEmail===p.email?' active':''}" onclick="setRvPerson('${p.email}')">${p.name}</button>`).join('')}
    </div>`:''}
    <div id="rv-frame">${frameHtml}</div>`;

  if(rvRole&&rvPersonEmail) loadRvIframe();
}

function loadRvIframe(){
  const persons=rvPersons[rvRole]||[];
  const person=persons.find(p=>p.email===rvPersonEmail);
  if(!person) return;
  const wrap=document.getElementById('rv-iframe-wrap');
  if(!wrap) return;
  const file=rvRole==='service_mgr'
    ?(rvSmTab==='audit'?'SM_Audit_Dashboard.html':'SM_Install_Dashboard.html')

let jobsFilter='all',jobsDateFilter='',jobsSearch='';
function setJobDateFilter(d){jobsDateFilter=d;drawJobs(document.getElementById('main'));}

async function _loadJobsData(m){
  const [auditRes,installRes,profileRes]=await Promise.all([
    sbGet('audit_orders?select=pi,customer_name,addr,auditor_name,auditor_email,status,date&status=not.in.(deleted,slot_reserved)&order=created_at.desc'),
    sbGet('install_orders?select=pi,customer_name,addr,subjobs,status,delivery_date&status=neq.deleted&order=created_at.desc'),
    sbGet('profiles?select=name,email&role=neq.admin'),
  ]);
  if(Array.isArray(profileRes)) profileRes.forEach(p=>{_jobsNameMap[p.email]=p.name;});
  realJobs=[];
  if(Array.isArray(auditRes)){
    auditRes.forEach(r=>realJobs.push({
      id:r.pi||'—', type:'audit',
      customer:r.customer_name||'—', addr:r.addr||'—',
      assignee:r.auditor_name||(r.auditor_email?_jobsNameMap[r.auditor_email]:null),
      status:r.status||'pending', date:r.date||null,
    }));
  }
  if(Array.isArray(installRes)){
    installRes.forEach(r=>{
      const emails=[...new Set((r.subjobs||[]).flatMap(sj=>{
        if(sj.assignments&&sj.assignments.length)return sj.assignments.map(a=>a.installer_email).filter(Boolean);
        return sj.installer_email?[sj.installer_email]:[];
      }))];
      const installDates=[...new Set((r.subjobs||[]).flatMap(sj=>{
        const asgns=sj.assignments&&sj.assignments.length?sj.assignments:(sj.installer?[{date:sj.date,mode:'standard',dates:[]}]:[]);
        return asgns.flatMap(a=>a.mode==='custom'?(a.dates||[]):(a.date?[a.date]:[]));
      }))];
      realJobs.push({
        id:r.pi||'—', type:'install',
        customer:r.customer_name||'—', addr:r.addr||'—',
        assignee:emails.length?emails.map(e=>_jobsNameMap[e]||e.split('@')[0]).join(', '):null,
        status:r.status||'pending', date:r.delivery_date||null,
        installDates,
      });
    });
  }
  if(m)drawJobs(m);
}

async function renderJobs(m){
  m.innerHTML='<div class="loading-row"><span class="spinner"></span></div>';
  await _loadJobsData(m);
  if(_jobsPollTid)clearInterval(_jobsPollTid);
  _jobsPollTid=setInterval(()=>{
    if(currentView==='jobs'&&!document.hidden)_loadJobsData(document.getElementById('main'));
  },30000);
}

function drawJobs(m){
  const jc={total:realJobs.length,active:0,done:0,unassigned:0};
  realJobs.forEach(j=>{
    if(['assigned','onway','atsite','scheduled'].includes(j.status))jc.active++;
    if(j.status==='completed')jc.done++;
    if(!j.assignee)jc.unassigned++;
  });
  const filtered=realJobs.filter(j=>{
    if(jobsFilter==='audit')return j.type==='audit';
    if(jobsFilter==='install')return j.type==='install';
    if(JOB_STATUS[jobsFilter])return j.status===jobsFilter;
    return true;
  }).filter(j=>{
    if(!jobsDateFilter)return true;
    if(j.type==='audit')return j.date===jobsDateFilter;
    return (j.installDates||[]).includes(jobsDateFilter);
  }).filter(j=>{
    if(!jobsSearch)return true;
    const q=jobsSearch.toLowerCase();
    return j.id.toLowerCase().includes(q)||j.customer.toLowerCase().includes(q);
  });

  m.innerHTML=`
    <div class="page-head"><h1>Jobs Overview</h1><p>All audit and installation jobs across your team.</p></div>
    <div class="stats" style="grid-template-columns:repeat(4,1fr)">
      <div class="stat-card"><div class="val">${jc.total}</div><div class="lbl">Total Jobs</div></div>
      <div class="stat-card"><div class="val">${jc.active}</div><div class="lbl">Active Now</div></div>
      <div class="stat-card"><div class="val">${jc.done}</div><div class="lbl">Completed</div></div>
      <div class="stat-card"><div class="val">${jc.unassigned}</div><div class="lbl">Unassigned</div></div>
    </div>
    ${!realJobs.length?'<div class="card"><div class="empty"><div class="e-ico">📋</div><div class="e-msg">No jobs yet — orders will appear here once Service Managers start adding them.</div></div></div>':`
    <div class="card">
      <div class="toolbar">
        <div class="search-wrap" style="max-width:280px;min-width:180px;flex-shrink:0">
          <span class="search-ico">🔍</span>
          <input id="jobsSearchInput" type="text" placeholder="Search Enquiry ID or customer…" value="${jobsSearch}" oninput="jobsSearch=this.value;drawJobs(document.getElementById('main'))">
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${['all','audit','install','pending','assigned','scheduled','onway','atsite','completed','reschedule'].map(f=>`
            <button class="filt-btn${jobsFilter===f?' active':''}" onclick="setJobFilter('${f}')">
              ${f==='all'?'All Jobs':f==='audit'?'Audit':f==='install'?'Install':JOB_STATUS[f]?.l||f}
            </button>`).join('')}
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0">
          <input type="date" value="${jobsDateFilter}" title="Filter by scheduled date" onchange="setJobDateFilter(this.value)" style="border:1.5px solid ${jobsDateFilter?'var(--blue)':'var(--line)'};border-radius:9px;padding:6px 10px;font-size:13px;font-weight:600;color:${jobsDateFilter?'var(--navy)':'var(--muted)'};background:#fff;cursor:pointer;outline:none">
          ${jobsDateFilter?`<button onclick="setJobDateFilter('')" style="border:0;background:var(--redbg);color:var(--red);border-radius:7px;padding:5px 10px;font-weight:800;font-size:12px;cursor:pointer;white-space:nowrap">✕ Clear date</button>`:''}
        </div>
      </div>
      <table>
        <thead><tr><th>Job ID</th><th>Type</th><th>Customer</th><th>Location</th><th>Assigned To</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>
          ${filtered.length?filtered.map(j=>`
            <tr style="cursor:pointer" onclick="openJobDetail('${j.id}','${j.type}')">
              <td><b style="font-family:monospace;font-size:12px;color:var(--navy)">${j.id}</b></td>
              <td><span style="background:${j.type==='audit'?'#fff4d6':'var(--greenbg)'};color:${j.type==='audit'?'#7a5800':'var(--green)'};border-radius:6px;padding:3px 8px;font-size:11px;font-weight:800">${j.type==='audit'?'Audit':'Install'}</span></td>
              <td><b>${j.customer}</b></td>
              <td style="color:var(--muted);font-size:12px">${j.addr}</td>
              <td>${j.assignee||'<span style="color:var(--red);font-weight:700">Unassigned</span>'}</td>
              <td>${jobChip(j.status)}</td>
              <td style="color:var(--muted)">${j.date||'—'}</td>
            </tr>`).join('')
          :'<tr><td colspan="7"><div class="empty"><div class="e-ico">🔍</div><div class="e-msg">No jobs match this filter</div></div></td></tr>'}
        </tbody>
      </table>
    </div>`}`;
  if(jobsSearch){const si=document.getElementById('jobsSearchInput');if(si){si.focus();si.setSelectionRange(jobsSearch.length,jobsSearch.length);}}
}

function fmtLog(d){if(!d)return '—';const dt=new Date(d);if(isNaN(dt.getTime())){const m=String(d).match(/\d{1,2}:\d{2}\s*(?:[AP]M)?/i);return m?m[0]+' (date unknown)':'—';}const ts=dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});return dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+' · '+ts;}
function jdLog(log){return(log||[]).slice().reverse().slice(0,10).map(l=>{
  const mapLink=l.lat&&l.lng?`<a href="https://maps.google.com/?q=${l.lat},${l.lng}" target="_blank" rel="noopener" style="color:var(--blue);font-size:11px;margin-left:6px">📍 Map</a>`:'';

  return `<div class="jd-tl"><div class="jd-tl-t">${(l.who?'<span style="color:var(--navy);font-weight:800">'+l.who+'</span> &middot; ':'')+l.t+mapLink}</div><div class="jd-tl-d">${fmtLog(l.d)}${l.by==='auto'?' · installer/auditor':l.by==='manual'?' · SM':''}</div>${photo}</div>`;
}).join('');}

/* ---- PERFORMANCE ---- */
async function renderPerf(m){
  m.innerHTML='<div class="loading-row"><span class="spinner"></span></div>';
  const [usersRes,auditRes,installRes]=await Promise.all([
    sbGet('profiles?select=*&role=neq.admin&order=name.asc'),
    sbGet('audit_orders?select=auditor_email,status,created_at,created_by_email'),
    sbGet('install_orders?select=subjobs,status,created_at,created_by_email'),
  ]);
  const field=Array.isArray(usersRes)?usersRes.filter(u=>u.role!=='admin'):[];
  if(!field.length){
    m.innerHTML=`<div class="page-head"><h1>Performance</h1></div><div class="card"><div class="empty"><div class="e-ico">📊</div><div class="e-msg">No field staff found. Add users with Site Auditor or Installer roles first.</div></div></div>`;
    return;
  }
  const auditOrders=Array.isArray(auditRes)?auditRes:[];
  const installOrders=Array.isArray(installRes)?installRes:[];
  const now=new Date();
  const ym=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

  const statsFor=u=>{
    if(u.role==='site_auditor'||u.role==='auditor_installer'){
      const mine=auditOrders.filter(o=>o.auditor_email===u.email);
      const atotal=mine.length, adone=mine.filter(o=>o.status==='completed').length;
      const amonthly=mine.filter(o=>(o.created_at||'').startsWith(ym)).length;
      if(u.role==='site_auditor') return {total:atotal,done:adone,pending:atotal-adone,monthly:amonthly,pct:atotal?Math.round(adone/atotal*100):0};
      // auditor_installer: combine audit + install stats
      let itotal=0,idone=0,imonthly=0;
      installOrders.forEach(o=>{
        (o.subjobs||[]).forEach(sj=>{
          const asgn=sj.assignments||[];
          const inAsgn=asgn.length?asgn.some(a=>a.installer_email===u.email):sj.installer_email===u.email;
          if(inAsgn){itotal++;if(sj.status==='completed')idone++;if((o.created_at||'').startsWith(ym))imonthly++;}
        });
      });
      const total=atotal+itotal,done=adone+idone,monthly=amonthly+imonthly;
      return {total,done,pending:total-done,monthly,pct:total?Math.round(done/total*100):0};
    }
    if(u.role==='installer'){
      let total=0,done=0,monthly=0;
      installOrders.forEach(o=>{
        (o.subjobs||[]).forEach(sj=>{
          if(sj.installer_email===u.email){
            total++;
            if(sj.status==='completed')done++;
            if((o.created_at||'').startsWith(ym))monthly++;
          }
        });
      });
      return {total,done,pending:total-done,monthly,pct:total?Math.round(done/total*100):0};
    }
    // service_mgr: orders they created
    const myA=auditOrders.filter(o=>o.created_by_email===u.email);
    const myI=installOrders.filter(o=>o.created_by_email===u.email);
    const total=myA.length+myI.length;
    const done=myA.filter(o=>o.status==='completed').length+myI.filter(o=>o.status==='completed').length;
    const monthly=myA.filter(o=>(o.created_at||'').startsWith(ym)).length+myI.filter(o=>(o.created_at||'').startsWith(ym)).length;
    return {total,done,pending:total-done,monthly,pct:total?Math.round(done/total*100):0};
  };

  m.innerHTML=`
    <div class="page-head"><h1>Performance</h1><p>Completion stats per team member, computed from live order data.</p></div>
    <div class="perf-grid">
      ${field.map(u=>{
        const color=ROLES[u.role]?.color||'#999';
        const s=statsFor(u);
        const pctColor=s.pct>=90?'var(--green)':s.pct>=75?'var(--amber)':'var(--red)';
        const pctDisplay=s.total?s.pct+'%':'—';
        return `<div class="perf-card">
          <div class="pc-head">

const FLOOR_FIELDS_A=[{k:'area',label:'Area (sq.ft)'},{k:'boxes',label:'Boxes'},{k:'skirt',label:'Skirting (nos)'},{k:'skirtH',label:'Skirting height (mm)'},{k:'lprof',label:'L-profile (nos)'},{k:'rprof',label:'R-profile / Reducer (nos)'},{k:'tprof',label:'T-profile (nos)'},{k:'corner',label:'Corner beading (nos)'}];
const WALL_FIELDS_A=[{k:'warea',label:'Wall area (sq.ft)'},{k:'rolls',label:'No. of rolls'},{k:'repeat',label:'Pattern repeat (mm)'},{k:'match',label:'Match type'},{k:'adh',label:'Adhesive (packs)'},{k:'primer',label:'Primer needed'}];
function fieldsForA(t){return t==='wallpaper'?WALL_FIELDS_A:FLOOR_FIELDS_A;}
function imgFmtA(d){if(/webp/i.test(d.slice(0,20)))return 'WEBP';return /png/i.test(d.slice(0,20))?'PNG':'JPEG';}
function renderSketchA(r){
  if(!r.sketchStrokes||!r.sketchStrokes.length)return null;
  const W=1000,H=500;const c=document.createElement('canvas');c.width=W;c.height=H;const x=c.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,H);const s=Math.round(22*(W/360));x.fillStyle='#b2b8c1';
  for(let yy=s;yy<H;yy+=s)for(let xx=s;xx<W;xx+=s){x.beginPath();x.arc(xx,yy,2,0,7);x.fill();}
  x.strokeStyle='#1F3A5F';x.lineWidth=3.2;x.lineJoin='round';x.lineCap='round';
  for(const st of r.sketchStrokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*W,Y=p.y*H;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}
  return c.toDataURL('image/jpeg',0.85);
}
function fmtDateA(ds){if(!ds)return '—';const d=new Date(ds+'T00:00');return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});}
async function _compressAdmin(dataUrl){
  if(!dataUrl)return null;
  return new Promise(res=>{const im=new Image();if(dataUrl.startsWith('http'))im.crossOrigin='anonymous';im.onload=()=>{try{const s=Math.min(1,1600/Math.max(im.width,im.height));const w=Math.round(im.width*s),h=Math.round(im.height*s);const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(im,0,0,w,h);res(cv.toDataURL('image/jpeg',0.88));}catch(e){res(null);}};im.onerror=()=>res(null);im.src=dataUrl;});
}

  const nameMap={};if(Array.isArray(usersRes))usersRes.forEach(u=>{nameMap[u.email]=u.name;});

  auditOrders.forEach(r=>{
    cards.push({type:'audit',date:r.date||'',pi:r.pi||'',name:r.customer_name||'',assigned:nameMap[r.auditor_email]||r.auditor_name||'—',order:r,ticked:null});

function setJcFilter(f){jcFilter=f;renderJobCards(document.getElementById('main'));}
async function dlJobCard(i,btn){
  const c=window._jcCards[i];if(!c)return;
  if(c.type==='audit'){
    let ticked=c.ticked;
    if(!ticked){
      if(btn){btn.disabled=true;btn.textContent='Loading…';}
      try{
        const rows=await sbGet('audit_orders?id=eq.'+c.order.id+'&select=audit_ticked&limit=1');
        ticked=(Array.isArray(rows)&&rows[0]&&rows[0].audit_ticked)?rows[0].audit_ticked:null;
        if(ticked)c.ticked=ticked;
      }finally{if(btn){btn.disabled=false;btn.textContent='Download PDF';}}
    }
    if(!ticked){alert('Job card data not available — try again.');return;}
    genAuditPDF(c.order,ticked);
  }else{
    genInstallPDF(c.order,c.sj,c.jobcard,c.assigned);
  }
}

/* ---- ANALYTICS V2 ---- */
let analyticsFrom='', analyticsTo='';

function _anDstr(d){const z=n=>n<10?'0'+n:n;return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
function _anToIST(iso){return new Date(new Date(iso).getTime()+19800000);}
function _anDateIST(iso){return _anToIST(iso).toISOString().substring(0,10);}
function _anMinsIST(iso){const d=_anToIST(iso);return d.getUTCHours()*60+d.getUTCMinutes();}
function _anParseDateText(text){
  const m=text.match(/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+(\d{4})/i);
  if(!m)return null;
  const mn={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  return _anDstr(new Date(+m[3],mn[m[2].toLowerCase()],+m[1]));
}

async function renderAnalytics(m){
  m.innerHTML='<div class="loading-row"><span class="spinner"></span></div>';
  if(!analyticsFrom){
    const t=new Date();
    analyticsTo=_anDstr(t);
    t.setDate(t.getDate()-6);
    analyticsFrom=_anDstr(t);
  }
  // Use install_orders_slim (no photos in subjobs) to avoid MB-scale payload timeouts.
  // original_delivery_date is not in the slim view — fetch it separately (tiny query).
  // log columns are excluded — pre-July arrival photos were stored as base64 in log, causing MB-scale payloads.
  let installRes,auditRes,ratingsRes;
  try{
    [installRes,auditRes,ratingsRes]=await Promise.all([
      sbGetLong('install_orders_slim?select=pi,status,subjobs,service,delivery_date,created_at&status=neq.deleted'),
      sbGetLong('audit_orders?select=pi,status,date,slot,auditor_name,auditor_email,created_at&status=neq.deleted'),
      sbGetLong('ratings?select=order_type,pi,q1_score,q2_score,q3_score,created_at,staff_name,staff_email'),
    ]);
  }catch(e){
    m.innerHTML=`<div class="page-head"><h1>Analytics</h1></div><div style="padding:24px;color:var(--red);font-weight:600">⚠ Failed to load analytics data — network timeout. Please try again.</div>`;
    return;
  }
  // Fallback for q3_score column not yet in DB
  if(!Array.isArray(ratingsRes)) ratingsRes=await sbGetLong('ratings?select=order_type,pi,q1_score,q2_score,created_at,staff_name,staff_email').catch(()=>[]);
  // Merge original_delivery_date from a lightweight separate query
  const delivMeta=await sbGetLong('install_orders?select=pi,original_delivery_date&status=neq.deleted').catch(()=>[]);
  if(Array.isArray(installRes)&&Array.isArray(delivMeta)){
    const dm={};for(const r of delivMeta)dm[r.pi]=r.original_delivery_date||null;
    for(const o of installRes)o.original_delivery_date=dm[o.pi]||null;
  }
  window._anData={
    installs:Array.isArray(installRes)?installRes:[],
    audits:Array.isArray(auditRes)?auditRes:[],
    ratings:Array.isArray(ratingsRes)?ratingsRes:[],
  };
  try{drawAnalytics(m);}catch(e){
    m.innerHTML=`<div class="page-head"><h1>Analytics</h1></div><div style="padding:24px;color:var(--red);font-weight:600">⚠ Analytics render error: ${e.message}. Please reload.</div>`;
  }
}

// Returns flat list of attempts (one per subjob) within [from,to].
// Completed/partial: counted on actual completion date (from log). In-progress: counted on scheduled date.
function _anInstallAttempts(installs,from,to){
  const out=[];
  for(const o of installs){
    for(const sj of (o.subjobs||[])){
      const isCompleted=['completed','partial'].includes(sj.status);
      const dates=new Set();
      if(isCompleted){
        // Use actual completion date from installer log entry
        const complKey=(sj.type==='wallpaper'?'Wallpaper':'Flooring')+' installation completed';
        for(const l of (o.log||[])){
          if(l.t&&l.d&&l.t.startsWith(complKey)){const cd=_anDateIST(l.d);if(cd)dates.add(cd);}
        }
        // Fall back to scheduled date if no completion log found
        if(!dates.size){
          if(sj.date) dates.add(sj.date);
          for(const a of (sj.assignments||[])){
            if(a.mode==='custom')(a.dates||[]).forEach(d=>dates.add(d));
            else if(a.date) dates.add(a.date);
          }
        }
      } else {
        // Not yet completed: use scheduled date
        if(sj.date) dates.add(sj.date);
        for(const a of (sj.assignments||[])){
          if(a.mode==='custom')(a.dates||[]).forEach(d=>dates.add(d));
          else if(a.date) dates.add(a.date);
        }
      }
      for(const d of dates){
        if(d<from||d>to) continue;
        const asgns=(sj.assignments||[]).filter(a=>a.mode==='custom'?(a.dates||[]).includes(d):a.date===d);
        const primary=asgns.find(a=>a.primary)||asgns[0]||null;
        out.push({
          pi:o.pi, type:sj.type, status:sj.status, date:d,
          slot:primary?(primary.slots&&primary.slots[0])||'':sj.slot||'',
          installers:asgns.length?asgns:(sj.assignments||[]),
          items:sj.items||[],
          auditBy:o.service&&o.service.audit_by,
          hasDelay:!!(o.original_delivery_date&&o.delivery_date&&o.original_delivery_date!==o.delivery_date),
          originalDelivery:o.original_delivery_date||null,
          currentDelivery:o.delivery_date||null,
          order:o,
        });
      }
    }
  }
  return out;
}

// Arrival on time stats keyed by actor name. Only dates >= trackFrom and <= trackTo.
function _anArrivalStats(orders,trackFrom,trackTo,isInstall){
  const map={};
  for(const o of orders){
    for(const l of (o.log||[])){
      if(!l.t||!l.d||!l.who) continue;
      if(!l.t.toLowerCase().includes('arrived at site')) continue;
      const dateIST=_anDateIST(l.d);
      if(dateIST<trackFrom||dateIST>trackTo) continue;
      let slot='';
      if(isInstall){
        for(const sj of (o.subjobs||[])){
          const sjDate=sj.date||(sj.assignments&&sj.assignments[0]&&sj.assignments[0].date)||'';
          if(sjDate===dateIST){
            const a=(sj.assignments||[]).find(a=>a.installer_name===l.who);
            slot=a?(a.slots&&a.slots[0])||'':sj.slot||'';
            break;
          }
        }
      } else {
        if(o.date===dateIST) slot=o.slot||'';
      }
      if(!slot||!/^\d{1,2}:\d{2}$/.test(slot)) continue;
      const [sh,sm2]=slot.split(':').map(Number);
      const diff=_anMinsIST(l.d)-(sh*60+sm2);
      if(!map[l.who]) map[l.who]={onTime:0,late:0};
      if(diff>3) map[l.who].late++; else map[l.who].onTime++;
    }
  }
  return map;
}

function _anInstallerMap(attempts,iRatings,arrMap){
  const map={};
  for(const att of attempts){
    for(const inst of att.installers){
      const k=inst.installer_email||inst.installer_name;
      if(!k) continue;
      if(!map[k]) map[k]={name:inst.installer_name||k,email:inst.installer_email||'',orders:0,completed:0,wfQty:0,wpRolls:0,q1:[],q2:[],q3:[]};
      map[k].orders++;
      if(['completed','partial'].includes(att.status)) map[k].completed++;
      for(const it of att.items){
        if(att.type==='flooring') map[k].wfQty+=parseFloat((it.qty||'').replace(/[^\d.]/g,''))||0;
        else map[k].wpRolls+=parseFloat(it.rolls)||0;
      }
    }
  }
  for(const r of iRatings){
    const k=r.staff_email;if(!k||!map[k]) continue;
    if(r.q1_score) map[k].q1.push(+r.q1_score);
    if(r.q2_score) map[k].q2.push(+r.q2_score);
    if(r.q3_score) map[k].q3.push(+r.q3_score);
  }
  for(const k of Object.keys(map)){
    const ar=arrMap[map[k].name]||{onTime:0,late:0};
    map[k].arrOnTime=ar.onTime; map[k].arrLate=ar.late;
  }
  return Object.values(map).sort((a,b)=>b.orders-a.orders);
}

function _anAuditorMap(auditFiltered,aRatings,arrMap){
  const map={};
  for(const o of auditFiltered){
    const k=o.auditor_email||o.auditor_name;if(!k) continue;
    if(!map[k]) map[k]={name:o.auditor_name||k,email:o.auditor_email||'',orders:0,completed:0,q1:[],q2:[],q3:[]};
    map[k].orders++;
    if(o.status==='completed') map[k].completed++;
  }
  for(const r of aRatings){
    const k=r.staff_email;if(!k||!map[k]) continue;
    if(r.q1_score) map[k].q1.push(+r.q1_score);
    if(r.q2_score) map[k].q2.push(+r.q2_score);
    if(r.q3_score) map[k].q3.push(+r.q3_score);
  }
  for(const k of Object.keys(map)){
    const ar=arrMap[map[k].name]||{onTime:0,late:0};
    map[k].arrOnTime=ar.onTime; map[k].arrLate=ar.late;
  }
  return Object.values(map).sort((a,b)=>b.orders-a.orders);
}

function drawAnalytics(m){
  const {installs,audits,ratings}=window._anData||{installs:[],audits:[],ratings:[]};
  const from=analyticsFrom, to=analyticsTo;
  const todayStr=_anDstr(new Date());
  const TRACK_FROM='2026-07-02'; // arrival on time tracking start date

  // Install: flat attempts in range
  const iAttempts=_anInstallAttempts(installs,from,to);
  const iTotal=iAttempts.length;

  // Audit: completed orders by actual completion date; pending/in-progress by scheduled date
  const aFiltered=audits.filter(o=>o.date&&o.date>=from&&o.date<=to);
  const aTotal=aFiltered.length;

  // Ratings (all-time — not filtered by date range)
  const IR=ratings.filter(r=>r.order_type==='install');
  const AR=ratings.filter(r=>r.order_type==='audit');
  const iRatedPIs=new Set(IR.map(r=>r.pi));
  const aRatedPIs=new Set(AR.map(r=>r.pi));

  // Install calcs
  const iCompleted=iAttempts.filter(a=>['completed','partial'].includes(a.status)).length;
  const iDelayed=iAttempts.filter(a=>a.hasDelay).length;
  const iWithAudit=iAttempts.filter(a=>a.auditBy).length;
  const iExtAudit=iAttempts.filter(a=>a.auditBy==='customer').length;
  const iJobCard=iAttempts.filter(a=>iRatedPIs.has(a.pi)).length;
  const avgA=(arr,k)=>{const vs=arr.filter(r=>r[k]!=null).map(r=>+r[k]);return vs.length?+(vs.reduce((s,v)=>s+v,0)/vs.length).toFixed(1):null;};
  const IR_q1=avgA(IR,'q1_score'),IR_q2=avgA(IR,'q2_score'),IR_q3=avgA(IR,'q3_score');
  const IR_prom=IR.filter(r=>r.q1_score>=9).length,IR_det=IR.filter(r=>r.q1_score<=7).length;
  const IR_nps=IR.length?Math.round((IR_prom-IR_det)/IR.length*100):null;

  // Audit calcs
  const aCompleted=aFiltered.filter(o=>o.status==='completed').length;
  const aJobCard=aFiltered.filter(o=>aRatedPIs.has(o.pi)).length;
  const aRescheduled=aFiltered.filter(o=>o.status==='pending').length;
  const AR_q1=avgA(AR,'q1_score'),AR_q2=avgA(AR,'q2_score'),AR_q3=avgA(AR,'q3_score');
  const AR_prom=AR.filter(r=>r.q1_score>=9).length,AR_det=AR.filter(r=>r.q1_score<=7).length;
  const AR_nps=AR.length?Math.round((AR_prom-AR_det)/AR.length*100):null;

  // Arrival on time: filtered by [max(from,TRACK_FROM), to] so it's scoped to the selected range
  const iTrackFrom=from>TRACK_FROM?from:TRACK_FROM;
  const aTrackFrom=from>TRACK_FROM?from:TRACK_FROM;
  const iArrMap=_anArrivalStats(installs,iTrackFrom,to,true);
  const aArrMap=_anArrivalStats(audits,aTrackFrom,to,false);
  const sumArr=map=>Object.values(map).reduce((s,v)=>({onTime:s.onTime+v.onTime,late:s.late+v.late}),{onTime:0,late:0});
  const iArrTot=sumArr(iArrMap), aArrTot=sumArr(aArrMap);

  // Per-installer / per-auditor
  const installers=_anInstallerMap(iAttempts,IR,iArrMap);
  const auditors=_anAuditorMap(aFiltered,AR,aArrMap);

  // Delivery breakdown
  const origTracked=iAttempts.filter(a=>a.originalDelivery).length;
  const confirmedDelayed=iAttempts.filter(a=>a.originalDelivery&&a.currentDelivery&&a.currentDelivery!==a.originalDelivery).length;

  // Need action — live across all non-deleted install orders
  const naCount=installs.filter(o=>{
    if(['pending','deliv_delayed'].includes(o.status)&&o.delivery_date&&o.delivery_date<=todayStr) return true;
    if((o.subjobs||[]).some(sj=>sj.status==='reschedule')) return true;
    if(o.service&&o.service.follow_up_date&&o.service.follow_up_date<=todayStr) return true;
    return false;
  }).length;

  /* ---- Render helpers ---- */
  const pc=(n,d)=>d>0?Math.round(n/d*100):null;
  const pcc=p=>p===null?'var(--muted)':p>=80?'var(--green)':p>=50?'var(--amber)':'var(--red)';

  function pctCard(label,n,d,sub,note){
    const p=pc(n,d);const c=pcc(p);
    return `<div class="an-card">
      <div class="an-label">${label}</div>
      <div class="an-val" style="color:${p===null?'var(--muted)':c}">${p!==null?p+'%':'—'}</div>
      ${p!==null?`<div class="an-bar"><div class="an-bar-fill" style="width:${p}%;background:${c}"></div></div>`:''}
      <div class="an-sub">${d>0?n+' of '+d:'No data'}</div>

      ${note?`<div class="an-sub2" style="color:var(--amber)">${note}</div>`:''}
    </div>`;
  }
  function ratingCard(label,avg,cnt){
    if(avg===null) return `<div class="an-card an-card-na"><div class="an-label">${label}</div><div class="an-val" style="color:var(--muted)">—</div><div class="an-sub">No ratings yet</div></div>`;
    const c=avg>=8?'var(--green)':avg>=6?'var(--amber)':'var(--red)';

      <div class="an-sub">${cnt} rating${cnt!==1?'s':''} · all-time</div>
    </div>`;

  function npsCard(label,nps,prom,det,total){

    const c=nps>=50?'var(--green)':nps>=0?'var(--amber)':'var(--red)';
    const pass=total-prom-det;
    return `<div class="an-card">

        <span class="an-nps-d">▼ ${total?Math.round(det/total*100):0}% Detractors (Q1 ≤ 7)</span>
      </div>
      <div class="an-sub">${total} rating${total!==1?'s':''} · all-time</div>
    </div>`;
  }

  function arrCell(onTime,late){
    const tot=onTime+late;
    if(!tot) return `<td style="color:var(--muted);font-size:11px">N/T</td>`;
    const p=Math.round(onTime/tot*100);const c=pcc(p);
    return `<td style="color:${c};font-weight:700">${p}%<span style="font-size:10px;color:var(--muted);font-weight:400"> (${tot})</span></td>`;
  }
  function ratingCell(arr){
    if(!arr||!arr.length) return `<td style="color:var(--muted)">—</td>`;
    const avg=+(arr.reduce((s,v)=>s+v,0)/arr.length).toFixed(1);
    const c=avg>=8?'var(--green)':avg>=6?'var(--amber)':'var(--red)';
    return `<td style="color:${c};font-weight:700">${avg}</td>`;
  }

  const instRows=installers.map(inst=>`<tr>
    <td style="font-weight:700">${inst.name}</td>
    <td>${inst.orders}</td>
    <td>${inst.completed}</td>
    ${arrCell(inst.arrOnTime,inst.arrLate)}
    ${ratingCell(inst.q1)}${ratingCell(inst.q2)}${ratingCell(inst.q3)}
    <td style="color:var(--muted);font-size:11px">${inst.wfQty?Math.round(inst.wfQty)+' boxes ':''} ${inst.wpRolls?Math.round(inst.wpRolls)+' rolls':''}</td>
  </tr>`).join('');

  const audRows=auditors.map(aud=>`<tr>
    <td style="font-weight:700">${aud.name}</td>
    <td>${aud.orders}</td>
    <td>${aud.completed}</td>
    ${arrCell(aud.arrOnTime,aud.arrLate)}
    ${ratingCell(aud.q1)}${ratingCell(aud.q2)}${ratingCell(aud.q3)}
  </tr>`).join('');

  const iArrNote=iArrTot.onTime+iArrTot.late===0?'Tracking started 2 Jul 2026':'';
  const aArrNote=aArrTot.onTime+aArrTot.late===0?'Tracking started 2 Jul 2026':'';

  m.innerHTML=`
    <div class="page-head"><h1>Analytics</h1><p>Operational metrics. Each scheduling attempt counted separately — a rescheduled order appears twice if both dates fall in the range.</p></div>

    <div class="an-date-row">
      <span class="an-date-label">Date range</span>
      <input type="date" id="anFrom" class="an-date-inp" value="${from}">
      <span style="color:var(--muted);font-size:13px;padding:0 2px">to</span>

      <button class="an-apply-btn" onclick="analyticsFrom=document.getElementById('anFrom').value;analyticsTo=document.getElementById('anTo').value;drawAnalytics(document.getElementById('main'))">Apply</button>
      <button class="filt-btn" onclick="(function(){const t=new Date();analyticsTo=_anDstr(t);t.setDate(t.getDate()-6);analyticsFrom=_anDstr(t);drawAnalytics(document.getElementById('main'))})()">Last 7 days</button>
      <button class="filt-btn" onclick="(function(){const t=new Date();analyticsTo=_anDstr(t);t.setDate(t.getDate()-29);analyticsFrom=_anDstr(t);drawAnalytics(document.getElementById('main'))})()">Last 30 days</button>
      <button class="filt-btn" onclick="(function(){const t=new Date();analyticsTo=_anDstr(t);t.setDate(t.getDate()-89);analyticsFrom=_anDstr(t);drawAnalytics(document.getElementById('main'))})()">Last 90 days</button>
    </div>

    <!-- ══ SITE INSTALLATION ══════════════════════════════════════════════ -->
    <div class="an-section">

        ${pctCard('Job Card &amp; Signature %',iJobCard,iCompleted,'Proxy: ratings written only after client signs','(completed attempts with rating)')}
        ${pctCard('Installer Arrival On Time %',iArrTot.onTime,iArrTot.onTime+iArrTot.late,'&gt; 3 min past slot = delayed',iArrNote)}
        ${npsCard('NPS Score',IR_nps,IR_prom,IR_det,IR.length)}

async function _drawLiveLocations(m){
  const todayStr=_anDstr(new Date());
  // Fetch today's orders and all field worker profiles in parallel
  const [aOrds,iOrds,allProfs]=await Promise.all([
    sbGet('audit_orders?select=pi,addr,slot,auditor_email,status&date=eq.'+todayStr+'&status=not.in.(deleted)'),
    sbGet('install_orders?select=pi,addr,subjobs,status&status=not.in.(deleted,pending,deliv_ontime,deliv_delayed)'),
    sbGet('profiles?select=name,email,role,last_lat,last_lng,last_loc_at,last_order_pi&role=in.(site_auditor,installer,auditor_installer)')
  ]);
  if(!Array.isArray(allProfs)){
    m.innerHTML=`<div class="page-head"><h1>Live Locations</h1></div><div style="padding:24px;color:var(--amber);font-weight:600">⚠ Location columns not yet added to the database. Run the SQL from setup instructions to enable this feature.</div>`;
    return;
  }
  // Build profile lookup and today-order lookup
  const profMap={};for(const p of allProfs)profMap[p.email]=p;
  const wOrds={};
  const addOrd=(email,e)=>{if(!email)return;if(!wOrds[email])wOrds[email]=[];wOrds[email].push(e);};
  const parseSlotH=s=>{if(!s)return 99;const r=s.match(/^(\d{1,2}):(\d{2})$/);return r?+r[1]+ +r[2]/60:99;};
  const fmtSlot=s=>{if(!s)return'—';const r=s.match(/^(\d{1,2}):(\d{2})$/);if(!r)return s;const h=+r[1],mn=+r[2],ap=h>=12?'PM':'AM',h12=h%12||12;return h12+':'+(mn<10?'0':'')+mn+' '+ap;};
  if(Array.isArray(aOrds)){
    for(const o of aOrds)addOrd(o.auditor_email,{pi:o.pi,addr:o.addr||'',slot:o.slot,slotH:parseSlotH(o.slot),done:o.status==='completed'});
  }
  if(Array.isArray(iOrds)){
    for(const o of iOrds){
      for(const sj of(o.subjobs||[])){
        for(const a of(sj.assignments||[])){
          const dates=a.dates||(a.date?[a.date]:[]);
          if(!dates.includes(todayStr))continue;
          const slot=(a.slots&&a.slots[0])||sj.slot||null;
          addOrd(a.installer_email,{pi:o.pi,addr:o.addr||'',slot,slotH:parseSlotH(slot),done:['completed','partial'].includes(sj.status)});
        }
      }
    }
  }
  for(const e of Object.keys(wOrds))wOrds[e].sort((a,b)=>a.slotH-b.slotH);
  // All workers with orders today; sort: GPS first, then no-GPS; within GPS group by last_loc_at desc
  const todayEmails=Object.keys(wOrds);
  const workers=todayEmails.map(e=>profMap[e]).filter(Boolean);
  workers.sort((a,b)=>{
    const aHasLoc=!!a.last_lat,bHasLoc=!!b.last_lat;
    if(aHasLoc!==bHasLoc)return aHasLoc?-1:1;
    if(a.last_loc_at&&b.last_loc_at)return new Date(b.last_loc_at)-new Date(a.last_loc_at);
    return 0;
  });
  const workerCN=email=>{const ords=wOrds[email]||[];const inc=ords.filter(o=>!o.done);return{cur:inc[0]||null,nxt:inc[1]||null};};
  const ago=d=>{if(!d)return'—';const s=Math.round((Date.now()-new Date(d))/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';return Math.floor(s/3600)+'h ago';};
  const trA=a=>(a||'').length>45?a.slice(0,45)+'…':a||'—';
  const rows=workers.length?workers.map(w=>{
    const{cur,nxt}=workerCN(w.email);
    const openCell=w.last_lat
      ?`<a href="https://maps.google.com/?q=${w.last_lat},${w.last_lng}" target="_blank" rel="noopener" style="color:var(--blue);font-weight:700;text-decoration:none">📍 Open</a>`
      :`<span style="color:var(--muted);font-size:11px">No GPS</span>`;
    return`<tr>
      <td style="font-weight:700">${w.name||w.email}</td>
      <td style="color:var(--muted);font-size:12px">${trA(cur?cur.addr:'')}</td>
      <td style="color:${w.last_lat?'var(--muted)':'var(--red)'}">${w.last_lat?ago(w.last_loc_at):'Not sharing'}</td>
      <td>${cur?cur.pi:(w.last_order_pi||'—')}</td>
      <td style="color:var(--muted)">${cur?fmtSlot(cur.slot):'—'}</td>
      <td style="color:var(--muted)">${nxt?fmtSlot(nxt.slot):'—'}</td>
      <td>${openCell}</td>
    </tr>`;
  }).join(''):`<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:28px">No field workers have orders scheduled for today.</td></tr>`;
  m.innerHTML=`
    <div class="page-head"><h1>Live Locations</h1><p style="color:var(--muted);font-size:13px">All field workers with orders today — auto-refreshes every 30 seconds.</p></div>
    <div id="liveMapEl" style="height:380px;border-radius:14px;overflow:hidden;margin:0 0 20px;border:1px solid var(--line);background:#e8eaed"></div>
    <table style="width:100%;border-collapse:collapse">
      <thead><tr style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)">
        <th style="text-align:left;padding:6px 8px">Worker</th><th style="text-align:left;padding:6px 8px">Address</th>
        <th style="text-align:left;padding:6px 8px">Last seen</th><th style="text-align:left;padding:6px 8px">Order</th>
        <th style="text-align:left;padding:6px 8px">Current start</th><th style="text-align:left;padding:6px 8px">Next start</th><th style="padding:6px 8px"></th>
      </tr></thead>
      <tbody style="font-size:13px">${rows}</tbody>
    </table>`;
  const escH=s=>(s||'').replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));
  const mkIcon=name=>L.divIcon({className:'',html:`<div style="text-align:center;display:inline-block"><svg width="22" height="32" viewBox="0 0 24 36" style="display:block;margin:0 auto"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z" fill="#2E6CA8"/><circle cx="12" cy="12" r="5" fill="#fff"/></svg><div style="background:rgba(31,58,95,0.92);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;white-space:nowrap;margin-top:2px;box-shadow:0 1px 4px rgba(0,0,0,0.25)">${name}</div></div>`,iconSize:[80,52],iconAnchor:[40,32]});
  const gpsWorkers=workers.filter(w=>w.last_lat&&w.last_lng);
  if(window.L&&gpsWorkers.length){
    try{
      const center=[gpsWorkers[0].last_lat,gpsWorkers[0].last_lng];
      const lmap=L.map('liveMapEl',{zoomControl:true}).setView(center,13);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors',maxZoom:18}).addTo(lmap);
      gpsWorkers.forEach(w=>{
        const{cur}=workerCN(w.email);
        const nm=escH(w.name||w.email.split('@')[0]);
        L.marker([w.last_lat,w.last_lng],{icon:mkIcon(nm)})
          .bindPopup(`<b>${w.name||w.email}</b><br>${cur?'Order: '+cur.pi+'<br>':''}${cur&&cur.addr?cur.addr+'<br>':''}${ago(w.last_loc_at)}`)
          .addTo(lmap);
      });
      if(gpsWorkers.length>1){const grp=L.featureGroup(gpsWorkers.map(w=>L.marker([w.last_lat,w.last_lng])));lmap.fitBounds(grp.getBounds().pad(0.3));}
    }catch(e){}
  }else if(window.L){
    try{const lmap=L.map('liveMapEl').setView([12.9716,77.5946],11);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors'}).addTo(lmap);}catch(e){}
  }
}
