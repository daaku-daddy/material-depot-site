<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Material Depot — Service Manager · Site Audit</title>
<style>
  :root{
    --navy:#1F3A5F;--navy2:#16294a;--blue:#2E6CA8;--yellow:#F4C20D;
    --ink:#1b2230;--muted:#67748a;--line:#e2e7ef;--bg:#eef1f6;--card:#fff;
    --lighter:#eef3f9;--green:#1f7a3f;--greenbg:#e6f3ea;--amber:#9a6200;--amberbg:#fdf2da;
    --red:#b3261e;--redbg:#fbeae8;--purple:#5b3aa6;--purplebg:#efeaf8;
    --shadow:0 1px 2px rgba(20,40,80,.05),0 6px 18px rgba(20,40,80,.04);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;}
  header{background:var(--navy);color:#fff;padding:0 18px;display:flex;align-items:center;gap:14px;height:56px;position:sticky;top:0;z-index:40;}
  header .logo{width:34px;height:34px;border-radius:8px;background:var(--yellow);color:var(--navy);font-weight:800;display:grid;place-items:center;font-size:15px;}
  header .t{font-size:10px;color:#9fb2cd;letter-spacing:1px;font-weight:700;}
  header .h{font-size:15px;font-weight:700;line-height:1.1;}
  .vtoggle{margin-left:18px;display:flex;background:var(--navy2);border-radius:9px;padding:3px;}
  .vtoggle button{border:0;background:transparent;color:#9fb2cd;font-weight:700;font-size:13px;padding:7px 14px;border-radius:7px;cursor:pointer;}
  .vtoggle button.active{background:var(--yellow);color:#222;}
  .vtoggle button.disabled{opacity:.45;cursor:not-allowed;}
  header .right{margin-left:auto;display:flex;align-items:center;gap:14px;}
  header .who{font-size:12px;color:#cdd8e8;text-align:right;line-height:1.2;}
  header .who b{color:#fff;font-size:13px;}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:grid;place-items:center;font-weight:700;font-size:13px;}
  .layout{display:flex;min-height:calc(100vh - 56px);}
  .rail{width:208px;background:#fff;border-right:1px solid var(--line);padding:14px 10px;flex:0 0 auto;}
  .rail .grp{font-size:10px;letter-spacing:.8px;color:var(--muted);font-weight:800;margin:14px 8px 6px;}
  .rail a{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;color:var(--ink);text-decoration:none;font-weight:600;font-size:13.5px;cursor:pointer;margin:2px 0;}
  .rail a .ico{width:18px;text-align:center;opacity:.8;}
  .rail a:hover{background:var(--lighter);}
  .rail a.active{background:var(--navy);color:#fff;}
  .rail a .ct{margin-left:auto;font-size:11px;background:var(--lighter);color:var(--navy);border-radius:20px;padding:1px 8px;font-weight:800;}
  .rail a.active .ct{background:rgba(255,255,255,.18);color:#fff;}
  main{flex:1;min-width:0;padding:18px 22px 60px;}
  .crumbs{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600;}
  .pagehead{display:flex;align-items:flex-end;gap:14px;margin-bottom:14px;}
  .pagehead h1{font-size:21px;margin:0;color:var(--navy);letter-spacing:-.3px;}
  .pagehead p{margin:2px 0 0;color:var(--muted);font-size:13px;}
  .pagehead .actions{margin-left:auto;display:flex;gap:8px;}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;}
  .stat:hover{border-color:var(--blue);}
  .stat .n{font-size:24px;font-weight:800;color:var(--navy);letter-spacing:-.5px;}
  .stat .l{font-size:11.5px;color:var(--muted);font-weight:700;margin-top:1px;}
  .stat .b{height:3px;border-radius:3px;margin-top:8px;background:var(--line);}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .search{flex:1;min-width:200px;position:relative;}
  .search input{width:100%;padding:9px 11px 9px 32px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;background:#fff;}
  .search .ico{position:absolute;left:10px;top:9px;color:var(--muted);}
  .filt{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:3px;flex-wrap:wrap;}
  .filt button{border:0;background:transparent;padding:6px 11px;border-radius:7px;font-weight:700;font-size:12.5px;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .filt button.active{background:var(--navy);color:#fff;}
  .tablecard{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:auto;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:#f7f9fc;text-align:left;font-size:10.5px;letter-spacing:.5px;color:var(--muted);font-weight:800;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;text-transform:uppercase;}
  tbody td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:0;}
  tbody tr[data-pi]{cursor:pointer;}
  tbody tr[data-pi]:hover{background:#f9fbfd;}
  .pi{font-weight:800;color:var(--navy);font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;}
  .po{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;color:var(--muted);}
  .pill-list{display:flex;gap:4px;flex-wrap:wrap;}
  .skupill{font-size:10.5px;background:var(--lighter);color:var(--navy);border-radius:6px;padding:2px 7px;font-weight:700;white-space:nowrap;}
  .skupill.audit{background:#fff4d6;color:#7a5800;}
  .cust b{color:var(--ink);} .cust div{color:var(--muted);font-size:11.5px;}
  .maplink{color:var(--blue);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:4px;}
  .maplink:hover{text-decoration:underline;}
  .maplink .pin{font-size:12px;}
  .audtag{font-weight:700;font-size:12.5px;}
  .audtag.none{color:var(--red);}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:20px;padding:4px 10px;white-space:nowrap;}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
  .c-pending{background:#eef1f6;color:#5a6b86;}
  .c-created{background:var(--purplebg);color:var(--purple);}
  .c-call_na{background:var(--redbg);color:var(--red);}
  .c-scheduled{background:#e4f0fb;color:var(--blue);}
  .c-assigned{background:var(--amberbg);color:var(--amber);}
  .c-reschedule{background:var(--redbg);color:var(--red);}
  .c-onway{background:#e8f0ff;color:#2b54c2;}
  .c-atsite{background:#e9e3fb;color:#5b3aa6;}
  .c-completed{background:var(--greenbg);color:var(--green);}
  .autobadge{font-size:9px;font-weight:800;letter-spacing:.5px;background:#dfeafd;color:#2b54c2;border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle;}
  .btn{border:0;border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .btn.primary{background:var(--blue);color:#fff;}
  .btn.navy{background:var(--navy);color:#fff;}
  .btn.green{background:var(--green);color:#fff;}
  .btn.ghost{background:#fff;color:var(--blue);border:1px solid var(--blue);}
  .btn.gray{background:#fff;color:var(--muted);border:1px solid var(--line);}
  .btn.danger{background:#fff;color:var(--red);border:1px solid #e3b4ad;}
  .btn.sm{padding:6px 11px;font-size:12px;}
  .btn:disabled{opacity:.45;cursor:not-allowed;}
  .scrim{position:fixed;inset:0;background:rgba(15,25,45,.42);opacity:0;pointer-events:none;transition:.2s;z-index:50;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .moverlay{position:fixed;inset:0;background:rgba(15,25,45,.55);z-index:80;display:none;align-items:center;justify-content:center;padding:20px;}
  .moverlay.show{display:flex;}
  .mcard{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:92vh;overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.28);}
  .mhead{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;position:sticky;top:0;background:#fff;z-index:1;}
  .mhead h3{font-size:16px;font-weight:800;color:var(--navy);}
  .mclose{margin-left:auto;background:none;border:0;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px;}
  .mbody{padding:20px;display:grid;gap:14px;}
  .mfoot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:#fff;}
  .mfield label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
  .mfield input,.mfield select,.mfield textarea{width:100%;padding:10px 12px;border:2px solid var(--line);border-radius:9px;font-size:14px;color:var(--ink);background:#fff;font-family:inherit;}
  .mfield input:focus,.mfield select:focus,.mfield textarea:focus{outline:none;border-color:var(--blue);}
  .mfield textarea{resize:vertical;min-height:70px;}
  .mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .merr{background:var(--redbg);color:var(--red);border-radius:8px;padding:9px 12px;font-size:12.5px;font-weight:600;display:none;}
  .merr.show{display:block;}
  .cbgroup{display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;}
  .cbgroup label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;cursor:pointer;}
  .cbgroup input[type=checkbox]{width:15px;height:15px;accent-color:var(--navy);}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:580px;max-width:94vw;background:#fff;box-shadow:-12px 0 40px rgba(10,20,40,.18);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:55;display:flex;flex-direction:column;}
  .drawer.show{transform:none;}
  .dhead{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px;position:sticky;top:0;background:#fff;}
  .dhead h2{margin:0;font-size:17px;color:var(--navy);}
  .dhead .sub{color:var(--muted);font-size:12px;margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .dhead .x{margin-left:auto;border:0;background:#f0f3f8;width:30px;height:30px;border-radius:8px;font-size:16px;cursor:pointer;color:var(--muted);}
  .dbody{padding:18px 20px;overflow:auto;flex:1;}
  .sec{margin-bottom:20px;}
  .sec h3{font-size:11px;letter-spacing:.6px;color:var(--muted);font-weight:800;text-transform:uppercase;margin:0 0 9px;display:flex;align-items:center;gap:8px;}
  .kv{display:grid;grid-template-columns:130px 1fr;gap:7px 14px;font-size:13px;}
  .kv .k{color:var(--muted);font-weight:600;}
  .kv .v{font-weight:600;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;background:#fff;}
  .field input:disabled{background:#f5f7fa;color:#56627a;}
  .autofill{font-size:10.5px;color:var(--green);font-weight:800;background:var(--greenbg);border-radius:5px;padding:1px 6px;margin-left:6px;}
  .skugroup{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:12px;}
  .skugroup .gh{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .skugroup .gh .gt{font-weight:800;font-size:13px;color:var(--navy);}
  .skugroup .gh .tog{margin-left:auto;}
  .switch{position:relative;width:38px;height:22px;border-radius:20px;background:#cfd6e0;cursor:pointer;transition:.15s;flex:0 0 auto;}
  .switch.on{background:var(--green);}
  .switch:after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;}
  .switch.on:after{left:18px;}
  .skurow{margin-bottom:10px;background:var(--lighter);border-radius:9px;padding:8px;}
  .skurow .sr-top{display:flex;gap:6px;align-items:center;}
  .skurow .sr-top input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;}
  .skurow input.link{width:100%;box-sizing:border-box;margin-top:5px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;background:#fff;}
  .skurow .del{border:0;background:#fbeae8;color:var(--red);border-radius:8px;width:34px;height:34px;cursor:pointer;font-weight:800;flex:0 0 auto;}
  .addsku{border:1px dashed var(--blue);background:#fff;color:var(--blue);border-radius:8px;padding:7px;font-weight:700;font-size:12.5px;cursor:pointer;width:100%;}
  .stepline{display:flex;gap:0;margin-bottom:8px;}
  .step{flex:1;text-align:center;position:relative;cursor:pointer;}
  .step .ball{width:24px;height:24px;border-radius:50%;background:#e7ecf3;color:var(--muted);font-size:11px;font-weight:800;display:grid;place-items:center;margin:0 auto 5px;border:2px solid #e7ecf3;}
  .step.done .ball{background:var(--green);color:#fff;border-color:var(--green);}
  .step.active .ball{background:#fff;color:var(--blue);border-color:var(--blue);}
  .step .lb{font-size:10px;color:var(--muted);font-weight:700;line-height:1.2;}
  .step.active .lb{color:var(--blue);}
  .step:not(:last-child):after{content:"";position:absolute;top:11px;left:60%;right:-40%;height:2px;background:#e7ecf3;}
  .step.done:not(:last-child):after{background:var(--green);}
  .stephint{font-size:11px;color:var(--muted);text-align:center;margin-bottom:16px;}
  .timeline{border-left:2px solid var(--line);margin-left:6px;padding-left:16px;}
  .tl{position:relative;padding-bottom:14px;}
  .tl:before{content:"";position:absolute;left:-22px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--blue);}
  .tl.auto:before{background:#2b54c2;} .tl.manual:before{background:var(--amber);}
  .tl .tt{font-weight:700;font-size:13px;}
  .tl .td{font-size:11.5px;color:var(--muted);}
  .slotgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;}
  .slot{border:1px solid var(--line);border-radius:9px;padding:9px;text-align:center;cursor:pointer;background:#fff;}
  .slot.on{border-color:var(--blue);background:#f3f8fd;}
  .slot.full{opacity:.45;cursor:not-allowed;background:#f6f7f9;}
  .slot .w{font-weight:800;font-size:12.5px;color:var(--navy);}
  .slot .cap{font-size:10.5px;color:var(--muted);margin-top:2px;}
  .note{background:var(--lighter);border-left:4px solid var(--blue);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--navy);margin:10px 0;}
  .statusmenu{display:flex;flex-wrap:wrap;gap:7px;}
  .statusmenu button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 12px;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--muted);}
  .statusmenu button:hover{border-color:var(--blue);color:var(--blue);}
  .statusmenu button.cur{background:var(--navy);color:#fff;border-color:var(--navy);}
  .auditorlist{display:flex;flex-direction:column;gap:8px;}
  .auditorrow{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;background:#fff;}
  .auditorrow.on{border-color:var(--blue);background:#f3f8fd;}
  .auditorrow.full{opacity:.5;cursor:not-allowed;}
  .auditorrow .av{width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;}
  .auditorrow .nm{font-weight:700;font-size:13.5px;} .auditorrow .mt{font-size:11.5px;color:var(--muted);}
  .auditorrow .load{margin-left:auto;font-size:11.5px;font-weight:800;}
  .dfoot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:9px;background:#fff;flex-wrap:wrap;}
  .dfoot .btn{flex:1;justify-content:center;min-width:120px;}
  .calwrap{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow);}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .daycell{border:1px solid var(--line);border-radius:10px;padding:9px;min-height:104px;}
  .daycell .dn{font-size:11px;color:var(--muted);font-weight:700;}
  .daycell.past{opacity:.5;background:#f7f8fa;}
  .daycell .avs{margin-top:6px;font-size:11px;font-weight:800;color:var(--navy);}
  .daycell .cap{font-size:10px;color:var(--blue);font-weight:700;margin-top:3px;}
  .daycell .bk{font-size:10px;color:var(--muted);margin-top:2px;}
  .dow{font-size:10px;color:var(--muted);font-weight:800;text-align:center;padding-bottom:4px;letter-spacing:.5px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11.5px;color:var(--muted);}
  .capgrid{overflow:auto;}
  .capgrid table{min-width:600px;}
  .capgrid td input{width:46px;padding:5px;border:1px solid var(--line);border-radius:7px;text-align:center;font-weight:800;font-size:13px;}
  .capgrid td.audname{font-weight:700;color:var(--navy);position:sticky;left:0;background:#fff;white-space:nowrap;}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--navy2);color:#fff;padding:12px 20px;border-radius:30px;font-size:13.5px;opacity:0;transition:.25s;z-index:80;box-shadow:0 10px 30px rgba(0,0,0,.3);font-weight:600;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hide{display:none!important;}
  @media(max-width:900px){.rail{display:none;}.stats{grid-template-columns:repeat(2,1fr);}.calgrid{grid-template-columns:repeat(4,1fr);}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<header>
  <div class="logo">MD</div>
  <div><div class="t">MATERIAL DEPOT</div><div class="h">Service Manager</div></div>
  <div class="vtoggle">
    <button class="active" id="vSiteAudit">Site Audit</button>
    <button id="vInstall">Installations</button>
  </div>
  <div class="right">
    <div class="who"><b id="smName">…</b><br>Service Manager</div>
    <div class="avatar" id="signOut" title="Sign out" style="cursor:pointer" id="smAvatar">SM</div>
  </div>
</header>

<div class="layout">
  <nav class="rail" id="rail">
    <div class="grp">SITE AUDIT</div>
    <a class="active" data-view="orders"><span class="ico">&#9638;</span>Orders<span class="ct" id="cOrders">0</span></a>
    <a data-view="schedule"><span class="ico">&#9719;</span>Today's schedule<span class="ct" id="cToday">0</span></a>
    <a data-view="reschedule"><span class="ico">&#8635;</span>To reschedule<span class="ct" id="cResched">0</span></a>
    <a data-view="calendar"><span class="ico">&#9636;</span>Availability calendar</a>
    <div class="grp">SETUP</div>
    <a data-view="slots"><span class="ico">&#9716;</span>Slots &amp; timings</a>
    <a data-view="auditors"><span class="ico">&#9673;</span>Auditors &amp; caps</a>
    <div class="grp">RECORDS</div>
    <a data-view="deleted"><span class="ico">🗑</span>Deleted Orders<span class="ct" id="cDeleted"></span></a>
  </nav>
  <main id="main"></main>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="dhead">
    <div>
      <h2 id="dwTitle">Order</h2>
      <div class="sub" id="dwSub"></div>
    </div>
    <button class="x" id="dwClose">&#10005;</button>
  </div>
  <div class="dbody" id="dwBody"></div>
  <div class="dfoot" id="dwFoot"></div>
</aside>

<div class="toast" id="toast"></div>

<div class="moverlay" id="addOrderOverlay">
  <div class="mcard">
    <div class="mhead">
      <h3>Add New Audit Order</h3>
      <button class="mclose" onclick="closeAddOrder()">×</button>
    </div>
    <div class="mbody">
      <div class="mrow">
        <div class="mfield">
          <label>PI Number *</label>
          <input id="ao-pi" placeholder="PI-2026-00XXX">
        </div>
        <div class="mfield">
          <label>PO Numbers</label>
          <input id="ao-po" placeholder="PO-WF-1234, PO-ACC-1235">
        </div>
      </div>
      <div class="mrow">
        <div class="mfield">
          <label>Customer Name *</label>
          <input id="ao-name" placeholder="Full name">
        </div>
        <div class="mfield">
          <label>Customer Phone *</label>
          <input id="ao-phone" placeholder="98XXX XXXXX" inputmode="tel">
        </div>
      </div>
      <div class="mfield">
        <label>Address *</label>

<script>
/* ============== SUPABASE ============== */
const SB_URL='https://jqrdfnjfxqxrazfkaofm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmRmbmpmeHF4cmF6Zmthb2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTU5NTcsImV4cCI6MjA5NjY3MTk1N30.2mvCPc0E_vDn2WaID5sEjwU4Dyj53rhevGrSPBa3__g';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
async function sbGet(q){const r=await fetch(SB_URL+'/rest/v1/'+q,{headers:H});return r.json();}
async function sbPost(t,b){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});const j=await r.json();if(!r.ok)throw new Error(j.message||j.error||'DB error '+r.status);return j;}
async function sbPatch(t,id,b){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok){const j=await r.json();throw new Error(j.message||j.error||'DB error '+r.status);}}
async function sbDel(t,id){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'DELETE',headers:H});if(!r.ok){const j=await r.json();throw new Error(j.message||j.error||'DB error '+r.status);}}
function getSession(){try{return JSON.parse(sessionStorage.getItem('md_user')||'null');}catch{return null;}}

const SESSION=getSession();
if(!SESSION||SESSION.role!=='service_mgr'){window.location.href='Login.html';}
document.getElementById('smName').textContent=SESSION?SESSION.name:'';
(function(){const av=document.getElementById('signOut');if(av&&SESSION)av.textContent=SESSION.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();})();

/* ============== CONFIG ============== */
const AUDIT_SKU="SVC-AUDIT-001";
let SLOTS=[{id:"s1",label:"9 AM – 12 PM"},{id:"s2",label:"12 PM – 3 PM"},{id:"s3",label:"3 PM – 6 PM"}];

let AUDITORS=[];

const today=new Date();today.setHours(0,0,0,0);
function dstr(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dd}`;}
function addDays(n){const d=new Date(today);d.setDate(d.getDate()+n);return d;}

// PER-AUDITOR, PER-DATE caps. CAPS[auditorId][yyyy-mm-dd] = number. Default applied if absent.
const DEFAULT_CAP=3;
const CAPS={};
function capFor(aid,ds){const c=CAPS[aid];if(c&&c[ds]!==undefined)return c[ds];return DEFAULT_CAP;}
function setCap(aid,ds,v){if(!CAPS[aid])CAPS[aid]={};CAPS[aid][ds]=v;}
// auditors available on a date = those with cap>=1
function auditorsAvailable(ds){return AUDITORS.filter(a=>capFor(a.id,ds)>=1).length;}
// total daily throughput = sum of caps
function dailyTotalCap(ds){return AUDITORS.reduce((s,a)=>s+capFor(a.id,ds),0);}

const STATUS={
  pending:{l:"Pending",c:"c-pending"},
  created:{l:"Service Created",c:"c-created"},
  call_na:{l:"Call not picked",c:"c-call_na"},
  scheduled:{l:"Site Audit Scheduled",c:"c-scheduled"},
  assigned:{l:"Site Auditor Assigned",c:"c-assigned"},
  callpending:{l:"Call Pending (Auditor)",c:"c-assigned"},
  reschedule:{l:"To Reschedule",c:"c-reschedule"},
  onway:{l:"On The Way",c:"c-onway"},
  atsite:{l:"At Site",c:"c-atsite"},
  completed:{l:"Site Audit Completed",c:"c-completed"},
};
// which statuses are normally set by the AUDITOR (auto-reflected) vs the SM (manual)
const AUTO_STATUSES=["onway","atsite","completed"];
const FLOW=["pending","created","scheduled","assigned","completed"];

function mapUrl(addr){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(addr);}

let ORDERS=[],DELETED=[];

/* ============== SUPABASE LOAD ============== */
async function loadAuditors(){
  try{
    const rows=await sbGet('profiles?role=eq.site_auditor&select=id,name,email');
    AUDITORS=(Array.isArray(rows)?rows:[]).map(r=>({id:r.id,name:r.name,email:r.email,zone:'',phone:'',cap:DEFAULT_CAP}));
    AUDITORS.forEach(a=>{if(!CAPS[a.id])CAPS[a.id]={};});
  }catch(e){console.error('loadAuditors',e);}
}

async function loadOrders(){
  try{
    const rows=await sbGet('audit_orders?select=*&order=created_at.desc');
    if(!Array.isArray(rows)){return;}
    const mapRow=r=>({
      id:r.id,
      pi:r.pi||'',
      po:r.po?r.po.split(',').map(s=>s.trim()).filter(Boolean):[],
      skus:r.skus||[],
      auditTicked:r.audit_ticked||null,
      bm:r.bm||'—',
      name:r.customer_name||'',
      phone:r.phone||'',
      addr:r.addr||'',
      status:r.status||'pending',
      service:r.service||null,
      slot:r.slot||null,
      date:r.date||null,
      auditor:r.auditor_id||null,
      auditorName:r.auditor_name||null,
      auditorEmail:r.auditor_email||null,
      log:r.log||[]
    });
    DELETED=rows.filter(r=>r.status==='deleted').map(mapRow);
    ORDERS=rows.filter(r=>r.status!=='deleted').map(mapRow);
    const drawerOpen=document.querySelector("#drawer")&&document.querySelector("#drawer").classList.contains("show");
    if(!drawerOpen)render();else counts();
  }catch(e){console.error('loadOrders',e);}
}

/* ============== HELPERS ============== */
const $=s=>document.querySelector(s);
const fmtDate=ds=>{if(!ds)return "—";const d=new Date(ds+"T00:00");return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});};
const slotLabel=id=>(SLOTS.find(s=>s.id===id)||{}).label||"—";
const auditorById=id=>AUDITORS.find(a=>a.id===id);
function getAuditorName(o){if(!o.auditor)return null;const a=auditorById(o.auditor);return a?a.name:(o.auditorName||'?');}
const initials=n=>n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
function chip(st){const s=STATUS[st]||{l:st,c:'c-pending'};return `<span class="chip ${s.c}"><span class="dot"></span>${s.l}</span>`;}
function mapLink(addr){return `<a class="maplink" href="${mapUrl(addr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="pin">&#128205;</span>${addr}</a>`;}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2400);}

const BOOKED=["scheduled","assigned","onway","atsite","completed"];
function slotUsage(date,slotId){return ORDERS.filter(o=>o.date===date&&o.slot===slotId&&BOOKED.includes(o.status)).length;}
function auditorLoad(aid,date){return ORDERS.filter(o=>o.auditor===aid&&o.date===date&&["assigned","onway","atsite","completed"].includes(o.status)).length;}

let activeView="orders",filterStatus="all",searchQ="",currentPI=null;

/* ============== NAV COUNTS ============== */
function counts(){
  $("#cOrders").textContent=ORDERS.length;
  $("#cToday").textContent=ORDERS.filter(o=>o.date===dstr(today)).length;
  $("#cResched").textContent=ORDERS.filter(o=>o.status==="reschedule").length;
  if($("#cDeleted"))$("#cDeleted").textContent=DELETED.length||'';
}

/* ============== RENDER ============== */
function render(){
  counts();
  document.querySelectorAll("#rail a").forEach(a=>a.classList.toggle("active",a.dataset.view===activeView));
  const m=$("#main");
  if(activeView==="orders")m.innerHTML=ordersView();
  else if(activeView==="schedule")m.innerHTML=scheduleView();
  else if(activeView==="reschedule")m.innerHTML=reschedView();
  else if(activeView==="calendar")m.innerHTML=calendarView();
  else if(activeView==="slots")m.innerHTML=slotsView();
  else if(activeView==="auditors")m.innerHTML=auditorsView();
  else if(activeView==="deleted")m.innerHTML=deletedView();
  wire();
}
function statTile(n,l,col,key){return `<div class="stat" data-stat="${key}"><div class="n" style="color:${col}">${n}</div><div class="l">${l}</div><div class="b" style="background:${col}"></div></div>`;}

function ordersView(){
  const c={};Object.keys(STATUS).forEach(k=>c[k]=0);ORDERS.forEach(o=>c[o.status]++);
  const live=c.scheduled+c.assigned+c.onway+c.atsite;
  const stats=`<div class="stats">
    ${statTile(ORDERS.length,"Live audit orders","#1F3A5F","all")}
    ${statTile(c.pending+c.created+c.call_na,"Need action","#b3261e","action")}
    ${statTile(live,"Scheduled / in progress","#2E6CA8","live")}
    ${statTile(c.reschedule,"To reschedule","#9a6200","reschedule")}
    ${statTile(c.completed,"Completed","#1f7a3f","completed")}</div>`;
  const filters=["all","pending","created","scheduled","assigned","reschedule","completed"];
  const fbtns=filters.map(f=>`<button class="${filterStatus===f?'active':''}" data-filter="${f}">${f==="all"?"All":STATUS[f]?STATUS[f].l:f}</button>`).join("");
  const rows=ORDERS.filter(o=>{
    if(filterStatus!=="all"){
      if(filterStatus==="action")return ["pending","created","call_na"].includes(o.status);
      if(filterStatus==="live")return ["scheduled","assigned","onway","atsite"].includes(o.status);
      if(o.status!==filterStatus)return false;
    }
    if(searchQ){const q=searchQ.toLowerCase();return (o.pi+o.name+o.phone+o.bm+o.skus.map(s=>s.c).join()).toLowerCase().includes(q);}
    return true;
  }).map(o=>{
    const skupills=o.skus.map(s=>`<span class="skupill ${s.audit?'audit':''}">${s.c}</span>`).join("");
    const aud=o.auditor?`<span class="audtag">${getAuditorName(o)}</span>`:`<span class="audtag none">Unassigned</span>`;
    return `<tr data-pi="${o.pi}">
      <td><div class="pi">${o.pi}</div><div class="po">${o.po.join(" · ")}</div></td>
      <td><div class="pill-list">${skupills}</div></td>
      <td><div class="cust"><b>${o.name}</b><div>${o.phone}</div></div></td>
      <td style="max-width:180px">${mapLink(o.addr)}</td>
      <td>${fmtDate(o.date)}</td>
      <td>${aud}</td>
      <td>${chip(o.status)}</td></tr>`;
  }).join("");
  return `<div class="crumbs">Site Audit / Orders</div>
  <div class="pagehead"><div><h1>Audit orders</h1><p>Every confirmed order containing the Site Audit SKU (${AUDIT_SKU}). Click a row to manage.</p></div>
    <div class="actions"><button class="btn navy sm" onclick="openAddOrder()">+ Add New Order</button></div></div>
  ${stats}
  <div class="toolbar"><div class="search"><span class="ico">&#9906;</span><input id="q" placeholder="Search PI, customer, phone, SKU…" value="${searchQ}"/></div>
    <div class="filt">${fbtns}</div></div>
  <div class="tablecard"><table>
    <thead><tr><th>PI / PO</th><th>SKUs in cart</th><th>Customer</th><th>Address</th><th>Audit date</th><th>Auditor allocated</th><th>Status</th></tr></thead>
    <tbody>${rows||`<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:30px">No orders match.</td></tr>`}</tbody>
  </table></div>`;
}

function scheduleView(){
  const list=ORDERS.filter(o=>o.date===dstr(today)).sort((a,b)=>(a.slot||"").localeCompare(b.slot||""));
  const rows=list.map(o=>`<tr data-pi="${o.pi}">
    <td><b>${slotLabel(o.slot)}</b></td><td><div class="pi">${o.pi}</div></td>
    <td><div class="cust"><b>${o.name}</b><div>${o.phone}</div></div></td>
    <td style="max-width:170px">${mapLink(o.addr)}</td>
    <td>${o.auditor?getAuditorName(o):'<span style="color:var(--red);font-weight:700">Unassigned</span>'}</td>
    <td>${chip(o.status)}</td></tr>`).join("");
  return `<div class="crumbs">Site Audit / Today's schedule</div>
  <div class="pagehead"><div><h1>Today — ${fmtDate(dstr(today))}</h1><p>Live view of today's audits and auditor progress.</p></div></div>
  <div class="tablecard"><table>
   <thead><tr><th>Slot</th><th>PI</th><th>Customer</th><th>Address</th><th>Auditor</th><th>Live status</th></tr></thead>
   <tbody>${rows||`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">No audits scheduled today.</td></tr>`}</tbody></table></div>`;
}

function reschedView(){
  const list=ORDERS.filter(o=>o.status==="reschedule");
  const rows=list.map(o=>`<tr data-pi="${o.pi}">
    <td><div class="pi">${o.pi}</div></td>
    <td><div class="cust"><b>${o.name}</b><div>${o.phone}</div></div></td>
    <td style="max-width:170px">${mapLink(o.addr)}</td>
    <td>${fmtDate(o.date)} · ${slotLabel(o.slot)}</td>
    <td>${o.auditor?getAuditorName(o):"—"}</td>
    <td><button class="btn primary sm" data-rebook="${o.pi}">Call &amp; rebook</button></td></tr>`).join("");
  return `<div class="crumbs">Site Audit / To reschedule</div>
  <div class="pagehead"><div><h1>To reschedule</h1><p>Auto-flagged when an auditor marks an order To Reschedule. Call the customer and rebook.</p></div></div>
  <div class="tablecard"><table>
   <thead><tr><th>PI</th><th>Customer</th><th>Address</th><th>Was booked</th><th>Auditor</th><th></th></tr></thead>
   <tbody>${rows||`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">Nothing to reschedule.</td></tr>`}</tbody></table></div>`;
}

function calendarView(){
  const dows=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let cells="";const startDow=today.getDay();
  for(let i=0;i<startDow;i++)cells+=`<div></div>`;
  for(let i=0;i<28;i++){
    const d=addDays(i);const ds=dstr(d);const past=d<today;
    const avail=auditorsAvailable(ds);const total=dailyTotalCap(ds);
    const booked=ORDERS.filter(o=>o.date===ds&&BOOKED.includes(o.status)).length;
    cells+=`<div class="daycell ${past?'past':''}">
      <div class="dn">${d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
      <div class="avs">${avail} auditors</div>
      <div class="cap">${avail}/window · ${total} max/day</div>
      <div class="bk">${booked} booked</div></div>`;
  }
  return `<div class="crumbs">Site Audit / Availability calendar</div>
  <div class="pagehead"><div><h1>Availability calendar</h1><p>Per-window capacity = auditors available that day. Edit each auditor's daily cap under Auditors &amp; caps.</p></div></div>
  <div class="calwrap"><div class="calgrid">${dows.map(d=>`<div class="dow">${d}</div>`).join("")}${cells}</div>
   <div class="legend"><span>An auditor is “available” on a day when their daily cap is 1 or more. Each available auditor opens <b>one booking in every window</b>.</span></div></div>`;
}

function slotsView(){
  const rows=SLOTS.map((s,i)=>`<tr><td><b>Window ${i+1}</b></td>
    <td><input class="slotedit" data-i="${i}" value="${s.label}" style="padding:8px;border:1px solid var(--line);border-radius:8px;width:200px"/></td>
    <td><button class="btn danger sm" data-delslot="${i}">Delete</button></td></tr>`).join("");
  return `<div class="crumbs">Setup / Slots &amp; timings</div>
  <div class="pagehead"><div><h1>Slots &amp; timings</h1><p>Add, rename, or delete windows. Capacity per window comes from auditor availability.</p></div>
   <div class="actions"><button class="btn ghost sm" id="addSlot">+ Add window</button><button class="btn navy sm" id="saveSlots">Save</button></div></div>
  <div class="tablecard"><table><thead><tr><th>Window</th><th>Timing</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function auditorsView(){
  // editable per-day cap grid: rows = auditors, cols = next 7 days
  const days=[];for(let i=0;i<7;i++)days.push(addDays(i));
  const headDays=days.map(d=>`<th>${d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric'})}</th>`).join("");
  const rows=AUDITORS.map(a=>{
    const cells=days.map(d=>{const ds=dstr(d);return `<td><input type="number" min="0" value="${capFor(a.id,ds)}" data-cap="${a.id}" data-date="${ds}"></td>`;}).join("");
    return `<tr><td class="audname">${a.name}<div style="font-weight:500;color:var(--muted);font-size:11px">${a.zone} · ${a.phone}</div></td>${cells}</tr>`;
  }).join("");
  return `<div class="crumbs">Setup / Auditors &amp; caps</div>
  <div class="pagehead"><div><h1>Auditors &amp; daily caps</h1><p>Set each auditor's max jobs per day, varied by date. 0 = unavailable that day.</p></div>
   <div class="actions"><button class="btn navy sm" id="saveCaps">Save caps</button></div></div>
  <div class="note">Default cap when left untouched is ${DEFAULT_CAP}/day. Caps drive both window capacity (availability) and the assignment limit.</div>
  <div class="tablecard capgrid"><table><thead><tr><th class="audname">Auditor</th>${headDays}</tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ============== DRAWER ============== */
function openOrder(pi){
  currentPI=pi;const o=ORDERS.find(x=>x.pi===pi);if(!o)return;
  $("#dwTitle").textContent=o.name;
  $("#dwSub").innerHTML=`${o.pi} · BM ${o.bm} ${chip(o.status)}`;
  $("#dwBody").innerHTML=drawerBody(o);
  $("#dwFoot").innerHTML=drawerFoot(o);
  $("#scrim").classList.add("show");$("#drawer").classList.add("show");
  wireDrawer(o);
}
function closeDrawer(){$("#scrim").classList.remove("show");$("#drawer").classList.remove("show");currentPI=null;render();}

function stepper(o){
  let reached=FLOW.indexOf(o.status);
  if(["assigned","onway","atsite"].includes(o.status))reached=FLOW.indexOf("assigned");
  if(o.status==="call_na"||o.status==="reschedule")reached=FLOW.indexOf("created");
  if(o.status==="completed")reached=FLOW.length-1;
  const labels=["Pending","Service<br>created","Scheduled","Auditor<br>assigned","Completed"];
  return `<div class="stepline">${FLOW.map((s,i)=>`<div class="step ${i<reached?'done':''} ${i===reached?'active':''}" data-goto="${s}"><div class="ball">${i<reached?'&#10003;':i+1}</div><div class="lb">${labels[i]}</div></div>`).join("")}</div>
  <div class="stephint">Tap any earlier step to move the order back if you misclicked.</div>`;
}

function drawerBody(o){
  let html=stepper(o);
  const skupills=o.skus.map(s=>`<span class="skupill ${s.audit?'audit':''}">${s.c} · ${s.n}</span>`).join(" ");
  html+=`<div class="sec"><h3>Order</h3><div class="kv">
    <div class="k">PI ID</div><div class="v">${o.pi}</div>
    <div class="k">PO numbers</div><div class="v">${o.po.join(", ")}</div>
    <div class="k">SKUs in cart</div><div class="v"><div class="pill-list">${skupills}</div></div>
    <div class="k">Audit ticked for</div><div class="v">${Array.isArray(o.auditTicked)?o.auditTicked.join(", ")||"—":"—"}</div>
    <div class="k">BM</div><div class="v">${o.bm}</div></div></div>`;
  html+=`<div class="sec"><h3>Customer</h3><div class="kv">
    <div class="k">Name</div><div class="v">${o.name}</div>
    <div class="k">Phone</div><div class="v">${o.phone}</div>
    <div class="k">Address</div><div class="v">${mapLink(o.addr)}</div></div></div>`;

  // Manual status override — always available
  html+=`<div class="sec"><h3>Set status <span style="font-weight:600;color:var(--muted);text-transform:none;letter-spacing:0">— manual override</span></h3>
    <div class="note">Some statuses update automatically from the auditor (<b>On the way</b>, <b>At site</b>, <b>Completed</b>). You can also set any status manually here — e.g. <b>Call not picked</b>.</div>
    <div class="statusmenu" id="statusMenu">
      ${Object.keys(STATUS).map(k=>`<button data-setstatus="${k}" class="${o.status===k?'cur':''}">${STATUS[k].l}${AUTO_STATUSES.includes(k)?'<span class="autobadge">AUTO</span>':''}</button>`).join("")}
    </div></div>`;

  if(o.status==="pending"){
    html+=serviceCreationPanel(o);
  } else if(["created","call_na"].includes(o.status)){
    html+=`<div class="sec"><h3>Acknowledgement call &amp; slot</h3>
      <div class="note">Call the customer to confirm a date &amp; slot. Free slots reflect auditor availability per window.</div>
      ${o.status==="call_na"?`<div class="note" style="border-color:var(--red);color:var(--red);background:var(--redbg)">Marked “Call not picked”. Retry, then book when reached.</div>`:""}
      <div class="field"><label>Audit date</label><input type="date" id="bookDate" min="${dstr(today)}" value="${dstr(addDays(1))}"></div>
      <div class="field"><label>Slot</label><div class="slotgrid" id="slotGrid"></div></div></div>`;
  } else if(o.status==="scheduled"){
    html+=`<div class="sec"><h3>Assign auditor <span style="font-weight:600;color:var(--muted);text-transform:none;letter-spacing:0">— a day before</span></h3>
      <div class="kv" style="margin-bottom:10px"><div class="k">Booked for</div><div class="v">${fmtDate(o.date)} · ${slotLabel(o.slot)}</div></div>
      <div class="note">Only auditors under their daily cap on ${fmtDate(o.date)} are selectable. Assigning SMSes the auditor's details to the customer.</div>
      <div class="auditorlist" id="auditorList"></div></div>`;
  } else if(["assigned","onway","atsite"].includes(o.status)){
    const a=auditorById(o.auditor);const aPhone=a?a.phone:'—';
    html+=`<div class="sec"><h3>Assignment</h3><div class="kv">
      <div class="k">Auditor</div><div class="v">${getAuditorName(o)} (${aPhone})</div>
      <div class="k">Slot</div><div class="v">${fmtDate(o.date)} · ${slotLabel(o.slot)}</div>
      <div class="k">Live status</div><div class="v">${chip(o.status)}</div></div>
      <div class="note">Auditor's live steps appear here automatically. Customer was notified of the auditor by SMS.</div></div>`;
  } else if(o.status==="reschedule"){
    html+=`<div class="sec"><h3>Reschedule</h3>
      <div class="note" style="border-color:var(--red);color:var(--red);background:var(--redbg)">Customer declined the auditor's pre-visit call. Call to rebook.</div>
      <div class="field"><label>New date</label><input type="date" id="bookDate" min="${dstr(today)}" value="${dstr(addDays(1))}"></div>
      <div class="field"><label>Slot</label><div class="slotgrid" id="slotGrid"></div></div></div>`;
  } else if(o.status==="completed"){
    const ticked=o.auditTicked;
    const hasRooms=ticked&&!Array.isArray(ticked)&&Array.isArray(ticked.rooms)&&ticked.rooms.length;
    const FL=[['Area (sq.ft)','area'],['Boxes','boxes'],['Skirting (nos)','skirt'],['Skirting height (mm)','skirtH'],['L-profile','lprof'],['R-profile / Reducer','rprof'],['T-profile','tprof'],['Corner beading','corner']];
    const WP=[['Wall area (sq.ft)','warea'],['No. of rolls','rolls'],['Pattern repeat (mm)','repeat'],['Match type','match'],['Adhesive (packs)','adh'],['Primer','primer']];
    const roomsHtml=hasRooms?ticked.rooms.map((r,i)=>{
      const fields=r.type==='wallpaper'?WP:FL;
      const meas=fields.filter(([,k])=>r.calc&&r.calc[k]).map(([l,k])=>`<div class="k">${l}</div><div class="v">${r.calc[k]}</div>`).join('');
      return `<div style="border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px">
        <div style="font-weight:800;color:var(--navy);margin-bottom:8px">Room ${i+1}: ${r.name||'—'} <span style="font-weight:600;color:var(--muted);font-size:11.5px">${r.type==='wallpaper'?'Wallpaper':'Flooring'} · SKU: ${r.sku||'NA'}</span></div>
        ${meas?`<div class="kv">${meas}</div>`:'<div style="color:var(--muted);font-size:12px">No measurements recorded.</div>'}
        ${r.notes?`<div style="margin-top:8px;font-size:12px;color:var(--muted)">Notes: ${r.notes}</div>`:''}
      </div>`;
    }).join(''):'';
    html+=`<div class="sec"><h3>Completed</h3><div class="kv">
      <div class="k">Auditor</div><div class="v">${getAuditorName(o)||ticked?.auditor||'—'}</div>
      <div class="k">Completed</div><div class="v">${fmtDate(o.date)} · ${slotLabel(o.slot)}</div>
      ${hasRooms?`<div class="k">Rooms</div><div class="v">${ticked.rooms.length}</div>`:''}
      ${hasRooms&&ticked.sign?`<div class="k">Signed by</div><div class="v">${ticked.sign.name||'—'}</div>`:''}</div>
      ${hasRooms?`<div class="note" style="border-color:var(--green);color:var(--green);background:var(--greenbg)">Job Card PDF generated and signed by client.</div><button class="btn ghost" id="dlAuditPdfSM" style="margin-top:8px">&#128229; Download Job Card PDF</button>`:`<div class="note" style="border-color:var(--amber);color:var(--amber);background:var(--amberbg)">This audit was completed before detailed room capture was available. No room data on record.</div>`}
      ${roomsHtml?`<div style="margin-top:14px"><div style="font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Rooms audited</div>${roomsHtml}</div>`:''}
    </div>`;
  }

  html+=`<div class="sec"><h3>Activity</h3><div class="timeline">${o.log.slice().reverse().map(l=>`<div class="tl ${l.by||''}"><div class="tt">${l.t}</div><div class="td">${l.d}${l.by==='auto'?' · auto from auditor':l.by==='manual'?' · manual':''}</div></div>`).join("")}</div></div>`;
  return html;
}

/* ============== DRAWER WIRING ============== */
let draft={};
function wireDrawer(o){
  draft={flooring:[],wallpaper:[],slot:null,date:null,auditor:null};
  if(o.service){draft.flooring=(o.service.flooring||[]).map(x=>({...x}));draft.wallpaper=(o.service.wallpaper||[]).map(x=>({...x}));}
  $("#dwClose").onclick=closeDrawer;
  if($("#dClose"))$("#dClose").onclick=closeDrawer;

  // stepper back-navigation (free backward to any prior stage)
  document.querySelectorAll(".step[data-goto]").forEach(st=>st.onclick=async()=>{
    const target=st.dataset.goto;const curIdx=FLOW.indexOf(o.status);
    let curEff=curIdx;
    if(["assigned","onway","atsite"].includes(o.status))curEff=FLOW.indexOf("assigned");
    if(o.status==="completed")curEff=FLOW.length-1;
    if(o.status==="call_na"||o.status==="reschedule")curEff=FLOW.indexOf("created");
    const tIdx=FLOW.indexOf(target);
    if(tIdx>=curEff)return; // only backward
    o.status=target;
    // clear forward data
    if(tIdx<FLOW.indexOf("assigned"))o.auditor=null;
    if(tIdx<FLOW.indexOf("scheduled")){o.slot=null;o.date=null;}
    o.log.push({t:"Moved back to "+STATUS[target].l+" by SM",d:"Just now",by:"manual"});
    if(o.id){
      const patch={status:o.status,log:o.log};
      if(tIdx<FLOW.indexOf("assigned")){patch.auditor_id=null;patch.auditor_name=null;patch.auditor_email=null;}
      if(tIdx<FLOW.indexOf("scheduled")){patch.slot=null;patch.date=null;}
      await sbPatch('audit_orders',o.id,patch);
    }
    await loadOrders();toast("Moved back to "+STATUS[target].l);openOrder(o.pi);
  });

  // manual status override
  document.querySelectorAll("[data-setstatus]").forEach(b=>b.onclick=async()=>{
    const st=b.dataset.setstatus;if(st===o.status)return;
    o.status=st;
    o.log.push({t:"Status set to "+STATUS[st].l+(AUTO_STATUSES.includes(st)?" (manually)":""),d:"Just now",by:"manual"});
    if(o.id)await sbPatch('audit_orders',o.id,{status:o.status,log:o.log});
    await loadOrders();toast("Status: "+STATUS[st].l);openOrder(o.pi);
  });

  // ---- service creation interactions ----
  function renderSkuRows(grp){
    const box=document.querySelector(`[data-rows="${grp}"]`);if(!box)return;
    box.innerHTML=draft[grp].map((r,i)=>`<div class="skurow">
      <div class="sr-top">
        <input placeholder="SKU Code" value="${r.sku||''}" data-grp="${grp}" data-i="${i}" data-f="sku">
        <input placeholder="SKU Name" value="${r.name||''}" data-grp="${grp}" data-i="${i}" data-f="name">
        <button class="del" data-delrow="${grp}" data-i="${i}">&times;</button>
      </div>
      <input class="link" placeholder="SKU Link (optional)" value="${r.link||''}" data-grp="${grp}" data-i="${i}" data-f="link">
    </div>`).join("");
    box.querySelectorAll("input").forEach(inp=>inp.oninput=()=>{draft[inp.dataset.grp][inp.dataset.i][inp.dataset.f]=inp.value;});
    box.querySelectorAll("[data-delrow]").forEach(btn=>btn.onclick=()=>{draft[btn.dataset.delrow].splice(+btn.dataset.i,1);renderSkuRows(grp);updateNANote();});
  }
  function updateNANote(){const n=$("#naNote");if(n)n.style.display=(draft.flooring.length||draft.wallpaper.length)?'none':'block';}
  document.querySelectorAll(".tog").forEach(sw=>sw.onclick=()=>{
    const grp=sw.dataset.tog;const on=!sw.classList.contains("on");sw.classList.toggle("on",on);
    const rows=document.querySelector(`[data-rows="${grp}"]`),add=document.querySelector(`[data-add="${grp}"]`);
    rows.classList.toggle("hide",!on);add.classList.toggle("hide",!on);
    if(on&&draft[grp].length===0){draft[grp].push({sku:"",name:"",link:""});renderSkuRows(grp);}
    if(!on)draft[grp]=[];
    updateNANote();
  });
  document.querySelectorAll("[data-add]").forEach(btn=>btn.onclick=()=>{const grp=btn.dataset.add;draft[grp].push({sku:"",name:"",link:""});renderSkuRows(grp);updateNANote();});
  if($("#statusMenu")){ if(draft.flooring.length)renderSkuRows("flooring"); if(draft.wallpaper.length)renderSkuRows("wallpaper"); }
  // initial render of any prefilled rows
  if(document.querySelector('[data-rows="flooring"]')&&draft.flooring.length)renderSkuRows("flooring");
  if(document.querySelector('[data-rows="wallpaper"]')&&draft.wallpaper.length)renderSkuRows("wallpaper");

  if($("#createService"))$("#createService").onclick=async()=>{
    const fl=draft.flooring.filter(r=>r.sku||r.name),wp=draft.wallpaper.filter(r=>r.sku||r.name);
    o.service={flooring:fl,wallpaper:wp};o.status="created";
    const summary=(fl.length?("Flooring: "+fl.map(r=>r.sku+(r.name?" · "+r.name:"")).join(", ")):"")+
                  (wp.length?(" | Wallpaper: "+wp.map(r=>r.sku+(r.name?" · "+r.name:"")).join(", ")):"");
    o.log.push({t:"Service created — "+(summary||"NA (no SKU fixed)"),d:"Just now",by:"manual"});
    if(o.id)await sbPatch('audit_orders',o.id,{status:o.status,service:o.service,log:o.log});
    await loadOrders();toast("Service created");openOrder(o.pi);
  };

  // ---- slot booking ----
  function renderSlots(){
    const grid=$("#slotGrid");if(!grid)return;const date=$("#bookDate").value;draft.date=date;
    const winCap=auditorsAvailable(date);
    grid.innerHTML=SLOTS.map(s=>{
      const used=slotUsage(date,s.id);const free=winCap-used;const full=free<=0;
      return `<div class="slot ${draft.slot===s.id?'on':''} ${full?'full':''}" data-slot="${s.id}">
        <div class="w">${s.label}</div><div class="cap">${full?'Full':free+' of '+winCap+' free'}</div></div>`;
    }).join("");
    grid.querySelectorAll(".slot:not(.full)").forEach(el=>el.onclick=()=>{draft.slot=el.dataset.slot;renderSlots();const b=$("#bookSlot");if(b)b.disabled=!draft.slot;});
  }
  if($("#bookDate")){$("#bookDate").onchange=()=>{draft.slot=null;renderSlots();const b=$("#bookSlot");if(b)b.disabled=true;};renderSlots();}
  if($("#bookSlot"))$("#bookSlot").onclick=async()=>{o.date=draft.date;o.slot=draft.slot;o.status="scheduled";
    o.log.push({t:"Slot booked: "+fmtDate(o.date)+" · "+slotLabel(o.slot),d:"Just now",by:"manual"});
    if(o.id)await sbPatch('audit_orders',o.id,{status:o.status,slot:o.slot,date:o.date,log:o.log});
    await loadOrders();toast("Slot booked — "+fmtDate(o.date));openOrder(o.pi);};

  // ---- auditor assignment ----
  if($("#auditorList")){
    const list=$("#auditorList");
    list.innerHTML=AUDITORS.map(a=>{
      const cap=capFor(a.id,o.date);const load=auditorLoad(a.id,o.date);const full=cap<1||load>=cap;
      return `<div class="auditorrow ${full?'full':''} ${draft.auditor===a.id?'on':''}" data-aud="${a.id}">
        <div class="av">${initials(a.name)}</div>
        <div><div class="nm">${a.name}</div><div class="mt">${a.zone} · ${a.phone}</div></div>
        <div class="load" style="color:${full?'var(--red)':'var(--green)'}">${load}/${cap}${full?' · full':''}</div></div>`;
    }).join("");
    list.querySelectorAll(".auditorrow:not(.full)").forEach(el=>el.onclick=()=>{
      draft.auditor=el.dataset.aud;list.querySelectorAll(".auditorrow").forEach(r=>r.classList.remove("on"));el.classList.add("on");$("#assignAuditor").disabled=false;});
  }
  if($("#assignAuditor"))$("#assignAuditor").onclick=async()=>{o.auditor=draft.auditor;o.status="assigned";const a=auditorById(o.auditor);
    o.log.push({t:"Auditor assigned: "+a.name+" · SMS sent to customer with auditor details",d:"Just now",by:"manual"});
    if(o.id)await sbPatch('audit_orders',o.id,{status:o.status,auditor_id:a.id,auditor_name:a.name,auditor_email:a.email,log:o.log});
    await loadOrders();toast("Assigned "+a.name+" · customer notified");openOrder(o.pi);};

  if($("#dlAuditPdfSM"))$("#dlAuditPdfSM").onclick=async()=>{
    const btn=$("#dlAuditPdfSM");const orig=btn.innerHTML;btn.disabled=true;btn.textContent="Building PDF…";
    try{
      let ticked=o.auditTicked;
      if(!ticked||!ticked.rooms){const rows=await sbGet('audit_orders?id=eq.'+o.id+'&select=audit_ticked');if(Array.isArray(rows)&&rows[0])ticked=rows[0].audit_ticked;}
      if(!ticked||!ticked.rooms){toast("No job card data found");btn.disabled=false;btn.innerHTML=orig;return;}
      await genAuditPDFSM(o,ticked);
    }catch(e){toast("PDF failed: "+e.message);}
    btn.disabled=false;btn.innerHTML=orig;
  };

  if($("#delOrder"))$("#delOrder").onclick=async()=>{
    if(!confirm("Move order "+o.pi+" to Deleted Orders?\nIt will be stored and can be recovered from the Deleted Orders section."))return;
    const btn=$("#delOrder");btn.disabled=true;btn.textContent="Deleting…";
    try{
      if(o.id)await sbPatch('audit_orders',o.id,{status:'deleted'});
      closeDrawer();await loadOrders();toast("Order "+o.pi+" moved to Deleted Orders");
    }catch(e){toast("Delete failed — "+e.message);btn.disabled=false;btn.innerHTML="🗑 Delete";}
  };

}

/* ---- Add New Order modal ---- */
function openAddOrder(){
  document.getElementById("addOrderOverlay").classList.add("show");
  document.getElementById("ao-pi").focus();
}
function closeAddOrder(){
  document.getElementById("addOrderOverlay").classList.remove("show");
  ["ao-pi","ao-po","ao-name","ao-phone","ao-addr","ao-bm","ao-skus"].forEach(id=>{document.getElementById(id).value="";});
  ["ao-fl","ao-wp","ao-cwp"].forEach(id=>{document.getElementById(id).checked=false;});
  document.getElementById("ao-err").classList.remove("show");
}
async function submitAddOrder(){
  const pi    = document.getElementById("ao-pi").value.trim();
  const poRaw = document.getElementById("ao-po").value.trim();
  const name  = document.getElementById("ao-name").value.trim();
  const phone = document.getElementById("ao-phone").value.trim();
  const addr  = document.getElementById("ao-addr").value.trim();
  const bm    = document.getElementById("ao-bm").value.trim() || "—";
  const skuRaw= document.getElementById("ao-skus").value.trim();
  const err   = document.getElementById("ao-err");
  err.classList.remove("show");

  if(!pi){err.textContent="PI Number is required.";err.classList.add("show");return;}
  if(!name){err.textContent="Customer name is required.";err.classList.add("show");return;}
  if(!phone){err.textContent="Customer phone is required.";err.classList.add("show");return;}
  if(!addr){err.textContent="Address is required.";err.classList.add("show");return;}
  if(ORDERS.find(o=>o.pi===pi)){err.textContent="An order with this PI number already exists.";err.classList.add("show");return;}

  const po = poRaw ? poRaw.split(",").map(s=>s.trim()).filter(Boolean) : [];
  const skus = skuRaw ? skuRaw.split(",").map(s=>s.trim()).filter(Boolean).map(c=>({c,n:c,audit:false})) : [];
  skus.push({c:AUDIT_SKU,n:"Site Audit",audit:true});

  const ticked=[];
  if(document.getElementById("ao-fl").checked)ticked.push("Wooden Flooring");
  if(document.getElementById("ao-wp").checked)ticked.push("Standard Wallpapers");
  if(document.getElementById("ao-cwp").checked)ticked.push("Custom Wallpapers");

  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const logEntry={t:"Order added manually by "+SESSION.name,d:"Today "+now};

  document.getElementById("ao-submit").disabled=true;
  try{
    const saved=await sbPost('audit_orders',{
      pi, po:po.join(','), skus, audit_ticked:ticked, bm,
      customer_name:name, phone, addr, status:'pending',
      log:[logEntry], created_by_email:SESSION.email
    });
    const row=Array.isArray(saved)?saved[0]:saved;
    ORDERS.unshift({
      id:row?row.id:null,
      pi,po,skus,auditTicked:ticked,bm,
      status:"pending",name,phone,addr,
      service:null,slot:null,date:null,auditor:null,
      auditorName:null,auditorEmail:null,
      log:[logEntry]
    });
    closeAddOrder();
    render();
    toast("✓ Audit order "+pi+" saved");
  }catch(e){
    err.textContent="Save failed: "+e.message;err.classList.add("show");
  }
  document.getElementById("ao-submit").disabled=false;
}
document.getElementById("addOrderOverlay").addEventListener("click",e=>{if(e.target.id==="addOrderOverlay")closeAddOrder();});

/* ============== AUDIT PDF (SM) ============== */
function _renderSketchSM(r){
  if(!r.sketchStrokes||!r.sketchStrokes.length)return null;
  const W=1000,H=500;const c=document.createElement('canvas');c.width=W;c.height=H;const x=c.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,H);const s=Math.round(22*(W/360));x.fillStyle='#b2b8c1';
  for(let yy=s;yy<H;yy+=s)for(let xx=s;xx<W;xx+=s){x.beginPath();x.arc(xx,yy,2,0,7);x.fill();}
  x.strokeStyle='#1F3A5F';x.lineWidth=3.2;x.lineJoin='round';x.lineCap='round';
  for(const st of r.sketchStrokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*W,Y=p.y*H;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}
  return c.toDataURL('image/jpeg',0.85);
}
async function _compressSM(dataUrl){
  if(!dataUrl)return null;
  return new Promise(res=>{const im=new Image();im.onload=()=>{const s=Math.min(1,1200/im.width,900/im.height);const w=Math.round(im.width*s),h=Math.round(im.height*s);const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(im,0,0,w,h);res(cv.toDataURL('image/jpeg',0.65));};im.onerror=()=>res(null);im.src=dataUrl;});
}
const _FL_SM=[{k:'area',label:'Area (sq.ft)'},{k:'boxes',label:'Boxes'},{k:'skirt',label:'Skirting (nos)'},{k:'skirtH',label:'Skirting height (mm)'},{k:'lprof',label:'L-profile (nos)'},{k:'rprof',label:'R-profile / Reducer (nos)'},{k:'tprof',label:'T-profile (nos)'},{k:'corner',label:'Corner beading (nos)'}];
const _WP_SM=[{k:'warea',label:'Wall area (sq.ft)'},{k:'rolls',label:'No. of rolls'},{k:'repeat',label:'Pattern repeat (mm)'},{k:'match',label:'Match type'},{k:'adh',label:'Adhesive (packs)'},{k:'primer',label:'Primer needed'}];
async function genAuditPDFSM(o,ticked){
  const {jsPDF}=window.jspdf;const doc=new jsPDF('p','pt','a4');
  const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight(),M=40;let y=M;
  const navy=[31,58,95],blue=[46,108,168],muted=[90,100,120];
  const rooms=ticked.rooms||[];
  function hdr(){doc.setFillColor(...navy);doc.rect(M,y,34,34,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);doc.text('MD',M+9,y+22);doc.setFontSize(10);doc.setTextColor(...blue);doc.text('MATERIAL DEPOT',M+44,y+13);doc.setFontSize(15);doc.setTextColor(...navy);doc.text('Site Audit Job Card',M+44,y+30);y+=46;doc.setDrawColor(...navy);doc.setLineWidth(1.2);doc.line(M,y,W-M,y);y+=14;}
  hdr();
  doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',styles:{fontSize:9,cellPadding:5,lineColor:[210,216,225]},columnStyles:{0:{cellWidth:130,fontStyle:'bold',textColor:navy,fillColor:[238,243,249]}},
    body:[['Proforma Invoice No.',o.pi||''],['Client Name',o.name||''],['Client Mobile',o.phone||''],['Site Address',o.addr||''],['BM',o.bm||''],['Auditor',ticked.auditor||'—'],['Date',fmtDate(o.date)]]});
  y=doc.lastAutoTable.finalY+10;
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...navy);doc.text('Rooms summary',M,y+4);y+=10;
  doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',headStyles:{fillColor:navy,fontSize:8.5},styles:{fontSize:8.5,cellPadding:4,lineColor:[210,216,225]},head:[['#','Room','Type','SKU']],body:rooms.map((r,i)=>[String(i+1),r.name||'-',r.type==='wallpaper'?'Wallpaper':'Flooring',r.sku||'NA'])});
  for(let i=0;i<rooms.length;i++){const r=rooms[i];
    doc.addPage();y=M;hdr();
    const flds=r.type==='wallpaper'?_WP_SM:_FL_SM;
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...navy);doc.text('Room '+(i+1)+': '+(r.name||'-'),M,y+2);y+=14;
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(...muted);doc.text((r.type==='wallpaper'?'Wallpaper':'Wooden Flooring')+'  ·  SKU: '+(r.sku||'NA'),M,y+10);y+=24;
    doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',headStyles:{fillColor:navy,fontSize:9},styles:{fontSize:9,cellPadding:5,lineColor:[210,216,225]},columnStyles:{0:{cellWidth:230,fontStyle:'bold',textColor:navy,fillColor:[238,243,249]}},head:[['Calculation','Value']],body:flds.map(f=>[f.label,(r.calc&&r.calc[f.k])||''])});
    y=doc.lastAutoTable.finalY+12;
    const colW=(W-2*M-12)/2;const ih=colW*0.78;
    const sk=_renderSketchSM(r);
    if(sk){doc.setFontSize(8.5);doc.setTextColor(...muted);doc.text('2D Diagram',M,y);try{doc.addImage(sk,'JPEG',M,y+6,colW,ih);}catch(e){}}
    const photos=r.photos||(r.photo?[r.photo]:[]);
    if(photos.length){const p0=await _compressSM(photos[0]);if(p0){doc.setFontSize(8.5);doc.setTextColor(...muted);doc.text('Room Photo',M+(sk?colW+12:0),y);try{doc.addImage(p0,'JPEG',M+(sk?colW+12:0),y+6,colW,ih);}catch(e){}}}
    y+=ih+18;
    for(let pi=1;pi<photos.length;pi++){const ph=await _compressSM(photos[pi]);if(ph){const pw=W-2*M,pih=pw*0.55;if(y+pih>H-M){doc.addPage();y=M;hdr();}doc.setFontSize(8.5);doc.setTextColor(...muted);doc.text('Photo '+(pi+1),M,y);try{doc.addImage(ph,'JPEG',M,y+6,pw,pih);}catch(e){}y+=pih+14;}}
    if(r.notes){doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(...navy);doc.text('Notes',M,y);y+=12;doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);doc.text(doc.splitTextToSize(r.notes,W-2*M),M,y);}
  }
  doc.addPage();y=M;hdr();
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...navy);doc.text('Client Acknowledgement',M,y+4);y+=26;
  doc.setFont('helvetica','normal');doc.setFontSize(10.5);doc.setTextColor(40,40,40);
  doc.text(doc.splitTextToSize("I confirm that the site audit for the above order has been carried out by the Material Depot auditor, that the rooms, measurements and details recorded in this Job Card are correct, and that I am satisfied with the service provided.",W-2*M),M,y);y+=70;
  doc.setFontSize(10);doc.setTextColor(...muted);doc.text('Client name: '+((ticked.sign&&ticked.sign.name)||o.name||''),M,y);y+=18;doc.text('Date: '+fmtDate(o.date),M,y);
  const sigW=200,sigH=80,sx=W-M-sigW,sy=H-M-sigH-24;
  if(ticked.sign&&ticked.sign.img){const si=await _compressSM(ticked.sign.img);if(si)try{doc.addImage(si,'JPEG',sx,sy-10,sigW,sigH);}catch(e){}}
  doc.setDrawColor(...muted);doc.setLineWidth(.8);doc.line(sx,sy+sigH-6,sx+sigW,sy+sigH-6);
  doc.setFontSize(9.5);doc.setTextColor(...muted);doc.text('Client signature',sx,sy+sigH+10);
  doc.save(('SiteAudit_'+(o.name||'client')+'_'+(o.pi||'')+'.pdf').replace(/[^a-z0-9_\-\.]/gi,'_'));
}
