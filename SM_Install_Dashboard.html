<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Material Depot — Service Manager · Installations</title>
<style>
  :root{
    --navy:#1F3A5F;--navy2:#16294a;--blue:#2E6CA8;--yellow:#F4C20D;
    --ink:#1b2230;--muted:#67748a;--line:#e2e7ef;--bg:#eef1f6;--card:#fff;
    --lighter:#eef3f9;--green:#1f7a3f;--greenbg:#e6f3ea;--amber:#9a6200;--amberbg:#fdf2da;
    --red:#b3261e;--redbg:#fbeae8;--purple:#5b3aa6;--purplebg:#efeaf8;--teal:#0f6e74;--tealbg:#e1f1f1;
    --shadow:0 1px 2px rgba(20,40,80,.05),0 6px 18px rgba(20,40,80,.04);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;}
  header{background:var(--navy);color:#fff;padding:0 18px;display:flex;align-items:center;gap:14px;height:56px;position:sticky;top:0;z-index:40;}
  header .logo{width:34px;height:34px;border-radius:8px;background:var(--yellow);color:var(--navy);font-weight:800;display:grid;place-items:center;font-size:15px;}
  header .t{font-size:10px;color:#9fb2cd;letter-spacing:1px;font-weight:700;}
  header .h{font-size:15px;font-weight:700;line-height:1.1;}
  .vtoggle{margin-left:18px;display:flex;background:var(--navy2);border-radius:9px;padding:3px;}
  .vtoggle button{border:0;background:transparent;color:#9fb2cd;font-weight:700;font-size:13px;padding:7px 14px;border-radius:7px;cursor:pointer;}
  .vtoggle button.active{background:var(--yellow);color:#222;}
  header .right{margin-left:auto;display:flex;align-items:center;gap:14px;}
  header .who{font-size:12px;color:#cdd8e8;text-align:right;line-height:1.2;}
  header .who b{color:#fff;font-size:13px;}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--blue);display:grid;place-items:center;font-weight:700;font-size:13px;}
  .layout{display:flex;min-height:calc(100vh - 56px);}
  .rail{width:212px;background:#fff;border-right:1px solid var(--line);padding:14px 10px;flex:0 0 auto;}
  .rail .grp{font-size:10px;letter-spacing:.8px;color:var(--muted);font-weight:800;margin:14px 8px 6px;}
  .rail a{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;color:var(--ink);text-decoration:none;font-weight:600;font-size:13.5px;cursor:pointer;margin:2px 0;}
  .rail a .ico{width:18px;text-align:center;opacity:.8;}
  .rail a:hover{background:var(--lighter);}
  .rail a.active{background:var(--navy);color:#fff;}
  .rail a .ct{margin-left:auto;font-size:11px;background:var(--lighter);color:var(--navy);border-radius:20px;padding:1px 8px;font-weight:800;}
  .rail a.active .ct{background:rgba(255,255,255,.18);color:#fff;}
  .rail a .ct.alert{background:var(--redbg);color:var(--red);}
  main{flex:1;min-width:0;padding:18px 22px 60px;}
  .crumbs{font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600;}
  .pagehead{display:flex;align-items:flex-end;gap:14px;margin-bottom:14px;}
  .pagehead h1{font-size:21px;margin:0;color:var(--navy);letter-spacing:-.3px;}
  .pagehead p{margin:2px 0 0;color:var(--muted);font-size:13px;}
  .pagehead .actions{margin-left:auto;display:flex;gap:8px;}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;box-shadow:var(--shadow);cursor:pointer;}
  .stat:hover{border-color:var(--blue);}
  .stat .n{font-size:24px;font-weight:800;color:var(--navy);letter-spacing:-.5px;}
  .stat .l{font-size:11.5px;color:var(--muted);font-weight:700;margin-top:1px;}
  .stat .b{height:3px;border-radius:3px;margin-top:8px;background:var(--line);}
  .callbanner{background:#fff;border:1px solid var(--line);border-left:5px solid var(--amber);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);}
  .callbanner .ttl{font-weight:800;color:var(--amber);font-size:14px;}
  .callbanner .sub{font-size:12.5px;color:var(--muted);margin-top:1px;}
  .callbanner .btn{margin-left:auto;}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;}
  .search{flex:1;min-width:200px;position:relative;}
  .search input{width:100%;padding:9px 11px 9px 32px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;background:#fff;}
  .search .ico{position:absolute;left:10px;top:9px;color:var(--muted);}
  .filt{display:flex;gap:6px;background:#fff;border:1px solid var(--line);border-radius:9px;padding:3px;flex-wrap:wrap;}
  .filt button{border:0;background:transparent;padding:6px 11px;border-radius:7px;font-weight:700;font-size:12.5px;color:var(--muted);cursor:pointer;white-space:nowrap;}
  .filt button.active{background:var(--navy);color:#fff;}
  .tablecard{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:auto;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:#f7f9fc;text-align:left;font-size:10.5px;letter-spacing:.5px;color:var(--muted);font-weight:800;padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;text-transform:uppercase;}
  tbody td{padding:11px 12px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle;}
  tbody tr:last-child td{border-bottom:0;}
  tbody tr[data-pi]{cursor:pointer;}
  tbody tr[data-pi]:hover{background:#f9fbfd;}
  .pi{font-weight:800;color:var(--navy);font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;}
  .po{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;color:var(--muted);}
  .pill-list{display:flex;gap:4px;flex-wrap:wrap;}
  .skupill{font-size:10.5px;background:var(--lighter);color:var(--navy);border-radius:6px;padding:2px 7px;font-weight:700;white-space:nowrap;}
  .skupill.inst{background:#d9efe0;color:#15663a;}
  .skupill.cust{background:#fde2cf;color:#8a4516;}
  .cust b{color:var(--ink);} .cust div{color:var(--muted);font-size:11.5px;}
  .maplink{color:var(--blue);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:4px;}
  .maplink:hover{text-decoration:underline;}
  .subjobs{display:flex;flex-direction:column;gap:4px;}
  .sjtag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;}
  .sjtag .ty{border-radius:5px;padding:1px 6px;font-weight:800;font-size:10px;}
  .sjtag .ty.fl{background:#fff4d6;color:#7a5800;} .sjtag .ty.wp{background:#e9e3fb;color:#5b3aa6;}
  .deliv{font-weight:700;font-size:12.5px;} .deliv.delayed{color:var(--red);} .deliv.ontime{color:var(--green);}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:20px;padding:4px 10px;white-space:nowrap;}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
  .c-pending{background:#eef1f6;color:#5a6b86;}
  .c-deliv_ontime{background:var(--greenbg);color:var(--green);}
  .c-deliv_delayed{background:var(--redbg);color:var(--red);}
  .c-created{background:var(--purplebg);color:var(--purple);}
  .c-call_na{background:var(--redbg);color:var(--red);}
  .c-scheduled{background:#e4f0fb;color:var(--blue);}
  .c-assigned{background:var(--amberbg);color:var(--amber);}
  .c-reschedule{background:var(--redbg);color:var(--red);}
  .c-onway{background:#e8f0ff;color:#2b54c2;}
  .c-atsite{background:#e9e3fb;color:#5b3aa6;}
  .c-completed{background:var(--greenbg);color:var(--green);}
  .c-partial{background:var(--tealbg);color:var(--teal);}
  .autobadge{font-size:9px;font-weight:800;letter-spacing:.5px;background:#dfeafd;color:#2b54c2;border-radius:4px;padding:1px 5px;margin-left:5px;vertical-align:middle;}
  .auditbadge{font-size:10px;font-weight:800;border-radius:5px;padding:2px 7px;}
  .auditbadge.ok{background:var(--greenbg);color:var(--green);} .auditbadge.miss{background:var(--redbg);color:var(--red);}
  .btn{border:0;border-radius:9px;padding:9px 14px;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .btn.primary{background:var(--blue);color:#fff;} .btn.navy{background:var(--navy);color:#fff;}
  .btn.green{background:var(--green);color:#fff;} .btn.ghost{background:#fff;color:var(--blue);border:1px solid var(--blue);}
  .btn.gray{background:#fff;color:var(--muted);border:1px solid var(--line);} .btn.danger{background:#fff;color:var(--red);border:1px solid #e3b4ad;}
  .btn.amber{background:var(--amber);color:#fff;}
  .btn.sm{padding:6px 11px;font-size:12px;} .btn:disabled{opacity:.45;cursor:not-allowed;}
  .scrim{position:fixed;inset:0;background:rgba(15,25,45,.42);opacity:0;pointer-events:none;transition:.2s;z-index:50;}
  .scrim.show{opacity:1;pointer-events:auto;}
  .moverlay{position:fixed;inset:0;background:rgba(15,25,45,.55);z-index:80;display:none;align-items:center;justify-content:center;padding:20px;}
  .moverlay.show{display:flex;}
  .mcard{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:92vh;overflow:auto;box-shadow:0 24px 64px rgba(0,0,0,.28);}
  .mhead{padding:18px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;position:sticky;top:0;background:#fff;z-index:1;}
  .mhead h3{font-size:16px;font-weight:800;color:var(--navy);}
  .mclose{margin-left:auto;background:none;border:0;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:0 4px;}
  .mbody{padding:20px;display:grid;gap:14px;}
  .mfoot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:#fff;}
  .mfield label{display:block;font-size:11px;font-weight:800;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
  .mfield input,.mfield select,.mfield textarea{width:100%;padding:10px 12px;border:2px solid var(--line);border-radius:9px;font-size:14px;color:var(--ink);background:#fff;font-family:inherit;}
  .mfield input:focus,.mfield select:focus,.mfield textarea:focus{outline:none;border-color:var(--blue);}
  .mfield textarea{resize:vertical;min-height:70px;}
  .mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .merr{background:var(--redbg);color:var(--red);border-radius:8px;padding:9px 12px;font-size:12.5px;font-weight:600;display:none;}
  .merr.show{display:block;}
  .skurow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-top:6px;}
  .skurow select{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;}
  .add-sku-btn{border:1px dashed var(--blue);background:#f7faff;color:var(--blue);border-radius:8px;padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer;text-align:center;margin-top:6px;}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:600px;max-width:95vw;background:#fff;box-shadow:-12px 0 40px rgba(10,20,40,.18);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:55;display:flex;flex-direction:column;}
  .drawer.show{transform:none;}
  .dhead{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px;position:sticky;top:0;background:#fff;}
  .dhead h2{margin:0;font-size:17px;color:var(--navy);}
  .dhead .sub{color:var(--muted);font-size:12px;margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .dhead .x{margin-left:auto;border:0;background:#f0f3f8;width:30px;height:30px;border-radius:8px;font-size:16px;cursor:pointer;color:var(--muted);}
  .dbody{padding:18px 20px;overflow:auto;flex:1;}
  .sec{margin-bottom:20px;}
  .sec h3{font-size:11px;letter-spacing:.6px;color:var(--muted);font-weight:800;text-transform:uppercase;margin:0 0 9px;}
  .kv{display:grid;grid-template-columns:135px 1fr;gap:7px 14px;font-size:13px;}
  .kv .k{color:var(--muted);font-weight:600;} .kv .v{font-weight:600;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:11.5px;font-weight:700;color:var(--muted);margin-bottom:5px;}
  .field input,.field select{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;background:#fff;}
  .field input:disabled{background:#f5f7fa;color:#56627a;}
  .autofill{font-size:10.5px;color:var(--green);font-weight:800;background:var(--greenbg);border-radius:5px;padding:1px 6px;margin-left:6px;}
  .note{background:var(--lighter);border-left:4px solid var(--blue);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--navy);margin:10px 0;}
  .note.red{border-color:var(--red);background:var(--redbg);color:var(--red);}
  .note.amber{border-color:var(--amber);background:var(--amberbg);color:var(--amber);}
  .note.green{border-color:var(--green);background:var(--greenbg);color:var(--green);}
  .sjcard{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;}
  .sjcard .sjh{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
  .sjcard .sjh .ty{border-radius:6px;padding:3px 9px;font-weight:800;font-size:11px;}
  .sjcard .sjh .ty.fl{background:#fff4d6;color:#7a5800;} .sjcard .sjh .ty.wp{background:#e9e3fb;color:#5b3aa6;}
  .sjcard .sjh .sk{font-weight:700;font-size:13px;} .sjcard .sjh .st{margin-left:auto;}
  .skugroup{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:12px;}
  .skugroup .gh{display:flex;align-items:center;gap:8px;margin-bottom:9px;}
  .skugroup .gh .gt{font-weight:800;font-size:13px;color:var(--navy);}
  .switch{position:relative;width:38px;height:22px;border-radius:20px;background:#cfd6e0;cursor:pointer;transition:.15s;flex:0 0 auto;margin-left:auto;}
  .switch.on{background:var(--green);}
  .switch:after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s;}
  .switch.on:after{left:18px;}
  .skurow{display:flex;gap:8px;margin-bottom:7px;align-items:center;}
  .skurow input{flex:1;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;}
  .skurow input.rolls{flex:0 0 110px;}
  .skurow .del{border:0;background:#fbeae8;color:var(--red);border-radius:8px;width:34px;height:34px;cursor:pointer;font-weight:800;flex:0 0 auto;}
  .addsku{border:1px dashed var(--blue);background:#fff;color:var(--blue);border-radius:8px;padding:7px;font-weight:700;font-size:12.5px;cursor:pointer;width:100%;}
  .rollhint{font-size:11px;color:var(--muted);margin-top:4px;}
  .slotgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;}
  .slot{border:1px solid var(--line);border-radius:9px;padding:9px;text-align:center;cursor:pointer;background:#fff;}
  .slot.on{border-color:var(--blue);background:#f3f8fd;} .slot.full{opacity:.45;cursor:not-allowed;background:#f6f7f9;}
  .slot .w{font-weight:800;font-size:12.5px;color:var(--navy);} .slot .cap{font-size:10.5px;color:var(--muted);margin-top:2px;}
  .installerlist{display:flex;flex-direction:column;gap:8px;}
  .installerrow{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;cursor:pointer;background:#fff;}
  .installerrow.on{border-color:var(--blue);background:#f3f8fd;} .installerrow.full{opacity:.5;cursor:not-allowed;}
  .installerrow .av{width:34px;height:34px;border-radius:50%;background:var(--navy);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px;}
  .installerrow .nm{font-weight:700;font-size:13.5px;} .installerrow .mt{font-size:11.5px;color:var(--muted);}
  .installerrow .load{margin-left:auto;font-size:11.5px;font-weight:800;}
  .statusmenu{display:flex;flex-wrap:wrap;gap:7px;}
  .statusmenu button{border:1px solid var(--line);background:#fff;border-radius:20px;padding:6px 12px;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--muted);}
  .statusmenu button:hover{border-color:var(--blue);color:var(--blue);}
  .statusmenu button.cur{background:var(--navy);color:#fff;border-color:var(--navy);}
  .timeline{border-left:2px solid var(--line);margin-left:6px;padding-left:16px;}
  .tl{position:relative;padding-bottom:14px;}
  .tl:before{content:"";position:absolute;left:-22px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--blue);}
  .tl.auto:before{background:#2b54c2;} .tl.manual:before{background:var(--amber);}
  .tl .tt{font-weight:700;font-size:13px;} .tl .td{font-size:11.5px;color:var(--muted);}
  .dfoot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:9px;background:#fff;flex-wrap:wrap;}
  .dfoot .btn{flex:1;justify-content:center;min-width:120px;}
  .calwrap{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;box-shadow:var(--shadow);}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .daycell{border:1px solid var(--line);border-radius:10px;padding:9px;min-height:104px;}
  .daycell .dn{font-size:11px;color:var(--muted);font-weight:700;}
  .daycell.past{opacity:.5;background:#f7f8fa;}
  .daycell .row{margin-top:6px;font-size:11px;font-weight:700;}
  .daycell .row.fl{color:#7a5800;} .daycell .row.wp{color:#5b3aa6;}
  .dow{font-size:10px;color:var(--muted);font-weight:800;text-align:center;padding-bottom:4px;letter-spacing:.5px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:11.5px;color:var(--muted);}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--navy2);color:#fff;padding:12px 20px;border-radius:30px;font-size:13.5px;opacity:0;transition:.25s;z-index:80;box-shadow:0 10px 30px rgba(0,0,0,.3);font-weight:600;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .hide{display:none!important;}
  @media(max-width:900px){.rail{display:none;}.stats{grid-template-columns:repeat(2,1fr);}.calgrid{grid-template-columns:repeat(4,1fr);}}
</style>
</head>
<body>
<header>
  <div class="logo">MD</div>
  <div><div class="t">MATERIAL DEPOT</div><div class="h">Service Manager</div></div>
  <div class="vtoggle">
    <button id="vSiteAudit">Site Audit</button>
    <button class="active" id="vInstall">Installations</button>
  </div>
  <div class="right">
    <div class="who"><b id="smName">…</b><br>Service Manager</div>
    <div class="avatar" id="signOut" title="Sign out" style="cursor:pointer">SM</div>
  </div>
</header>

<div class="layout">
  <nav class="rail" id="rail">
    <div class="grp">INSTALLATIONS</div>
    <a class="active" data-view="orders"><span class="ico">&#9638;</span>Orders<span class="ct" id="cOrders">0</span></a>
    <a data-view="calls"><span class="ico">&#9742;</span>Call Operations today<span class="ct alert" id="cCalls">0</span></a>
    <a data-view="schedule"><span class="ico">&#9719;</span>Today's installs<span class="ct" id="cToday">0</span></a>
    <a data-view="reschedule"><span class="ico">&#8635;</span>To reschedule<span class="ct" id="cResched">0</span></a>
    <a data-view="calendar"><span class="ico">&#9636;</span>Installer calendar</a>
    <div class="grp">SETUP</div>
    <a data-view="slots"><span class="ico">&#9716;</span>Slots &amp; timings</a>
    <a data-view="installers"><span class="ico">&#9673;</span>Installers</a>
  </nav>
  <main id="main"></main>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer">
  <div class="dhead">
    <div><h2 id="dwTitle">Order</h2><div class="sub" id="dwSub"></div></div>
    <button class="x" id="dwClose">&#10005;</button>
  </div>
  <div class="dbody" id="dwBody"></div>
  <div class="dfoot" id="dwFoot"></div>
</aside>

<div class="toast" id="toast"></div>

<div class="moverlay" id="addOrderOverlay">
  <div class="mcard">
    <div class="mhead">
      <h3>Add New Installation Order</h3>
      <button class="mclose" onclick="closeAddOrder()">×</button>
    </div>
    <div class="mbody">
      <div class="mrow">
        <div class="mfield">
          <label>PI Number *</label>
          <input id="ao-pi" placeholder="PI-2026-00XXX">
        </div>
        <div class="mfield">
          <label>PO Numbers</label>

        <div class="mfield">

    </div>

</div>

<script>
/* ============== SUPABASE ============== */
const SB_URL='https://jqrdfnjfxqxrazfkaofm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmRmbmpmeHF4cmF6Zmthb2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTU5NTcsImV4cCI6MjA5NjY3MTk1N30.2mvCPc0E_vDn2WaID5sEjwU4Dyj53rhevGrSPBa3__g';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
async function sbGet(q){const r=await fetch(SB_URL+'/rest/v1/'+q,{headers:H});return r.json();}
async function sbPost(t,b){const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});return r.json();}
async function sbPatch(t,id,b){await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});}
function getSession(){try{return JSON.parse(sessionStorage.getItem('md_user')||'null');}catch{return null;}}

const SESSION=getSession();
if(!SESSION||SESSION.role!=='service_mgr'){window.location.href='Login.html';}
document.getElementById('smName').textContent=SESSION?SESSION.name:'';
(function(){const av=document.getElementById('signOut');if(av&&SESSION)av.textContent=SESSION.name.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();})();

/* ============== CONFIG ============== */
const INSTALL_SKU="SVC-INSTALL-001";
const CUSTOM_WP_SKU="WP-CUST";
let SLOTS=[{id:"s1",label:"9 AM – 12 PM"},{id:"s2",label:"12 PM – 3 PM"},{id:"s3",label:"3 PM – 6 PM"}];

const today=new Date();today.setHours(0,0,0,0);
function dstr(d){return d.toISOString().slice(0,10);}
function addDays(n){const d=new Date(today);d.setDate(d.getDate()+n);return d;}

let INSTALLERS=[];
const FLOOR_DAY_CAP=1;       // jobs/installer/day
const WP_DAY_SLOTS=2;        // slots/installer/day
const slotsForWp=rolls=>(Number(rolls)>=5?2:1);

const STATUS={
  pending:{l:"Pending",c:"c-pending"},
  deliv_ontime:{l:"Delivery on time",c:"c-deliv_ontime"},
  deliv_delayed:{l:"Delivery Delayed",c:"c-deliv_delayed"},
  created:{l:"Service Created",c:"c-created"},
  call_na:{l:"Call not picked",c:"c-call_na"},
  scheduled:{l:"Site Installation Scheduled",c:"c-scheduled"},
  assigned:{l:"Site Installer Assigned",c:"c-assigned"},
  callpending:{l:"Call Pending (Installer)",c:"c-assigned"},
  reschedule:{l:"To Reschedule",c:"c-reschedule"},
  onway:{l:"On The Way",c:"c-onway"},
  atsite:{l:"At Site",c:"c-atsite"},
  partial:{l:"Partially Completed",c:"c-partial"},
  completed:{l:"Site Installation Completed",c:"c-completed"},
};
const AUTO_STATUSES=["onway","atsite","completed"];
function mapUrl(a){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(a);}

let ORDERS=[];

/* ============== SUPABASE LOAD ============== */
async function loadInstallers(){
  try{
    const rows=await sbGet('profiles?role=eq.installer&select=id,name,email');
    INSTALLERS=(Array.isArray(rows)?rows:[]).map(r=>({id:r.id,name:r.name,email:r.email,type:'flooring',zone:'',phone:''}));
  }catch(e){console.error('loadInstallers',e);}
}

async function loadOrders(){
  try{
    const rows=await sbGet('install_orders?select=*&order=created_at.desc');
    if(!Array.isArray(rows)){return;}
    ORDERS=rows.map(r=>({
      id:r.id,
      pi:r.pi||'',
      po:r.po?r.po.split(',').map(s=>s.trim()).filter(Boolean):[],
      skus:r.skus||[],
      bm:r.bm||'—',
      name:r.customer_name||'',
      phone:r.phone||'',
      addr:r.addr||'',
      matchedAudit:r.matched_audit||false,
      deliveryDate:r.delivery_date||null,
      customWp:r.custom_wp||false,
      status:r.status||'pending',
      subjobs:r.subjobs||null,
      service:r.service||null,
      log:r.log||[]
    }));
    render();
  }catch(e){console.error('loadOrders',e);}
}

/* ============== HELPERS ============== */
const $=s=>document.querySelector(s);
function fmtDateRaw(d){return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});}
const fmtDate=ds=>{if(!ds)return "—";const d=new Date(ds+"T00:00");return fmtDateRaw(d);};
const slotLabel=id=>(SLOTS.find(s=>s.id===id)||{}).label||"—";
const installerById=id=>INSTALLERS.find(a=>a.id===id);
const initials=n=>n.split(' ').map(x=>x[0]).join('').slice(0,2).toUpperCase();
function chip(st){const s=STATUS[st];return `<span class="chip ${s.c}"><span class="dot"></span>${s.l}</span>`;}
function mapLink(addr){return `<a class="maplink" href="${mapUrl(addr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span>&#128205;</span>${addr}</a>`;}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2400);}

// Ops-call window: custom WP -> 3 days prior; else -> 1 day prior
function opsCallDue(o){
  if(o.status!=="pending")return false;
  const dd=new Date(o.deliveryDate+"T00:00");
  const daysToDelivery=Math.round((dd-today)/(86400000));
  return o.customWp? daysToDelivery<=3 : daysToDelivery<=1;
}
// installer load on a date
function flLoad(id,date){let n=0;ORDERS.forEach(o=>(o.subjobs||[]).forEach(sj=>{if(sj.installer===id&&sj.date===date&&["assigned","onway","atsite","completed"].includes(sj.status))n++;}));return n;}
function wpSlotLoad(id,date){let n=0;ORDERS.forEach(o=>(o.subjobs||[]).forEach(sj=>{if(sj.installer===id&&sj.date===date&&["assigned","onway","atsite","completed"].includes(sj.status))n+=slotsForWp(sj.items[0]&&sj.items[0].rolls);}));return n;}

let activeView="orders",filterStatus="all",searchQ="",currentPI=null;

/* ============== COUNTS ============== */
function counts(){
  $("#cOrders").textContent=ORDERS.length;
  $("#cCalls").textContent=ORDERS.filter(opsCallDue).length;
  $("#cToday").textContent=ORDERS.filter(o=>(o.subjobs||[]).some(sj=>sj.date===dstr(today))).length;
  $("#cResched").textContent=ORDERS.filter(o=>o.status==="reschedule"||(o.subjobs||[]).some(sj=>sj.status==="reschedule")).length;
}

/* ============== RENDER ============== */
function render(){
  counts();
  document.querySelectorAll("#rail a").forEach(a=>a.classList.toggle("active",a.dataset.view===activeView));
  const m=$("#main");
  if(activeView==="orders")m.innerHTML=ordersView();
  else if(activeView==="calls")m.innerHTML=callsView();
  else if(activeView==="schedule")m.innerHTML=scheduleView();
  else if(activeView==="reschedule")m.innerHTML=reschedView();
  else if(activeView==="calendar")m.innerHTML=calendarView();
  else if(activeView==="slots")m.innerHTML=slotsView();
  else if(activeView==="installers")m.innerHTML=installersView();
  wire();
}
function statTile(n,l,col,key){return `<div class="stat" data-stat="${key}"><div class="n" style="color:${col}">${n}</div><div class="l">${l}</div><div class="b" style="background:${col}"></div></div>`;}

function subjobSummary(o){
  if(!o.subjobs)return '<span style="color:var(--muted)">—</span>';
  return `<div class="subjobs">`+o.subjobs.map(sj=>{
    const inst=sj.installer?installerById(sj.installer).name:"unassigned";
    return `<span class="sjtag"><span class="ty ${sj.type==='wallpaper'?'wp':'fl'}">${sj.type==='wallpaper'?'WP':'FL'}</span>${fmtDate(sj.date)} · ${inst} · ${STATUS[sj.status].l}</span>`;
  }).join("")+`</div>`;
}

function ordersView(){
  const c={};Object.keys(STATUS).forEach(k=>c[k]=0);ORDERS.forEach(o=>c[o.status]++);
  const opsDue=ORDERS.filter(opsCallDue).length;
  const stats=`<div class="stats">
    ${statTile(ORDERS.length,"Installation orders","#1F3A5F","all")}
    ${statTile(opsDue,"Ops calls due today","#9a6200","opsdue")}
    ${statTile(c.deliv_delayed,"Delivery delayed","#b3261e","deliv_delayed")}
    ${statTile(c.scheduled+c.assigned+c.partial,"Scheduled / in progress","#2E6CA8","live")}
    ${statTile(c.completed,"Completed","#1f7a3f","completed")}</div>`;
  const banner=opsDue?`<div class="callbanner"><div><div class="ttl">&#9742; ${opsDue} order${opsDue>1?'s':''} need an Operations call today</div>
    <div class="sub">Custom wallpaper: 3 days before delivery · everything else: 1 day before. Confirm delivery before creating the service.</div></div>
    <button class="btn amber" data-goto="calls">Review calls</button></div>`:"";
  const filters=["all","pending","deliv_delayed","created","scheduled","assigned","partial","completed"];
  const fbtns=filters.map(f=>`<button class="${filterStatus===f?'active':''}" data-filter="${f}">${f==="all"?"All":STATUS[f]?STATUS[f].l:f}</button>`).join("");
  const rows=ORDERS.filter(o=>{
    if(filterStatus!=="all"){
      if(filterStatus==="opsdue")return opsCallDue(o);
      if(filterStatus==="live")return ["scheduled","assigned","partial","onway","atsite"].includes(o.status);
      if(o.status!==filterStatus)return false;
    }
    if(searchQ){const q=searchQ.toLowerCase();return (o.pi+o.name+o.phone+o.bm+o.skus.map(s=>s.c).join()).toLowerCase().includes(q);}
    return true;
  }).map(o=>{
    const skupills=o.skus.map(s=>`<span class="skupill ${s.type==='install'?'inst':''} ${/CUST/.test(s.c)?'cust':''}">${s.c}</span>`).join("");
    const dd=new Date(o.deliveryDate+"T00:00");const delayed=o.status==="deliv_delayed";
    const delivCls=delayed?"delayed":(o.status==="deliv_ontime"||["created","scheduled","assigned","partial","completed"].includes(o.status)?"ontime":"");
    const auditBadge=o.matchedAudit?'<span class="auditbadge ok">Audit ✓</span>':'<span class="auditbadge miss">No audit!</span>';
    const opsFlag=opsCallDue(o)?' <span class="auditbadge miss">Call Ops</span>':'';
    return `<tr data-pi="${o.pi}">
      <td><div class="pi">${o.pi}</div><div class="po">${o.po.join(" · ")}</div></td>
      <td><div class="pill-list">${skupills}</div><div style="margin-top:4px">${auditBadge}</div></td>
      <td><div class="cust"><b>${o.name}</b><div>${o.phone}</div></div></td>
      <td style="max-width:170px">${mapLink(o.addr)}</td>
      <td><span class="deliv ${delivCls}">${fmtDate(o.deliveryDate)}</span>${opsFlag}</td>
      <td>${subjobSummary(o)}</td>
      <td>${chip(o.status)}</td></tr>`;
  }).join("");
  return `<div class="crumbs">Installations / Orders</div>
  <div class="pagehead"><div><h1>Installation orders</h1><p>Every confirmed order containing the Installation SKU (${INSTALL_SKU}). Delivery is confirmed before service creation.</p></div>
    <div class="actions"><button class="btn navy sm" onclick="openAddOrder()">+ Add New Order</button></div></div>
  ${stats}${banner}
  <div class="toolbar"><div class="search"><span class="ico">&#9906;</span><input id="q" placeholder="Search PI, customer, phone, SKU…" value="${searchQ}"/></div>
    <div class="filt">${fbtns}</div></div>
  <div class="tablecard"><table>
    <thead><tr><th>PI / PO</th><th>SKUs (audit match)</th><th>Customer</th><th>Address</th><th>Delivery date</th><th>Install sub-jobs</th><th>Status</th></tr></thead>
    <tbody>${rows||`<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:30px">No orders match.</td></tr>`}</tbody>
  </table></div>`;
}

function callsView(){
  const list=ORDERS.filter(opsCallDue);
  const rows=list.map(o=>{
    const dd=new Date(o.deliveryDate+"T00:00");const dleft=Math.round((dd-today)/86400000);
    return `<tr data-pi="${o.pi}">
      <td><div class="pi">${o.pi}</div></td>
      <td><div class="cust"><b>${o.name}</b><div>${o.phone}</div></div></td>
      <td>${o.customWp?'<span class="skupill cust">Custom wallpaper</span>':'<span class="skupill">Standard</span>'}</td>
      <td>${fmtDate(o.deliveryDate)} <span style="color:var(--muted)">(${dleft<=0?'today/overdue':'in '+dleft+'d'})</span></td>
      <td>${o.customWp?'3 days prior':'1 day prior'}</td>
      <td><button class="btn green sm" data-open="${o.pi}">Open &amp; confirm</button></td></tr>`;
  }).join("");
  return `<div class="crumbs">Installations / Call Operations today</div>
  <div class="pagehead"><div><h1>Call Operations today</h1><p>Confirm delivery status with Operations within the call window. Custom wallpaper needs the call 3 days out; everything else 1 day out.</p></div></div>
  <div class="tablecard"><table>
    <thead><tr><th>PI</th><th>Customer</th><th>Type</th><th>Delivery date</th><th>Call window</th><th></th></tr></thead>
    <tbody>${rows||`<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:30px">No Operations calls due today.</td></tr>`}</tbody>
  </table></div>`;
}

function scheduleView(){
  const items=[];
  ORDERS.forEach(o=>(o.subjobs||[]).forEach(sj=>{if(sj.date===dstr(today))items.push({o,sj});}));
  items.sort((a,b)=>(a.sj.slot||"").localeCompare(b.sj.slot||""));
  const rows=items.map(({o,sj})=>`<tr data-pi="${o.pi}">
    <td><b>${slotLabel(sj.slot)}</b></td>
    <td><span class="sjtag"><span class="ty ${sj.type==='wallpaper'?'wp':'fl'}">${sj.type==='wallpaper'?'WP':'FL'}</span></span></td>
    <td><div class="pi">${o.pi}</div></td>
    <td><div class="cust"><b>${o.name}</b><div>${o.phone}</div></div></td>
    <td style="max-width:160px">${mapLink(o.addr)}</td>
    <td>${sj.installer?installerById(sj.installer).name:'<span style="color:var(--red);font-weight:700">Unassigned</span>'}</td>
    <td>${chip(sj.status)}</td></tr>`).join("");
  return `<div class="crumbs">Installations / Today's installs</div>
  <div class="pagehead"><div><h1>Today — ${fmtDate(dstr(today))}</h1><p>Live view of today's install sub-jobs and installer progress.</p></div></div>
  <div class="tablecard"><table>
   <thead><tr><th>Slot</th><th>Type</th><th>PI</th><th>Customer</th><th>Address</th><th>Installer</th><th>Live status</th></tr></thead>
   <tbody>${rows||`<tr><td colspan="7" style="text-align:center;color:var(--muted);padding:30px">No installs scheduled today.</td></tr>`}</tbody></table></div>`;
}

function reschedView(){
  const items=[];
  ORDERS.forEach(o=>(o.subjobs||[]).forEach(sj=>{if(sj.status==="reschedule")items.push({o,sj});}));
  const rows=items.map(({o,sj})=>`<tr data-pi="${o.pi}">
    <td><div class="pi">${o.pi}</div></td>
    <td><span class="sjtag"><span class="ty ${sj.type==='wallpaper'?'wp':'fl'}">${sj.type==='wallpaper'?'WP':'FL'}</span></span></td>
    <td><div class="cust"><b>${o.name}</b><div>${o.phone}</div></div></td>
    <td>${fmtDate(sj.date)} · ${slotLabel(sj.slot)}</td>
    <td><button class="btn primary sm" data-open="${o.pi}">Call &amp; rebook</button></td></tr>`).join("");
  return `<div class="crumbs">Installations / To reschedule</div>
  <div class="pagehead"><div><h1>To reschedule</h1><p>Auto-flagged when an installer marks a sub-job To Reschedule. Call the customer and rebook.</p></div></div>
  <div class="tablecard"><table>
   <thead><tr><th>PI</th><th>Type</th><th>Customer</th><th>Was booked</th><th></th></tr></thead>
   <tbody>${rows||`<tr><td colspan="5" style="text-align:center;color:var(--muted);padding:30px">Nothing to reschedule.</td></tr>`}</tbody></table></div>`;
}

function calendarView(){
  const dows=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let cells="";const startDow=today.getDay();
  for(let i=0;i<startDow;i++)cells+=`<div></div>`;
  const flInst=INSTALLERS.filter(i=>i.type==="flooring").length;
  const wpInst=INSTALLERS.filter(i=>i.type==="wallpaper").length;
  for(let i=0;i<28;i++){
    const d=addDays(i);const ds=dstr(d);const past=d<today;
    let flUsed=0,wpUsed=0;
    ORDERS.forEach(o=>(o.subjobs||[]).forEach(sj=>{if(sj.date===ds&&["assigned","onway","atsite","completed"].includes(sj.status)){if(sj.type==="flooring")flUsed++;else wpUsed+=slotsForWp(sj.items[0]&&sj.items[0].rolls);}}));
    cells+=`<div class="daycell ${past?'past':''}">
      <div class="dn">${d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
      <div class="row fl">FL ${flUsed}/${flInst*FLOOR_DAY_CAP}</div>
      <div class="row wp">WP ${wpUsed}/${wpInst*WP_DAY_SLOTS} slots</div></div>`;
  }
  return `<div class="crumbs">Installations / Installer calendar</div>
  <div class="pagehead"><div><h1>Installer calendar</h1><p>Daily capacity by type. Flooring: 1 job per installer. Wallpaper: 2 slots per installer (≥5 rolls = 2 slots, &lt;5 rolls = 1 slot).</p></div></div>
  <div class="calwrap"><div class="calgrid">${dows.map(d=>`<div class="dow">${d}</div>`).join("")}${cells}</div>
   <div class="legend"><span>FL = flooring jobs booked / capacity · WP = wallpaper slots used / capacity.</span></div></div>`;
}

function slotsView(){
  const rows=SLOTS.map((s,i)=>`<tr><td><b>Window ${i+1}</b></td>
    <td><input class="slotedit" data-i="${i}" value="${s.label}" style="padding:8px;border:1px solid var(--line);border-radius:8px;width:200px"/></td>
    <td><button class="btn danger sm" data-delslot="${i}">Delete</button></td></tr>`).join("");
  return `<div class="crumbs">Setup / Slots &amp; timings</div>
  <div class="pagehead"><div><h1>Slots &amp; timings</h1><p>Add, rename, or delete install windows.</p></div>
   <div class="actions"><button class="btn ghost sm" id="addSlot">+ Add window</button><button class="btn navy sm" id="saveSlots">Save</button></div></div>
  <div class="tablecard"><table><thead><tr><th>Window</th><th>Timing</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

function installersView(){
  const rows=INSTALLERS.map(a=>{
    const load=a.type==="flooring"?flLoad(a.id,dstr(today))+"/"+FLOOR_DAY_CAP+" job":wpSlotLoad(a.id,dstr(today))+"/"+WP_DAY_SLOTS+" slots";
    return `<tr><td><div class="cust"><b>${a.name}</b><div>${a.phone}</div></div></td>
      <td><span class="skupill ${a.type==='wallpaper'?'cust':''}">${a.type==='wallpaper'?'Wallpaper':'Flooring'}</span></td>
      <td>${a.zone}</td>
      <td>${a.type==="flooring"?"1 job/day":"2 slots/day"}</td>
      <td>${load} today</td></tr>`;
  }).join("");
  return `<div class="crumbs">Setup / Installers</div>
  <div class="pagehead"><div><h1>Installers</h1><p>Typed installers. Flooring jobs go only to flooring installers; wallpaper only to wallpaper installers.</p></div></div>
  <div class="note">Capacity rule — Flooring: <b>1 job per installer per day</b>. Wallpaper: <b>2 slots per installer per day</b>, where an order with <b>≥5 rolls uses 2 slots</b> and <b>&lt;5 rolls uses 1 slot</b>.</div>
  <div class="tablecard"><table><thead><tr><th>Installer</th><th>Type</th><th>Zone</th><th>Capacity</th><th>Load</th></tr></thead><tbody>${rows}</tbody></table></div>`;
}

/* ============== DRAWER ============== */
function openOrder(pi){
  currentPI=pi;const o=ORDERS.find(x=>x.pi===pi);if(!o)return;
  $("#dwTitle").textContent=o.name;
  $("#dwSub").innerHTML=`${o.pi} · BM ${o.bm} ${chip(o.status)}`;
  $("#dwBody").innerHTML=drawerBody(o);
  $("#dwFoot").innerHTML=drawerFoot(o);
  $("#scrim").classList.add("show");$("#drawer").classList.add("show");
  wireDrawer(o);
}
function closeDrawer(){$("#scrim").classList.remove("show");$("#drawer").classList.remove("show");currentPI=null;}

function drawerBody(o){
  let html="";
  const skupills=o.skus.map(s=>`<span class="skupill ${s.type==='install'?'inst':''} ${/CUST/.test(s.c)?'cust':''}">${s.c} · ${s.n}</span>`).join(" ");
  html+=`<div class="sec"><h3>Order</h3><div class="kv">
    <div class="k">PI ID</div><div class="v">${o.pi}</div>
    <div class="k">PO numbers</div><div class="v">${o.po.join(", ")}</div>

  }
  html+=`</div>`;

  // ---- manual status override ----
  html+=`<div class="sec"><h3>Set status <span style="font-weight:600;color:var(--muted);text-transform:none;letter-spacing:0">— manual override</span></h3>
    <div class="note">Installer steps (On the way / At site / Completed) update automatically per sub-job. You can also set any status manually here.</div>
    <div class="statusmenu" id="statusMenu">
      ${Object.keys(STATUS).map(k=>`<button data-setstatus="${k}" class="${o.status===k?'cur':''}">${STATUS[k].l}${AUTO_STATUSES.includes(k)?'<span class="autobadge">AUTO</span>':''}</button>`).join("")}
    </div></div>`;

  // ---- SERVICE CREATION (after delivery on time) ----
  if(["deliv_ontime"].includes(o.status)){

  if(o.subjobs){
    html+=`<div class="sec"><h3>Installation sub-jobs</h3>

        <div class="kv">

}

    if(fl.length)o.subjobs.push({id:"sj_fl",type:"flooring",items:fl,date:null,slot:null,installer:null,installer_email:null,status:"created"});
    if(wp.length)o.subjobs.push({id:"sj_wp",type:"wallpaper",items:wp,date:null,slot:null,installer:null,installer_email:null,status:"created"});

  };

  // ---- per-subjob schedule ----
  document.querySelectorAll("[data-sched]").forEach(btn=>btn.onclick=()=>{
    const sj=o.subjobs.find(s=>s.id===btn.dataset.sched);
    const box=document.querySelector(`[data-schedbox="${sj.id}"]`);
    box.innerHTML=`<div class="field" style="margin-top:10px"><label>Install date (call customer on delivery day)</label><input type="date" id="sd_${sj.id}" min="${dstr(today)}" value="${dstr(addDays(1))}"></div>
      <div class="field"><label>Slot</label><div class="slotgrid" id="sg_${sj.id}"></div></div>
      <button class="btn navy sm" id="confirmSched_${sj.id}" disabled>Confirm slot</button>`;
    let pickedSlot=null;
    function renderSlots(){
      const date=document.getElementById("sd_"+sj.id).value;
      const grid=document.getElementById("sg_"+sj.id);
      const pool=INSTALLERS.filter(i=>i.type===sj.type);
      grid.innerHTML=SLOTS.map(s=>{
        // capacity check across installers of this type (window-agnostic day cap, shown per window for UX)

        if(sj.type==="flooring"){const used=pool.reduce((a,i)=>a+flLoad(i.id,date),0);free=pool.length*FLOOR_DAY_CAP-used;}
        else {const used=pool.reduce((a,i)=>a+wpSlotLoad(i.id,date),0);const need=slotsForWp(sj.items[0]&&sj.items[0].rolls);free=Math.floor((pool.length*WP_DAY_SLOTS-used)/need);}
        const full=free<=0;
        return `<div class="slot ${pickedSlot===s.id?'on':''} ${full?'full':''}" data-s="${s.id}"><div class="w">${s.label}</div><div class="cap">${full?'Full':free+' free'}</div></div>`;
      }).join("");
      grid.querySelectorAll(".slot:not(.full)").forEach(el=>el.onclick=()=>{pickedSlot=el.dataset.s;renderSlots();document.getElementById("confirmSched_"+sj.id).disabled=false;});
    }
    document.getElementById("sd_"+sj.id).onchange=()=>{pickedSlot=null;renderSlots();document.getElementById("confirmSched_"+sj.id).disabled=true;};
    renderSlots();
    document.getElementById("confirmSched_"+sj.id).onclick=async()=>{
      sj.date=document.getElementById("sd_"+sj.id).value;sj.slot=pickedSlot;sj.status="scheduled";
      syncParent(o);o.log.push({t:sj.type+" install scheduled: "+fmtDate(sj.date)+" · "+slotLabel(sj.slot),d:"Just now",by:"manual"});
      if(o.id)await sbPatch('install_orders',o.id,{status:o.status,subjobs:o.subjobs,log:o.log});
      toast("Sub-job scheduled");render();openOrder(o.pi);
    };
  });

  // ---- per-subjob assign installer ----
  document.querySelectorAll("[data-assign]").forEach(btn=>btn.onclick=()=>{
    const sj=o.subjobs.find(s=>s.id===btn.dataset.assign);
    const box=document.querySelector(`[data-assignbox="${sj.id}"]`);
    const pool=INSTALLERS.filter(i=>i.type===sj.type);
    let picked=null;
    box.innerHTML=`<div class="note" style="margin-top:10px">Only ${sj.type} installers under capacity on ${fmtDate(sj.date)} are selectable. Assigning SMSes the installer's details to the customer.</div>
      <div class="installerlist">`+pool.map(a=>{

        if(sj.type==="flooring"){const l=flLoad(a.id,sj.date);full=l>=FLOOR_DAY_CAP;loadtxt=l+"/"+FLOOR_DAY_CAP+" job";}
        else{const l=wpSlotLoad(a.id,sj.date);const need=slotsForWp(sj.items[0]&&sj.items[0].rolls);full=(l+need)>WP_DAY_SLOTS;loadtxt=l+"/"+WP_DAY_SLOTS+" slots (needs "+need+")";}
        return `<div class="installerrow ${full?'full':''}" data-i="${a.id}"><div class="av">${initials(a.name)}</div>
          <div><div class="nm">${a.name}</div><div class="mt">${a.zone} · ${a.phone}</div></div>
          <div class="load" style="color:${full?'var(--red)':'var(--green)'}">${loadtxt}${full?' · full':''}</div></div>`;
      }).join("")+`</div><button class="btn primary sm" id="confirmAssign_${sj.id}" style="margin-top:10px" disabled>Assign installer</button>`;
    box.querySelectorAll(".installerrow:not(.full)").forEach(el=>el.onclick=()=>{picked=el.dataset.i;box.querySelectorAll(".installerrow").forEach(r=>r.classList.remove("on"));el.classList.add("on");document.getElementById("confirmAssign_"+sj.id).disabled=false;});
    document.getElementById("confirmAssign_"+sj.id).onclick=async()=>{
      sj.installer=picked;sj.status="assigned";const a=installerById(picked);

      toast("Assigned "+a.name);render();openOrder(o.pi);
    };
  });

  // ---- simulate installer step per sub-job ----
  document.querySelectorAll("[data-simsj]").forEach(btn=>btn.onclick=()=>{
    const sj=o.subjobs.find(s=>s.id===btn.dataset.simsj);
    const next={assigned:"onway",onway:"atsite",atsite:"completed"}[sj.status];sj.status=next;
    const a=installerById(sj.installer);
    const msg={onway:a.name+" on the way",atsite:a.name+" at site",completed:sj.type+" installed ("+a.name+")"}[next];
    syncParent(o);o.log.push({t:msg,d:"Just now",by:"auto"});toast(STATUS[next].l+" (from installer)");render();openOrder(o.pi);
  });
}

// roll the parent status up from sub-jobs
function syncParent(o){
  if(!o.subjobs||!o.subjobs.length)return;
  const sts=o.subjobs.map(s=>s.status);
  if(sts.every(s=>s==="completed"))o.status="completed";
  else if(sts.some(s=>s==="completed")&&sts.some(s=>s!=="completed"))o.status="partial";
  else if(sts.some(s=>["onway","atsite"].includes(s)))o.status=sts.find(s=>["onway","atsite"].includes(s));
  else if(sts.some(s=>s==="reschedule"))o.status="reschedule";
  else if(sts.every(s=>s==="assigned"))o.status="assigned";
  else if(sts.some(s=>s==="assigned"))o.status="assigned";
  else if(sts.some(s=>s==="scheduled"))o.status="scheduled";
}

async function submitAddOrder(){

  const phone   = document.getElementById("ao-phone").value.trim();

  if(!pi){err.textContent="PI Number is required.";err.classList.add("show");return;}
  if(!name){err.textContent="Customer name is required.";err.classList.add("show");return;}
  if(!phone){err.textContent="Customer phone is required.";err.classList.add("show");return;}
  if(!addr){err.textContent="Address is required.";err.classList.add("show");return;}
  if(ORDERS.find(o=>o.pi===pi)){err.textContent="An order with this PI number already exists.";err.classList.add("show");return;}

  const po = poRaw ? poRaw.split(",").map(s=>s.trim()).filter(Boolean) : [];
  const skuCodes=[...document.querySelectorAll(".ao-sku-code")];
  const skuTypes=[...document.querySelectorAll(".ao-sku-type")];
  const skus=skuCodes.map((inp,i)=>inp.value.trim()).filter(Boolean).map((c,i)=>({c,n:c,type:skuTypes[i]?skuTypes[i].value:"flooring",audit:false}));
  skus.push({c:INSTALL_SKU,n:"Installation",type:"install",audit:false});

  const now=new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const logEntry={t:"Order added manually by "+SESSION.name,d:"Today "+now};

  document.getElementById("ao-submit").disabled=true;
  try{
    const saved=await sbPost('install_orders',{
      pi, po:po.join(','), skus, bm,
      customer_name:name, phone, addr,
      matched_audit:false,
      delivery_date:delivery||null,
      custom_wp:customWp,
      status:'pending',
      log:[logEntry],
      created_by_email:SESSION.email
    });
    const row=Array.isArray(saved)?saved[0]:null;
    ORDERS.unshift({
      id:row?row.id:null,
      pi,po,skus,bm,name,phone,addr,
      matchedAudit:false,
      deliveryDate:delivery||null,
      customWp,
      status:"pending",
      subjobs:null,service:null,
      log:[logEntry]
    });
    closeAddOrder();
    render();
    toast("✓ Installation order "+pi+" added");
  }catch(e){
    err.textContent="Failed to save order. Check network and try again.";err.classList.add("show");
  }
  document.getElementById("ao-submit").disabled=false;
}
document.getElementById("addOrderOverlay").addEventListener("click",e=>{if(e.target.id==="addOrderOverlay")closeAddOrder();});

Promise.all([loadInstallers(),loadOrders()]).then(()=>{setInterval(loadOrders,30000);});
</script>
</body>
</html>
