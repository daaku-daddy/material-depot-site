<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Material Depot — Site Auditor</title>
<link rel="manifest" href="/manifest_auditor.json"/>
<meta name="theme-color" content="#1F3A5F"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>

<style>
  :root{--navy:#1F3A5F;--navy2:#16294a;--blue:#2E6CA8;--yellow:#F4C20D;--ink:#1b2230;--muted:#67748a;--line:#dde3ec;--bg:#f4f6f9;--card:#fff;--lighter:#eef3f9;--green:#1f7a3f;--greenbg:#e6f3ea;--amber:#9a6200;--amberbg:#fdf2da;--red:#b3261e;--redbg:#fbeae8;--purple:#5b3aa6;--purplebg:#efeaf8;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;}
  .app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;}
  header{background:var(--navy);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;}
  header .logo{width:36px;height:36px;border-radius:9px;background:var(--yellow);color:var(--navy);font-weight:800;display:grid;place-items:center;font-size:16px;}
  header .t{font-size:10px;color:#9fb2cd;letter-spacing:1px;font-weight:700;}
  header .h{font-size:16px;font-weight:700;line-height:1.1;}
  header .hright{margin-left:auto;display:flex;align-items:center;gap:10px;}
  header .me{text-align:right;font-size:11px;color:#cdd8e8;line-height:1.25;}
  header .me b{color:#fff;font-size:13px;}
  header .rolesw{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-weight:700;font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;}
  .wrap{padding:14px 14px 90px;}
  .daystrip{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
  .daychip{flex:0 0 88px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px;text-align:center;cursor:pointer;}
  .daychip.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .daychip .dn{font-size:11px;font-weight:700;opacity:.8;}
  .daychip .dd{font-size:18px;font-weight:800;margin-top:1px;}
  .daychip .ct{font-size:10px;margin-top:2px;opacity:.75;}
  .sechead{font-size:11px;letter-spacing:.6px;color:var(--muted);font-weight:800;text-transform:uppercase;margin:14px 2px 8px;}
  .ocard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;box-shadow:0 1px 2px rgba(20,40,80,.04);cursor:pointer;}
  .ocard:active{transform:scale(.997);}
  .ocard .top{display:flex;align-items:flex-start;gap:10px;}
  .ocard .nm{font-weight:800;font-size:16px;color:var(--ink);}
  .ocard .pi{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;color:var(--muted);margin-top:1px;}
  .ocard .slot{margin-left:auto;text-align:right;}
  .ocard .slot .w{font-weight:800;font-size:13px;color:var(--navy);}
  .ocard .meta{margin-top:10px;font-size:13px;color:var(--muted);display:flex;flex-direction:column;gap:5px;}
  .ocard .meta .r{display:flex;gap:7px;align-items:flex-start;}
  .ocard .meta .ic{width:16px;text-align:center;opacity:.7;flex:0 0 auto;}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:20px;padding:4px 10px;white-space:nowrap;}
  .chip .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
  .c-scheduled{background:#e4f0fb;color:var(--blue);}
  .c-callpending{background:var(--amberbg);color:var(--amber);}
  .c-reschedule{background:var(--redbg);color:var(--red);}
  .c-onway{background:#e8f0ff;color:#2b54c2;}
  .c-atsite{background:#e9e3fb;color:#5b3aa6;}
  .c-completed{background:var(--greenbg);color:var(--green);}
  .skupill{font-size:11px;background:var(--lighter);color:var(--navy);border-radius:6px;padding:2px 8px;font-weight:700;display:inline-block;margin:2px 4px 0 0;}
  .skupill.fl{background:#fff4d6;color:#7a5800;}
  .skupill.wp{background:#e9e3fb;color:#5b3aa6;}
  .maplink{color:var(--blue);text-decoration:none;font-weight:600;}
  .empty{text-align:center;color:var(--muted);padding:46px 16px;}
  /* detail screen */
  .screen{position:fixed;inset:0;background:var(--bg);z-index:40;display:flex;flex-direction:column;max-width:520px;margin:0 auto;}
  .shead{background:var(--navy);color:#fff;padding:12px 14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;}
  .shead .back{border:0;background:rgba(255,255,255,.14);color:#fff;width:34px;height:34px;border-radius:9px;font-size:18px;cursor:pointer;}
  .shead .ti{font-weight:700;font-size:16px;} .shead .su{font-size:11px;color:#9fb2cd;}
  .sbody{flex:1;overflow:auto;padding:14px 14px 120px;}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
  .card h2{margin:0 0 10px;font-size:14px;color:var(--navy);}
  .kv{display:grid;grid-template-columns:96px 1fr;gap:7px 12px;font-size:14px;}
  .kv .k{color:var(--muted);font-weight:600;} .kv .v{font-weight:600;}
  .callbtn{display:inline-flex;align-items:center;gap:7px;background:var(--greenbg);color:var(--green);border:0;border-radius:10px;padding:9px 14px;font-weight:800;font-size:14px;text-decoration:none;}
  .stagebar{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
  .stagebar .now{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
  .stagebar .big{font-size:18px;font-weight:800;margin:4px 0 2px;}
  .stagebar .desc{font-size:13px;color:var(--muted);}
  .actions{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap;}
  .btn{border:0;border-radius:11px;padding:13px 16px;font-weight:800;font-size:15px;cursor:pointer;flex:1;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
  .btn.green{background:var(--green);color:#fff;} .btn.navy{background:var(--navy);color:#fff;} .btn.blue{background:var(--blue);color:#fff;}
  .btn.ghost{background:#fff;color:var(--blue);border:1.5px solid var(--blue);}
  .btn.warn{background:#fff;color:var(--red);border:1.5px solid #e3b4ad;}
  .btn.sm{padding:9px 12px;font-size:13px;flex:0 0 auto;}
  .btn:disabled{opacity:.45;}
  .note{background:var(--lighter);border-left:4px solid var(--blue);border-radius:8px;padding:10px 12px;font-size:12.5px;color:var(--navy);margin:10px 0;}
  .note.warn{border-color:var(--amber);background:var(--amberbg);color:var(--amber);}
  .note.red{border-color:var(--red);background:var(--redbg);color:var(--red);}
  /* jobcard */
  label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:0 0 5px;}
  input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font-size:15px;background:#fff;color:var(--ink);}
  input:disabled{background:#f3f5f8;color:#56627a;}
  textarea{resize:vertical;min-height:60px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .full{grid-column:1 / -1;}
  .prefill{font-size:10px;color:var(--green);font-weight:800;background:var(--greenbg);border-radius:5px;padding:1px 6px;margin-left:6px;}
  .roomhead{display:flex;align-items:center;justify-content:space-between;background:var(--navy);color:#fff;border-radius:10px;padding:9px 12px;margin:-2px 0 12px;}
  .roomhead .rn{font-weight:800;font-size:14px;}
  .typetog{display:flex;background:#e7edf4;border-radius:9px;padding:3px;margin-bottom:12px;}
  .typetog button{flex:1;border:0;background:transparent;padding:9px;border-radius:7px;font-weight:700;color:var(--muted);font-size:13.5px;}
  .typetog button.on{background:var(--navy);color:#fff;}
  canvas.sketch{width:100%;height:280px;border:1px solid var(--line);border-radius:10px;background:#fff;touch-action:none;display:block;}
  .sketchbar{display:flex;gap:8px;margin:8px 0;}
  .photo-row{display:flex;gap:8px;align-items:center;}
  .photo-row .btn{flex:1;justify-content:center;padding:12px 8px;font-size:14px;}
  .ds-handle{position:absolute;width:32px;height:32px;border-radius:50%;background:#3b82f6;border:3px solid #fff;cursor:grab;transform:translate(-50%,-50%);touch-action:none;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.6);}
  .addroom{width:100%;background:#fff;border:1.5px dashed var(--blue);color:var(--blue);border-radius:12px;padding:14px;font-weight:800;font-size:15px;cursor:pointer;margin-bottom:12px;}
  .footer{position:fixed;left:0;right:0;bottom:0;max-width:520px;margin:0 auto;background:#fff;border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;z-index:45;}
  .footer .btn{font-size:14px;padding:13px 8px;}
  canvas.sign{width:100%;height:170px;border:1px dashed var(--blue);border-radius:10px;background:#fff;touch-action:none;display:block;}
  .star-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .star-btn{width:38px;height:38px;border-radius:9px;border:1.5px solid var(--line);background:#fff;font-weight:800;font-size:15px;cursor:pointer;color:var(--muted);display:grid;place-items:center;}
  .star-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--navy2);color:#fff;padding:11px 18px;border-radius:30px;font-size:14px;opacity:0;transition:.25s;z-index:90;box-shadow:0 8px 24px rgba(0,0,0,.3);}
  .toast.show{opacity:1;}
  .hide{display:none!important;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">MD</div>
    <div><div class="t">MATERIAL DEPOT</div><div class="h">Site Auditor</div></div>
    <div class="hright">
      <button class="rolesw" id="switchRole" style="display:none">&#8644; Installer</button>
      <div class="me" id="signOut" style="cursor:pointer" title="Tap to sign out"><b id="meName">…</b><br>Site Auditor</div>
    </div>
  </header>
  <div class="wrap" id="listView"></div>
</div>

<!-- ORDER DETAIL SCREEN -->
<div class="screen hide" id="detailScreen">
  <div class="shead">
    <button class="back" id="detBack">&#8592;</button>
    <div><div class="ti" id="detName">Customer</div><div class="su" id="detSub"></div></div>
  </div>

</div>

<!-- JOBCARD SCREEN -->
<div class="screen hide" id="jcScreen">
  <div class="shead">
    <button class="back" id="jcBack">&#8592;</button>
    <div><div class="ti">Site Audit Job Card</div><div class="su" id="jcSub"></div></div>
    <div id="autosaveStatus" style="margin-left:auto;font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;padding-right:4px"></div>
  </div>
  <div class="sbody" id="jcBody"></div>

    <button class="btn ghost" id="jcAddRoom" style="flex:1">+ Add room</button>
    <button class="btn navy" id="jcReview" style="flex:1">Review &amp; sign</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============== CROP MODAL ============== */
const cropModal=(function(){
  let el=null,cv=null,ctx=null,img=null,scale=1,minScale=1,ox=0,oy=0,drag=false,lx=0,ly=0,ld=0,_cb=null;
  const FW=340,FH=255;
  function build(){
    el=document.createElement('div');
    el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;';
    el.innerHTML=`<div style="color:#fff;font-size:15px;font-weight:800;padding:0 0 12px">Crop & Resize</div>
      <div style="border:2px solid rgba(255,255,255,.4);border-radius:6px;overflow:hidden"><canvas id="_cvc" width="${FW}" height="${FH}" style="display:block;touch-action:none"></canvas></div>
      <div style="padding:12px;width:${FW}px">
        <div style="color:#aaa;font-size:11px;margin-bottom:5px">Drag to reposition · Pinch or slider to zoom</div>
        <input id="_cvs" type="range" min="0" max="200" value="0" style="width:100%;accent-color:#2E6CA8">
      </div>
      <div style="display:flex;gap:12px">
        <button id="_cvc2" style="border:2px solid #555;background:transparent;color:#fff;border-radius:12px;padding:12px 26px;font-weight:800;font-size:15px;cursor:pointer">Cancel</button>
        <button id="_cva" style="border:0;background:#1f7a3f;color:#fff;border-radius:12px;padding:12px 26px;font-weight:800;font-size:15px;cursor:pointer">Use Photo</button>
      </div>`;
    document.body.appendChild(el);
    cv=el.querySelector('#_cvc');ctx=cv.getContext('2d');
    el.querySelector('#_cvc2').onclick=close;
    el.querySelector('#_cva').onclick=apply;
    el.querySelector('#_cvs').oninput=e=>{scale=minScale*(1+parseFloat(e.target.value)/100);clamp();render();};
    cv.addEventListener('pointerdown',e=>{e.preventDefault();drag=true;lx=e.clientX;ly=e.clientY;});
    cv.addEventListener('pointermove',e=>{if(!drag)return;e.preventDefault();ox+=e.clientX-lx;oy+=e.clientY-ly;lx=e.clientX;ly=e.clientY;clamp();render();});
    window.addEventListener('pointerup',()=>{drag=false;},{passive:true});
    cv.addEventListener('touchstart',e=>{if(e.touches.length===2)ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
    cv.addEventListener('touchmove',e=>{if(e.touches.length!==2)return;e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);scale=Math.max(minScale,scale*(d/ld));ld=d;clamp();render();el.querySelector('#_cvs').value=Math.min(200,Math.max(0,(scale/minScale-1)*100));},{passive:false});
  }
  function clamp(){const sw=img.width*scale,sh=img.height*scale;ox=sw>=FW?Math.min(0,Math.max(FW-sw,ox)):(FW-sw)/2;oy=sh>=FH?Math.min(0,Math.max(FH-sh,oy)):(FH-sh)/2;}
  function render(){ctx.clearRect(0,0,FW,FH);ctx.drawImage(img,ox,oy,img.width*scale,img.height*scale);}
  function close(){if(el&&el.parentNode)el.parentNode.removeChild(el);el=null;}
  function apply(){const SCALE=3;const o=document.createElement('canvas');o.width=FW*SCALE;o.height=FH*SCALE;o.getContext('2d').drawImage(img,ox*SCALE,oy*SCALE,img.width*scale*SCALE,img.height*scale*SCALE);const url=o.toDataURL('image/jpeg',0.92);close();if(_cb)_cb(url);}
  return{open(dataURL,cb){_cb=cb;if(el)close();build();const i=new Image();i.onload=()=>{img=i;scale=minScale=Math.max(FW/i.width,FH/i.height);ox=(FW-i.width*scale)/2;oy=(FH-i.height*scale)/2;clamp();render();};i.src=dataURL;}};
})();

/* ============== SUPABASE + SESSION ============== */
const SB_URL='https://jqrdfnjfxqxrazfkaofm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmRmbmpmeHF4cmF6Zmthb2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTU5NTcsImV4cCI6MjA5NjY3MTk1N30.2mvCPc0E_vDn2WaID5sEjwU4Dyj53rhevGrSPBa3__g';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
async function sbGet(q){const ac=new AbortController();const tid=setTimeout(()=>ac.abort(),12000);try{const r=await fetch(SB_URL+'/rest/v1/'+q,{headers:H,signal:ac.signal});return r.json();}finally{clearTimeout(tid);}}
async function sbPatch(t,id,b){const ac=new AbortController();const tid=setTimeout(()=>ac.abort(),12000);try{const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b),signal:ac.signal});if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error(j.message||j.error||'DB error '+r.status);}}finally{clearTimeout(tid);}}
async function sbPost(t,b){const ac=new AbortController();const tid=setTimeout(()=>ac.abort(),12000);try{const r=await fetch(SB_URL+'/rest/v1/'+t,{method:'POST',headers:{...H,'Prefer':'return=minimal'},body:JSON.stringify(b),signal:ac.signal});if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error(j.message||j.error||'DB error '+r.status);}}finally{clearTimeout(tid);}}
function getSession(){try{return JSON.parse(localStorage.getItem('md_user')||'null');}catch{return null;}}

const SESSION=getSession();
if(!SESSION||!['site_auditor','auditor_installer'].includes(SESSION.role)){window.location.href='Login.html';}
history.replaceState(null,'',location.href);
window.addEventListener('popstate',()=>history.pushState(null,'',location.href));
const ME={name:SESSION?SESSION.name:'',email:SESSION?SESSION.email:'',zone:''};
document.getElementById('meName').textContent=ME.name;

/* ============== DATA ============== */
const AUDIT_SKU="SVC-AUDIT-001";
const today=new Date();today.setHours(0,0,0,0);
function dstr(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dd}`;}
function addDays(n){const d=new Date(today);d.setDate(d.getDate()+n);return d;}
const SLOTS=(function(){
  const defFL=[{id:"sf1",label:"9 AM – 12 PM"},{id:"sf2",label:"12 PM – 3 PM"},{id:"sf3",label:"3 PM – 6 PM"}];
  const defWP=[{id:"sw1",label:"9 AM – 12 PM"},{id:"sw2",label:"12 PM – 3 PM"},{id:"sw3",label:"3 PM – 6 PM"}];
  let fl=defFL,wp=defWP;
  try{const sf=localStorage.getItem('md_audit_slots_fl');const sw=localStorage.getItem('md_audit_slots_wp');if(sf)fl=JSON.parse(sf);if(sw)wp=JSON.parse(sw);}catch(e){}
  const st=[9,12,15];
  const m={s1:{label:"9 AM – 12 PM",start:9},s2:{label:"12 PM – 3 PM",start:12},s3:{label:"3 PM – 6 PM",start:15}};
  fl.forEach((s,i)=>{m[s.id]={label:s.label,start:st[i]||9};});
  wp.forEach((s,i)=>{m[s.id]={label:s.label,start:st[i]||9};});
  return m;
})();

// auditor-side statuses
const STATUS={
  scheduled:{l:"Scheduled",c:"c-scheduled"},
  callpending:{l:"Call Pending",c:"c-callpending"},
  reschedule:{l:"To Reschedule",c:"c-reschedule"},
  onway:{l:"On The Way",c:"c-onway"},
  atsite:{l:"At Site",c:"c-atsite"},
  completed:{l:"Site Audit Completed",c:"c-completed"},
};
function mapUrl(a){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(a);}

let ORDERS=[];

const AUDITOR_COLS='id,pi,po,skus,bm,customer_name,phone,addr,status,service,slot,date,auditor_id,auditor_name,auditor_email,log';
async function loadJobs(){
  try{
    const rows=await sbGet('audit_orders?auditor_email=eq.'+encodeURIComponent(ME.email)+'&select='+AUDITOR_COLS+'&status=neq.deleted&order=created_at.desc');
    if(!Array.isArray(rows)){renderList();return;}
    const existing={};ORDERS.forEach(o=>{if(o.jobcard)existing[o.pi]=o.jobcard;});
    ORDERS=rows.map(r=>({
      id:r.id,
      pi:r.pi||'',
      name:r.customer_name||'',
      phone:r.phone||'',
      addr:r.addr||'',
      bm:r.bm||'',
      date:r.date||null,
      slot:r.slot||null,
      status:r.status==='assigned'?'scheduled':r.status,
      skus:r.skus||[],
      log:r.log||[],
      jobcard:existing[r.pi]||null
    }));
    renderList();
  }catch(e){console.error('loadJobs',e);renderList();}
}
setInterval(()=>{if(!document.hidden)loadJobs();},30000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)loadJobs();});

/* ============== JOBCARD FIELD DEFINITIONS (from original, split by type) ============== */
const FLOOR_FIELDS=[{k:'area',label:'Area (sq.ft)',ph:'e.g. 180'},{k:'boxes',label:'Boxes'},{k:'skirt',label:'Skirting (nos)'},{k:'skirtH',label:'Skirting height (mm)'},{k:'lprof',label:'L-profile (nos)'},{k:'rprof',label:'R-profile / Reducer (nos)'},{k:'tprof',label:'T-profile (nos)'},{k:'corner',label:'Corner beading (nos)'}];
const WALL_FIELDS=[{k:'warea',label:'Wall area (sq.ft)'},{k:'rolls',label:'No. of rolls'},{k:'repeat',label:'Pattern repeat (mm)'},{k:'match',label:'Match type',type:'select',opts:['Straight','Offset','Free']},{k:'adh',label:'Adhesive (packs)'},{k:'primer',label:'Primer needed',type:'select',opts:['No','Yes']}];
const fieldsFor=t=>t==='wallpaper'?WALL_FIELDS:FLOOR_FIELDS;

/* ============== HELPERS ============== */
const $=s=>document.querySelector(s);
const fmtDate=ds=>{if(!ds)return "—";const d=new Date(ds+"T00:00");return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});};
function slotLabel(id){if(!id)return "—";if(SLOTS[id])return SLOTS[id].label;if(/^\d{1,2}:\d{2}$/.test(id)){const[h,m]=id.split(':').map(Number);const ap=h>=12?'PM':'AM';const h12=h===0?12:h>12?h-12:h;return h12+':'+(m<10?'0':'')+m+' '+ap;}return "—";}
function chip(st){const s=STATUS[st]||{l:st,c:'c-scheduled'};return `<span class="chip ${s.c}"><span class="dot"></span>${s.l}</span>`;}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}
function el(t,c,h){const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function imgFmt(d){return /png/i.test(d.slice(0,20))?'PNG':'JPEG';}
function compress(dataURL,maxDim,q){return new Promise(res=>{const im=new Image();if(dataURL&&dataURL.startsWith('http'))im.crossOrigin='anonymous';im.onload=()=>{try{const s=Math.min(1,maxDim/Math.max(im.width,im.height));const cw=Math.round(im.width*s),ch=Math.round(im.height*s);const o=document.createElement('canvas');o.width=cw;o.height=ch;o.getContext('2d').drawImage(im,0,0,cw,ch);res(o.toDataURL('image/jpeg',q));}catch(e){res(null);}};im.onerror=()=>res(null);im.src=dataURL;});}

// "3 hours before slot start" auto flip scheduled->callpending (simulated against now)
function autoFlip(){
  const now=new Date();
  ORDERS.forEach(o=>{
    if(o.status==="scheduled"&&o.date===dstr(today)){
      let startH;
      if(SLOTS[o.slot]){startH=SLOTS[o.slot].start;}
      else if(o.slot&&/^\d{1,2}:\d{2}$/.test(o.slot)){const[h,m]=o.slot.split(':').map(Number);startH=h+m/60;}
      else return;
      const start=new Date(today);start.setHours(Math.floor(startH),Math.round((startH%1)*60),0,0);
      if(now>=new Date(start.getTime()-3*3600*1000))o.status="callpending";
    }
  });
}

/* ============== LIST VIEW ============== */
let selDay=dstr(today);
function listView(){
  autoFlip();
  const todayStr=dstr(today);
  const days=Array.from({length:37},(_,i)=>addDays(i-30));
  const strip=days.map(d=>{const ds=dstr(d);const n=ORDERS.filter(o=>o.date===ds).length;
    const isToday=ds===todayStr;
    return `<div class="daychip ${selDay===ds?'on':''}" data-day="${ds}">
      <div class="dn">${isToday?'Today':d.toLocaleDateString('en-IN',{weekday:'short'})}</div>
      <div class="dd">${d.getDate()}</div><div class="ct">${n>0?n+(n!==1?' audits':' audit'):''}</div></div>`;}).join("");
  const list=ORDERS.filter(o=>o.date===selDay).sort((a,b)=>(a.slot||'').localeCompare(b.slot||''));
  const todo=list.filter(o=>o.status!=="completed");
  const done=list.filter(o=>o.status==="completed");
  const unscheduled=ORDERS.filter(o=>!o.date&&!['completed','reschedule'].includes(o.status));
  const card=o=>{
    const skus=o.skus.filter(s=>!s.audit).map(s=>`<span class="skupill fl">${s.c}</span>`).join("");
    return `<div class="ocard" data-pi="${o.pi}">
      <div class="top"><div><div class="nm">${o.name}</div><div class="pi">${o.pi} · BM ${o.bm}</div></div>
        <div class="slot"><div class="w">${slotLabel(o.slot)}</div>${chip(o.status)}</div></div>
      <div class="meta">
        <div class="r"><span class="ic">&#128241;</span>${o.phone}</div>
        <div class="r"><span class="ic">&#128205;</span><a class="maplink" href="${mapUrl(o.addr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${o.addr}</a></div>
        <div class="r"><span class="ic">&#128230;</span><span>${skus||'NA'}</span></div>
      </div></div>`;
  };
  const unschCard=o=>{
    const skus=o.skus.filter(s=>!s.audit).map(s=>`<span class="skupill fl">${s.c}</span>`).join("");
    return `<div class="ocard" data-pi="${o.pi}" style="border-color:#f4c20d">
      <div class="top"><div><div class="nm">${o.name}</div><div class="pi">${o.pi} · BM ${o.bm}</div></div>
        <div class="slot"><div class="w" style="color:#9a6200">Awaiting date from office</div>${chip(o.status)}</div></div>
      <div class="meta">
        <div class="r"><span class="ic">&#128241;</span>${o.phone}</div>
        <div class="r"><span class="ic">&#128205;</span><a class="maplink" href="${mapUrl(o.addr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${o.addr}</a></div>
        <div class="r"><span class="ic">&#128230;</span><span>${skus||'NA'}</span></div>
      </div></div>`;
  };
  return `<div class="daystrip">${strip}</div>
    ${unscheduled.length?`<div class="sechead" style="color:#9a6200">Awaiting schedule — no date set yet</div>${unscheduled.map(unschCard).join("")}`:''}
    <div class="sechead">${selDay===todayStr?'Today':'Jobs'} — ${fmtDate(selDay)}</div>
    ${todo.map(card).join("")||`<div class="empty">No pending audits for this day.</div>`}
    ${done.length?`<div class="sechead">Completed</div>${done.map(card).join("")}`:""}`;
}
function renderList(){$("#listView").innerHTML=listView();wireList();}
function wireList(){
  document.querySelectorAll("[data-day]").forEach(c=>c.onclick=()=>{selDay=c.dataset.day;renderList();});
  document.querySelectorAll(".ocard[data-pi]").forEach(c=>c.onclick=e=>{if(e.target.closest(".maplink"))return;openDetail(c.dataset.pi);});
  const strip=document.querySelector('.daystrip');const sel=strip&&strip.querySelector('.daychip.on');
  if(strip&&sel)strip.scrollLeft=Math.max(0,sel.offsetLeft-(strip.clientWidth/2)+(sel.offsetWidth/2));
}

function wireDetail(o){
  $("#detBack").onclick=()=>{$("#detailScreen").classList.add("hide");renderList();};
  const adv=async(st,msg,logOverride,extraLog)=>{
    const prev=o.status;o.status=st;
    const logMsg=logOverride||{callpending:"Pre-visit call started",onway:"Auditor on the way · customer confirmed",reschedule:"Customer declined → sent to SM to reschedule",atsite:"Auditor arrived at site",completed:"Site audit completed"}[st]||st;
    o.log=o.log||[];o.log.push({t:logMsg,d:new Date().toISOString(),by:"auto",who:ME.name,...(extraLog||{})});
    const dbStatus=st==='scheduled'?'assigned':st;
    if(o.id){try{await sbPatch('audit_orders',o.id,{status:dbStatus,log:o.log});}catch(e){o.status=prev;toast("Network error — try again");return;}}
    if(st==='atsite')startLocationTracking(o.pi);
    else if(st==='completed'||st==='reschedule')stopLocationTracking();
    await loadJobs();toast(msg);openDetail(o.pi);
  };
  function showRescheduleForm(){
    $("#detBody").innerHTML=`
      <div class="card">
        <h2 style="color:var(--red);margin:0 0 10px">Reschedule audit</h2>
        <p style="font-size:13.5px;color:var(--muted);margin:0 0 14px">Explain why this visit can't proceed. This will be sent to the Service Manager along with the request to rebook.</p>
        <label style="font-weight:700;font-size:13px">Reason <span style="color:var(--red)">*</span></label>
        <textarea id="reschedReason" placeholder="e.g. Customer not available, site not accessible, material not matching…" style="display:block;width:100%;box-sizing:border-box;margin-top:6px;padding:11px;border:1.5px solid var(--line);border-radius:10px;font-size:13.5px;min-height:110px;resize:vertical;font-family:inherit"></textarea>
      </div>
      <div class="actions" style="margin-top:14px">
        <button class="btn ghost" id="cancelResched">Cancel</button>
        <button class="btn warn" id="confirmResched">Confirm Reschedule</button>
      </div>`;
    $("#cancelResched").onclick=()=>openDetail(o.pi);
    $("#confirmResched").onclick=()=>{
      const reason=($("#reschedReason").value||'').trim();
      if(!reason){toast("Please enter a reason for rescheduling");return;}
      adv("reschedule","Sent to SM to reschedule","Reschedule requested: "+reason);
    };
  }
  if($("#toCall"))$("#toCall").onclick=()=>adv("callpending","Moved to Call Pending");
  if($("#custYes"))$("#custYes").onclick=()=>adv("onway","On the way — SM notified");
  if($("#atSite"))$("#atSite").onclick=()=>openArrivalModal(({photo,lat,lng})=>{
    const extra={};
    if(photo)extra.arrivalPhoto=photo;
    if(lat!=null&&lng!=null){extra.lat=lat;extra.lng=lng;}
    adv("atsite","At site — open the Job Card",null,extra);
  });
  if($("#openJC"))$("#openJC").onclick=()=>openJobCard(o);
  if($("#triggerReschedule"))$("#triggerReschedule").onclick=()=>showRescheduleForm();
  if($("#dlPdf"))$("#dlPdf").onclick=async()=>{
    const btn=$("#dlPdf");btn.disabled=true;const oldTxt=btn.textContent;btn.textContent="Building PDF…";
    if(!o.jobcard||!o.jobcard.sign||!o.jobcard.sign.img){
      const rows=await sbGet('audit_orders?id=eq.'+o.id+'&select=audit_ticked');
      if(Array.isArray(rows)&&rows[0]&&rows[0].audit_ticked&&rows[0].audit_ticked.sign)
        o.jobcard={rooms:rows[0].audit_ticked.rooms||[],sign:rows[0].audit_ticked.sign};
    }
    if(!o.jobcard||!o.jobcard.sign){toast("Job card not available");btn.disabled=false;btn.textContent=oldTxt;return;}
    let url=null;try{url=await genPDF(o);}catch(e){console.error('PDF:',e);}
    btn.disabled=false;btn.textContent=oldTxt;
    if(url){
      const fn=('SiteAudit_'+(o.name||'client')+'_'+(o.pi||'')+'.pdf').replace(/[^a-z0-9_\-\.]/gi,'_');
      const old=document.getElementById('_pdfLink');if(old)old.remove();
      const a=document.createElement('a');a.id='_pdfLink';a.href=url;a.target='_blank';a.download=fn;
      a.style.cssText='display:block;margin-top:10px;background:var(--green);color:#fff;border-radius:10px;padding:13px;font-weight:800;text-decoration:none;font-size:14px;text-align:center';
      a.textContent='📥 Tap to open PDF';
      btn.parentNode.insertBefore(a,btn.nextSibling);
    }else{toast("PDF generation failed — try again");}
  };
}

let jcOrder=null, jcRooms=[], jcSeq=0, jcSign=null, jcSignPad=null;

class Sketch{
  constructor(c){this.c=c;this.ctx=c.getContext('2d');this.strokes=[];this.cur=null;this.draw=false;this.fit();this.bind();}
  fit(){const dpr=window.devicePixelRatio||1;const r=this.c.getBoundingClientRect();if(!r.width)return;this.w=r.width;this.h=r.height;this.c.width=Math.round(r.width*dpr);this.c.height=Math.round(r.height*dpr);this.ctx.setTransform(dpr,0,0,dpr,0,0);this.render();}
  bind(){const pos=e=>{const r=this.c.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)/r.width,y:(p.clientY-r.top)/r.height};};
    this.c.addEventListener('pointerdown',e=>{e.preventDefault();this.draw=true;this.cur=[pos(e)];this.strokes.push(this.cur);});
    this.c.addEventListener('pointermove',e=>{if(!this.draw)return;e.preventDefault();this.cur.push(pos(e));this.render();});
    window.addEventListener('pointerup',()=>{const was=this.draw;this.draw=false;this.cur=null;if(was&&this.onchange)this.onchange();});}
  render(){const x=this.ctx,w=this.w,h=this.h;if(!w)return;x.clearRect(0,0,w,h);x.fillStyle='#fff';x.fillRect(0,0,w,h);const s=22;x.fillStyle='#b2b8c1';for(let yy=s;yy<h;yy+=s)for(let xx=s;xx<w;xx+=s){x.beginPath();x.arc(xx,yy,1.3,0,7);x.fill();}x.strokeStyle='#1F3A5F';x.lineWidth=2.2;x.lineJoin='round';x.lineCap='round';for(const st of this.strokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*w,Y=p.y*h;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}}
  undo(){this.strokes.pop();this.render();} clear(){this.strokes=[];this.render();}
  export(){const W=1000,H=Math.round(1000*((this.h/this.w)||0.5));const o=document.createElement('canvas');o.width=W;o.height=H;const x=o.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,W,H);const s=Math.round(22*(W/(this.w||300)));x.fillStyle='#b2b8c1';for(let yy=s;yy<H;yy+=s)for(let xx=s;xx<W;xx+=s){x.beginPath();x.arc(xx,yy,2,0,7);x.fill();}x.strokeStyle='#1F3A5F';x.lineWidth=3.2;x.lineJoin='round';x.lineCap='round';for(const st of this.strokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*W,Y=p.y*H;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}return o.toDataURL('image/jpeg',0.85);}
}
class SignPad{
  constructor(c){this.c=c;this.ctx=c.getContext('2d');this.strokes=[];this.cur=null;this.draw=false;this.fit();this.bind();}
  fit(){const dpr=window.devicePixelRatio||1;const r=this.c.getBoundingClientRect();if(!r.width)return;this.w=r.width;this.h=r.height;this.c.width=Math.round(r.width*dpr);this.c.height=Math.round(r.height*dpr);this.ctx.setTransform(dpr,0,0,dpr,0,0);this.render();}
  bind(){const pos=e=>{const r=this.c.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)/r.width,y:(p.clientY-r.top)/r.height};};
    this.c.addEventListener('pointerdown',e=>{e.preventDefault();this.draw=true;this.cur=[pos(e)];this.strokes.push(this.cur);});
    this.c.addEventListener('pointermove',e=>{if(!this.draw)return;e.preventDefault();this.cur.push(pos(e));this.render();});
    window.addEventListener('pointerup',()=>{this.draw=false;this.cur=null;});}
  render(){const x=this.ctx,w=this.w,h=this.h;if(!w)return;x.clearRect(0,0,w,h);x.fillStyle='#fff';x.fillRect(0,0,w,h);x.strokeStyle='#13294a';x.lineWidth=2.4;x.lineJoin='round';x.lineCap='round';for(const st of this.strokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*w,Y=p.y*h;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}}
  clear(){this.strokes=[];this.render();}
  isEmpty(){return this.strokes.length===0;}
  export(){const W=900,H=Math.round(900*((this.h/this.w)||0.3));const o=document.createElement('canvas');o.width=W;o.height=H;const x=o.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,W,H);x.strokeStyle='#13294a';x.lineWidth=3;x.lineJoin='round';x.lineCap='round';for(const st of this.strokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*W,Y=p.y*H;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}return o.toDataURL('image/jpeg',0.9);}
}

async function openJobCard(o){
  jcOrder=o; jcRooms=[]; jcSeq=0; jcSign=null;
  $("#jcSub").textContent=`${o.pi} · ${o.name}`;
  $("#jcScreen").classList.remove("hide");
  $("#jcFooter").classList.remove("hide");
  renderJCHeader();
  // restore from localStorage draft first, then DB jobcard (fetched on demand — not in poll)
  let rooms=null;
  try{const d=JSON.parse(localStorage.getItem('md_audit_'+o.pi)||'null');if(d&&d.rooms&&d.rooms.length)rooms=d.rooms;}catch(e){}
  if(!rooms&&!o.jobcard&&o.id){
    try{const r=await sbGet('audit_orders?id=eq.'+o.id+'&select=audit_ticked');
      if(Array.isArray(r)&&r[0]&&r[0].audit_ticked&&!Array.isArray(r[0].audit_ticked))
        o.jobcard={rooms:r[0].audit_ticked.rooms||[],sign:r[0].audit_ticked.sign||null};
    }catch(e){}
  }
  if(!rooms&&o.jobcard&&o.jobcard.rooms&&o.jobcard.rooms.length)rooms=o.jobcard.rooms;
  if(rooms&&rooms.length)rooms.forEach(r=>addRoom(r));else addRoom();
  $("#jcBack").onclick=()=>{o.jobcard={rooms:collectRooms()};autosave();$("#jcScreen").classList.add("hide");openDetail(o.pi);};
  $("#jcAddRoom").onclick=()=>{addRoom();autosave();};
  $("#jcReview").onclick=()=>reviewAndSign(o);
}

function addRoom(restore){
  const id=++jcSeq;
  const initType=restore?restore.type:(jcOrder.skus[0]?jcOrder.skus[0].type:'flooring');
  const room={id,type:initType,name:restore?restore.name:'',sku:restore?restore.sku:'',photos:restore?(restore.photos||(restore.photo?[restore.photo]:[])):[],calc:restore?Object.assign({},restore.calc):{},notes:restore?restore.notes:''};
  const card=el('div','card');card.dataset.id=id;
  const head=el('div','roomhead');head.appendChild(el('div','rn','Room / Space '+(jcRooms.length+1)));
  const rm=el('button','btn warn sm','Remove');rm.style.flex='0 0 auto';rm.onclick=()=>{jcRooms=jcRooms.filter(r=>r.id!==id);card.remove();renumber();autosave();};head.appendChild(rm);card.appendChild(head);

  // type toggle
  const tog=el('div','typetog');
  const bFl=el('button',initType==='flooring'?'on':'','Wooden Flooring');
  const bWp=el('button',initType==='wallpaper'?'on':'','Wallpaper');
  tog.appendChild(bFl);tog.appendChild(bWp);card.appendChild(tog);

  const g=el('div','grid2');
  const nW=el('div','full');nW.appendChild(el('label',null,'Room name'));const nI=el('input');nI.placeholder='e.g. Master Bedroom';nI.value=room.name;nI.oninput=()=>{room.name=nI.value;autosave();};nW.appendChild(nI);g.appendChild(nW);

function renumber(){[...document.querySelectorAll('#roomsWrap .card')].forEach((c,i)=>{const rn=c.querySelector('.rn');if(rn)rn.textContent='Room / Space '+(i+1);});}
function collectRooms(){return jcRooms.map(r=>({type:r.type,name:r.name,sku:r.sku,photos:r.photos||[],calc:Object.assign({},r.calc),notes:r.notes,sketchStrokes:r._sketch?r._sketch.strokes:[]}));}
let _autosaveTimer=null;
let _autosaveSeq=0;
let _completionWrite=null;
function autosave(){
  if(!jcOrder)return;
  const key='md_audit_'+jcOrder.pi;
  try{localStorage.setItem(key,JSON.stringify({rooms:collectRooms(),ts:Date.now()}));}catch(e){}
  showSaveStatus('saving');
  clearTimeout(_autosaveTimer);
  const mySeq=++_autosaveSeq;
  _autosaveTimer=setTimeout(async()=>{
    if(_autosaveSeq!==mySeq)return;
    if(!jcOrder||!jcOrder.id){showSaveStatus('local');return;}
    try{
      const draftRooms=collectRooms().map(({photos,...rest})=>rest);
      if(_autosaveSeq!==mySeq)return;
      await sbPatch('audit_orders',jcOrder.id,{audit_ticked:{draft:true,rooms:draftRooms}});
      // If the completion write fired while this draft was in-flight, the draft
      // may have landed after and overwritten it. Re-issue the completion write now.
      if(_completionWrite){try{await sbPatch('audit_orders',jcOrder.id,_completionWrite);}catch(e){}}
      else if(_autosaveSeq===mySeq)showSaveStatus('saved');
    }catch(e){showSaveStatus('local');}
  },3000);
}
function showSaveStatus(state){
  const s=document.getElementById('autosaveStatus');if(!s)return;
  if(state==='saving'){s.textContent='Saving…';s.style.color='var(--amber)';}
  else if(state==='saved'){s.textContent='✓ Saved';s.style.color='var(--green)';}
  else{s.textContent='✓ Saved locally';s.style.color='var(--muted)';}
}

async function compressImg(dataUrl){
  if(!dataUrl)return null;
  return new Promise(resolve=>{
    const im=new Image();
    if(dataUrl.startsWith('http'))im.crossOrigin='anonymous';

// re-render a saved room's sketch strokes into an image for the PDF
function renderSketchData(r){
  if(!r.sketchStrokes||!r.sketchStrokes.length)return null;
  const W=1000,H=500;const o=document.createElement('canvas');o.width=W;o.height=H;const x=o.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,H);const s=Math.round(22*(W/360));x.fillStyle='#b2b8c1';
  for(let yy=s;yy<H;yy+=s)for(let xx=s;xx<W;xx+=s){x.beginPath();x.arc(xx,yy,2,0,7);x.fill();}
  x.strokeStyle='#1F3A5F';x.lineWidth=3.2;x.lineJoin='round';x.lineCap='round';
  for(const st of r.sketchStrokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*W,Y=p.y*H;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}
  return o.toDataURL('image/jpeg',0.85);
}

function startLocationTracking(orderPi){
  _activeOrderPi=orderPi;

  if(_locWatchId!==null)navigator.geolocation.clearWatch(_locWatchId);
  if(_locIntervalId!==null)clearInterval(_locIntervalId);
  _locWatchId=navigator.geolocation.watchPosition(pos=>{
    const now=Date.now();

  },null,{enableHighAccuracy:false,maximumAge:300000,timeout:15000});

    },null,{timeout:5000,maximumAge:300000});

}

function _dsHomography(fromPts,toPts){
  const A=[],b=[];
  for(let i=0;i<4;i++){
    const{x:fx,y:fy}=fromPts[i],{x:tx,y:ty}=toPts[i];
    A.push([fx,fy,1,0,0,0,-fx*tx,-fy*tx]);b.push(tx);
    A.push([0,0,0,fx,fy,1,-fx*ty,-fy*ty]);b.push(ty);
  }
  const n=8,M=A.map((row,i)=>[...row,b[i]]);
  for(let c=0;c<n;c++){
    let mx=c;for(let r=c+1;r<n;r++)if(Math.abs(M[r][c])>Math.abs(M[mx][c]))mx=r;
    [M[c],M[mx]]=[M[mx],M[c]];
    for(let r=c+1;r<n;r++){if(Math.abs(M[c][c])<1e-12)continue;const f=M[r][c]/M[c][c];for(let j=c;j<=n;j++)M[r][j]-=f*M[c][j];}
  }
  const h=new Array(n).fill(0);
  for(let i=n-1;i>=0;i--){h[i]=M[i][n];for(let j=i+1;j<n;j++)h[i]-=M[i][j]*h[j];h[i]=Math.abs(M[i][i])<1e-12?0:h[i]/M[i][i];}
  return[...h,1];
}

function _dsWarp(srcCv,srcPts,outW,outH){
  const dst=[{x:0,y:0},{x:outW,y:0},{x:outW,y:outH},{x:0,y:outH}];
  const H=_dsHomography(dst,srcPts);
  const oc=document.createElement('canvas');oc.width=outW;oc.height=outH;
  const octx=oc.getContext('2d');
  const sctx=srcCv.getContext('2d');
  const sd=sctx.getImageData(0,0,srcCv.width,srcCv.height);
  const od=octx.createImageData(outW,outH);
  const sw=srcCv.width,sh=srcCv.height,src=sd.data,out=od.data;
  for(let oy=0;oy<outH;oy++){
    let nx=H[1]*oy+H[2],ny=H[4]*oy+H[5],d=H[7]*oy+H[8];
    for(let ox=0;ox<outW;ox++,nx+=H[0],ny+=H[3],d+=H[6]){
      const sx=nx/d,sy=ny/d,oi=(oy*outW+ox)*4;
      if(sx<0||sy<0||sx>=sw-1||sy>=sh-1){out[oi]=out[oi+1]=out[oi+2]=255;out[oi+3]=255;continue;}
      const x0=sx|0,y0=sy|0,fx=sx-x0,fy=sy-y0;
      for(let c=0;c<3;c++){
        const p00=src[(y0*sw+x0)*4+c],p10=src[(y0*sw+x0+1)*4+c],p01=src[(y0*sw+x0+sw)*4+c],p11=src[(y0*sw+x0+1+sw)*4+c];
        out[oi+c]=p00*(1-fx)*(1-fy)+p10*fx*(1-fy)+p01*(1-fx)*fy+p11*fx*fy;
      }
      out[oi+3]=255;
    }
  }
  octx.putImageData(od,0,0);return oc;
}

function _dsEnhanceCanvas(cv){
  const ctx=cv.getContext('2d');const d=ctx.getImageData(0,0,cv.width,cv.height);
  for(let i=0;i<d.data.length;i+=4){const g=.299*d.data[i]+.587*d.data[i+1]+.114*d.data[i+2];const e=Math.min(255,Math.max(0,(g-128)*1.6+128));d.data[i]=d.data[i+1]=d.data[i+2]=e;}
  ctx.putImageData(d,0,0);
}

      const srcCv=document.getElementById('dsSrcCanvas');
      const nw=srcCv.width,nh=srcCv.height;
      const sp=_dsCorners.map(c=>({x:c.x*nw,y:c.y*nh}));
      const d=(a,b)=>Math.sqrt((b.x-a.x)**2+(b.y-a.y)**2);
      let outW=Math.round((d(sp[0],sp[1])+d(sp[3],sp[2]))/2);
      let outH=Math.round((d(sp[0],sp[3])+d(sp[1],sp[2]))/2);
      const mx=900;if(outW>mx||outH>mx){const s=mx/Math.max(outW,outH);outW=Math.round(outW*s);outH=Math.round(outH*s);}
      const oc=_dsWarp(srcCv,sp,outW,outH);
      if(_dsEnhance)_dsEnhanceCanvas(oc);
      const dataURL=oc.toDataURL('image/jpeg',.88);
      btn.disabled=false;btn.textContent='✓ Apply Scan';
      _dsClose();_uploadPhoto(dataURL).then(u=>{if(_dsCb)_dsCb(u);}).catch(()=>{if(_dsCb)_dsCb(dataURL);});
    }catch(e){console.error(e);btn.disabled=false;btn.textContent='✓ Apply Scan';alert('Scan failed — try again.');}
  },80);
}

// ─────────────────────────────────────────────────────────────────────────────

renderList();
loadJobs();
</script>
