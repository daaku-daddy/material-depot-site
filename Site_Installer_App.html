<style>
  :root{--navy:#1F3A5F;--navy2:#16294a;--blue:#2E6CA8;--yellow:#F4C20D;--ink:#1b2230;--muted:#5b6677;--line:#d8dee7;--bg:#f1f4f8;--card:#fff;--green:#1f7a3f;--greenbg:#e6f3ea;--amber:#9a6200;--amberbg:#fdf2da;--red:#b3261e;--redbg:#fbeae8;--purple:#5b3aa6;--purplebg:#efeaf8;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:17px;}
  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);}
  header{background:var(--navy);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:30;}
  header .logo{width:38px;height:38px;border-radius:9px;background:var(--yellow);color:var(--navy);font-weight:800;display:grid;place-items:center;font-size:17px;}
  header .h{font-size:18px;font-weight:800;line-height:1.1;}
  header .hright{margin-left:auto;display:flex;align-items:center;gap:10px;}
  header .me{text-align:right;font-size:12px;color:#cdd8e8;line-height:1.25;}
  header .me b{color:#fff;font-size:14px;}
  header .rolesw{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);color:#fff;font-weight:700;font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;}
  .wrap{padding:16px 16px 40px;}
  /* big day tabs */
  .days{display:flex;gap:10px;margin-bottom:18px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .days::-webkit-scrollbar{display:none;}
  .day{flex:0 0 88px;background:#fff;border:2px solid var(--line);border-radius:14px;padding:12px 6px;text-align:center;cursor:pointer;}
  .day.on{background:var(--navy);color:#fff;border-color:var(--navy);}

  .day .dd{font-size:22px;font-weight:800;}

  .jobcard:active{transform:scale(.99);}
  .jobcard .time{font-size:14px;font-weight:800;color:var(--navy);}
  .jobcard .nm{font-size:21px;font-weight:800;margin:6px 0 2px;}

  .typetag.fl{background:#fff4d6;color:#7a5800;} .typetag.wp{background:var(--purplebg);color:var(--purple);}

  .b-scheduled{background:#e4f0fb;color:var(--blue);} .b-callpending{background:var(--amberbg);color:var(--amber);}
  .b-reschedule{background:var(--redbg);color:var(--red);} .b-onway{background:#e8f0ff;color:#2b54c2;}
  .b-atsite{background:var(--purplebg);color:var(--purple);} .b-completed{background:var(--greenbg);color:var(--green);}
  .sechead{font-size:14px;font-weight:800;color:var(--muted);margin:16px 4px 10px;text-transform:uppercase;letter-spacing:.5px;}
  .empty{text-align:center;color:var(--muted);padding:50px 16px;font-size:16px;}
  /* full screens */
  .screen{position:fixed;inset:0;background:var(--bg);z-index:40;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
  .shead{background:var(--navy);color:#fff;padding:14px;display:flex;align-items:center;gap:12px;position:sticky;top:0;}
  .shead .back{border:0;background:rgba(255,255,255,.16);color:#fff;width:40px;height:40px;border-radius:10px;font-size:22px;cursor:pointer;}
  .shead .ti{font-weight:800;font-size:18px;line-height:1.1;} .shead .su{font-size:12px;color:#9fb2cd;}
  .sbody{flex:1;overflow:auto;padding:16px 16px 130px;}
  .panel{background:#fff;border:2px solid var(--line);border-radius:18px;padding:18px;margin-bottom:16px;}
  .panel h2{margin:0 0 12px;font-size:16px;color:var(--navy);}
  .bigstage{background:#fff;border:2px solid var(--navy);border-radius:18px;padding:18px;margin-bottom:16px;text-align:center;}
  .bigstage .lbl{font-size:13px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.5px;}

  .kvbig{font-size:17px;line-height:1.6;}
  .kvbig .k{font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-top:10px;}

  .bigbtn.navy{background:var(--navy);color:#fff;} .bigbtn.amber{background:var(--amber);color:#fff;}

  .bigbtn.ghost{background:#fff;color:var(--blue);border:2px solid var(--blue);}

  .callink,.maplink{display:flex;align-items:center;gap:12px;background:var(--greenbg);color:var(--green);border-radius:14px;padding:16px;font-size:18px;font-weight:800;text-decoration:none;margin-bottom:10px;}
  .maplink{background:#e8f0ff;color:#2b54c2;}
  .callink .ic,.maplink .ic{font-size:22px;}
  .twocol{display:flex;gap:10px;}
  .twocol .bigbtn{flex:1;}
  .note{background:var(--amberbg);border-left:5px solid var(--amber);border-radius:10px;padding:13px 15px;font-size:14.5px;color:var(--amber);margin:12px 0;font-weight:600;}
  .note.blue{background:#eaf2fb;border-color:var(--blue);color:var(--navy);}
  /* audit report read-only */
  .auroom{border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
  .auroom .rh{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:8px;}
  .auroom .imgs{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .auroom .imgs img{width:46%;border-radius:10px;border:1px solid var(--line);}
  .auroom .calc{font-size:15px;line-height:1.7;}
  .auroom .calc b{color:var(--navy);}
  /* jobcard form (simple) */
  label{display:block;font-size:14px;font-weight:800;color:var(--muted);margin:0 0 7px;}
  input,textarea{width:100%;padding:15px;border:2px solid var(--line);border-radius:13px;font-size:17px;background:#fff;color:var(--ink);}
  input:disabled{background:#f3f5f8;color:#56627a;}
  textarea{resize:vertical;min-height:80px;}
  .roomblock{background:#fff;border:2px solid var(--line);border-radius:18px;padding:16px;margin-bottom:16px;}
  .roomtop{display:flex;align-items:center;justify-content:space-between;background:var(--navy);color:#fff;border-radius:12px;padding:11px 14px;margin:-2px -2px 14px;}
  .roomtop .rn{font-weight:800;font-size:17px;}
  .roomtop .rm{border:0;background:rgba(255,255,255,.18);color:#fff;border-radius:9px;padding:7px 12px;font-weight:800;font-size:14px;cursor:pointer;}
  .fieldgap{margin-bottom:14px;}
  .photobox{border:2px solid var(--line);border-radius:14px;overflow:hidden;}
  .photobox.has{border-color:var(--blue);}
  .photobox img{width:100%;display:block;}
  .photo-btns{display:flex;gap:8px;margin-top:8px;}
  .photo-btns .btn{flex:1;justify-content:center;padding:13px 8px;font-size:14px;}
  .reqstar{color:var(--red);}
  .addroom{width:100%;background:#fff;border:2px dashed var(--blue);color:var(--blue);border-radius:16px;padding:18px;font-weight:800;font-size:18px;cursor:pointer;margin-bottom:16px;}
  canvas.sign{width:100%;height:190px;border:2px dashed var(--blue);border-radius:14px;background:#fff;touch-action:none;display:block;}
  .star-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
  .star-btn{width:42px;height:42px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-weight:800;font-size:16px;cursor:pointer;color:var(--muted);display:grid;place-items:center;}
  .star-btn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  .footer{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;background:#fff;border-top:2px solid var(--line);padding:12px 16px;display:flex;gap:10px;z-index:45;}
  .footer .bigbtn{margin-top:0;padding:16px;font-size:17px;}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--navy2);color:#fff;padding:14px 22px;border-radius:30px;font-size:16px;opacity:0;transition:.25s;z-index:90;box-shadow:0 8px 24px rgba(0,0,0,.3);font-weight:700;}
  .toast.show{opacity:1;}
  .hide{display:none!important;}
</style>

<script>
/* ============== CROP MODAL ============== */
const cropModal=(function(){
  let el=null,cv=null,ctx=null,img=null,scale=1,minScale=1,ox=0,oy=0,drag=false,lx=0,ly=0,ld=0,_cb=null;
  const FW=340,FH=255;
  function build(){
    el=document.createElement('div');
    el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;';
    el.innerHTML=`<div style="color:#fff;font-size:15px;font-weight:800;padding:0 0 12px">Crop & Resize</div>
      <div style="border:2px solid rgba(255,255,255,.4);border-radius:6px;overflow:hidden"><canvas id="_cvc" width="${FW}" height="${FH}" style="display:block;touch-action:none"></canvas></div>
      <div style="padding:12px;width:${FW}px">
        <div style="color:#aaa;font-size:11px;margin-bottom:5px">Drag to reposition · Pinch or slider to zoom</div>
        <input id="_cvs" type="range" min="0" max="200" value="0" style="width:100%;accent-color:#2E6CA8">
      </div>
      <div style="display:flex;gap:12px">
        <button id="_cvc2" style="border:2px solid #555;background:transparent;color:#fff;border-radius:12px;padding:12px 26px;font-weight:800;font-size:15px;cursor:pointer">Cancel</button>
        <button id="_cva" style="border:0;background:#1f7a3f;color:#fff;border-radius:12px;padding:12px 26px;font-weight:800;font-size:15px;cursor:pointer">Use Photo</button>
      </div>`;
    document.body.appendChild(el);
    cv=el.querySelector('#_cvc');ctx=cv.getContext('2d');
    el.querySelector('#_cvc2').onclick=close;
    el.querySelector('#_cva').onclick=apply;
    el.querySelector('#_cvs').oninput=e=>{scale=minScale*(1+parseFloat(e.target.value)/100);clamp();render();};
    cv.addEventListener('pointerdown',e=>{e.preventDefault();drag=true;lx=e.clientX;ly=e.clientY;});
    cv.addEventListener('pointermove',e=>{if(!drag)return;e.preventDefault();ox+=e.clientX-lx;oy+=e.clientY-ly;lx=e.clientX;ly=e.clientY;clamp();render();});
    window.addEventListener('pointerup',()=>{drag=false;},{passive:true});
    cv.addEventListener('touchstart',e=>{if(e.touches.length===2)ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
    cv.addEventListener('touchmove',e=>{if(e.touches.length!==2)return;e.preventDefault();const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);scale=Math.max(minScale,scale*(d/ld));ld=d;clamp();render();el.querySelector('#_cvs').value=Math.min(200,Math.max(0,(scale/minScale-1)*100));},{passive:false});
  }
  function clamp(){const sw=img.width*scale,sh=img.height*scale;ox=sw>=FW?Math.min(0,Math.max(FW-sw,ox)):(FW-sw)/2;oy=sh>=FH?Math.min(0,Math.max(FH-sh,oy)):(FH-sh)/2;}
  function render(){ctx.clearRect(0,0,FW,FH);ctx.drawImage(img,ox,oy,img.width*scale,img.height*scale);}
  function close(){if(el&&el.parentNode)el.parentNode.removeChild(el);el=null;}
  function apply(){const SCALE=3;const o=document.createElement('canvas');o.width=FW*SCALE;o.height=FH*SCALE;o.getContext('2d').drawImage(img,ox*SCALE,oy*SCALE,img.width*scale*SCALE,img.height*scale*SCALE);const url=o.toDataURL('image/jpeg',0.92);close();if(_cb)_cb(url);}
  return{open(dataURL,cb){_cb=cb;if(el)close();build();const i=new Image();i.onload=()=>{img=i;scale=minScale=Math.max(FW/i.width,FH/i.height);ox=(FW-i.width*scale)/2;oy=(FH-i.height*scale)/2;clamp();render();};i.src=dataURL;}};
})();

/* ============== SUPABASE + SESSION ============== */
const SB_URL='https://jqrdfnjfxqxrazfkaofm.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcmRmbmpmeHF4cmF6Zmthb2ZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwOTU5NTcsImV4cCI6MjA5NjY3MTk1N30.2mvCPc0E_vDn2WaID5sEjwU4Dyj53rhevGrSPBa3__g';
const H={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
async function sbGet(q){const r=await fetch(SB_URL+'/rest/v1/'+q,{headers:H});return r.json();}
async function sbPatch(t,id,b){const r=await fetch(SB_URL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok){const j=await r.json().catch(()=>({}));throw new Error(j.message||j.error||'DB error '+r.status);}}
function getSession(){try{return JSON.parse(localStorage.getItem('md_user')||'null');}catch{return null;}}

const SESSION=getSession();
if(!SESSION||!['installer','auditor_installer'].includes(SESSION.role)){window.location.href='Login.html';}
history.replaceState(null,'',location.href);
window.addEventListener('popstate',()=>history.pushState(null,'',location.href));
const ME={name:SESSION?SESSION.name:'',email:SESSION?SESSION.email:'',type:'flooring',zone:''};
// fetch own profile to get installer_type
(async()=>{try{const rows=await sbGet('profiles?email=eq.'+encodeURIComponent(ME.email)+'&select=installer_type&limit=1');if(Array.isArray(rows)&&rows[0]&&rows[0].installer_type)ME.type=rows[0].installer_type;}catch(e){}})();

/* ============== DATA ============== */
const today=new Date();today.setHours(0,0,0,0);
function dstr(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dd}`;}
function addDays(n){const d=new Date(today);d.setDate(d.getDate()+n);return d;}
const SLOTS=(function(){
  const defFL=[{id:"sf1",label:"9 AM – 12 PM"},{id:"sf2",label:"12 PM – 3 PM"},{id:"sf3",label:"3 PM – 6 PM"}];
  const defWP=[{id:"sw1",label:"9 AM – 12 PM"},{id:"sw2",label:"12 PM – 3 PM"},{id:"sw3",label:"3 PM – 6 PM"}];
  let fl=defFL,wp=defWP;
  try{const sf=localStorage.getItem('md_install_slots_fl');const sw=localStorage.getItem('md_install_slots_wp');if(sf)fl=JSON.parse(sf);if(sw)wp=JSON.parse(sw);}catch(e){}
  const st=[9,12,15];
  const m={s1:{label:"9 AM – 12 PM",start:9},s2:{label:"12 PM – 3 PM",start:12},s3:{label:"3 PM – 6 PM",start:15}};
  fl.forEach((s,i)=>{m[s.id]={label:s.label,start:st[i]||9};});
  wp.forEach((s,i)=>{m[s.id]={label:s.label,start:st[i]||9};});
  return m;
})();
const STATUS={
  scheduled:{l:"Scheduled",c:"b-scheduled"},
  callpending:{l:"Call Pending",c:"b-callpending"},
  reschedule:{l:"To Reschedule",c:"b-reschedule"},
  onway:{l:"On The Way",c:"b-onway"},
  atsite:{l:"At Site",c:"b-atsite"},
  completed:{l:"Completed",c:"b-completed"},
};
function mapUrl(a){return "https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(a);}

// roll the parent install_order status up from its sub-jobs (mirrors SM dashboard syncParent)
function rollupStatus(subjobs,fallback){
  if(!subjobs||!subjobs.length)return fallback;
  const sts=subjobs.map(s=>s.status);
  if(sts.every(s=>s==="completed"))return "completed";
  if(sts.some(s=>s==="completed")&&sts.some(s=>s!=="completed"))return "partial";
  if(sts.some(s=>["onway","atsite"].includes(s)))return sts.find(s=>["onway","atsite"].includes(s));
  if(sts.some(s=>s==="reschedule"))return "reschedule";
  if(sts.some(s=>s==="callpending"))return "callpending";
  if(sts.some(s=>s==="assigned"))return "assigned";
  if(sts.some(s=>s==="scheduled"))return "scheduled";
  return fallback;
}

let JOBS=[];

async function loadJobs(){
  try{
    const rows=await sbGet('install_orders?select=*&status=not.in.(pending,deliv_ontime,deliv_delayed,deleted)&order=created_at.desc');
    if(!Array.isArray(rows)){renderList();return;}
    // Preserve existing jobcard data
    const existing={};JOBS.forEach(j=>{if(j.jobcard)existing[j.pi+'|'+j.sjId]=j.jobcard;});
    const newJobs=[];
    rows.forEach(r=>{
      (r.subjobs||[]).forEach(sj=>{
        const myAssign=(sj.assignments||[]).find(a=>a.installer_email===ME.email);
        const legacyMatch=!(sj.assignments&&sj.assignments.length)&&sj.installer_email===ME.email;
        if(myAssign||legacyMatch){
          const aDate=myAssign?(myAssign.mode==='custom'?(myAssign.dates&&myAssign.dates[0])||null:myAssign.date||null):sj.date||null;
          const aSlots=myAssign?(myAssign.slots||[]):(sj.slot?[sj.slot]:[]);
          // Primary = the assignment with primary:true, or the first one if none set
          const isPrimary=myAssign?(myAssign.primary===true||(!sj.assignments.some(a=>a.primary)&&sj.assignments.indexOf(myAssign)===0)):true;
          newJobs.push({
            id:r.id,
            sjId:sj.id,
            pi:r.pi||'',
            name:r.customer_name||'',
            phone:r.phone||'',
            addr:r.addr||'',
            bm:r.bm||'',
            type:sj.type||'flooring',
            date:aDate,
            slot:aSlots[0]||null,
            slots:aSlots,
            status:sj.status==='assigned'?'scheduled':sj.status,
            sku:(sj.items||[]).map(it=>({code:it.sku||'',skuName:it.name||it.num||'',link:it.link||'',qty:it.qty||''})),
            auditBy:(r.service&&r.service.audit_by)||null,
            audit:null,
            jobcard:existing[r.pi+'|'+sj.id]||sj.jobcard||null,
            parentLog:r.log||[],
            isPrimary
          });
        }
      });
    });
    JOBS=newJobs;
    renderList();
  }catch(e){console.error('loadJobs',e);renderList();}
}
setInterval(()=>{if(!document.hidden)loadJobs();},30000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)loadJobs();});

/* ============== HELPERS ============== */
const $=s=>document.querySelector(s);
function fmtDate(ds){if(!ds)return "—";const d=new Date(ds+"T00:00");return d.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});}
function slotLabel(id){if(!id)return "—";if(SLOTS[id])return SLOTS[id].label;if(/^\d{1,2}:\d{2}$/.test(id)){const[h,m]=id.split(':').map(Number);const ap=h>=12?'PM':'AM';const h12=h===0?12:h>12?h-12:h;return h12+':'+(m<10?'0':'')+m+' '+ap;}return "—";}
function slotsLabel(j){
  if(j.slots&&j.slots.length){const lbls=j.slots.map(s=>slotLabel(s)).filter(l=>l&&l!=='—');if(lbls.length)return lbls.join(' · ');}
  return slotLabel(j.slot)||'—';
}
function badge(st){const s=STATUS[st]||{l:st,c:"b-scheduled"};return `<span class="badge ${s.c}"><span class="dot"></span>${s.l}</span>`;}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2200);}
function el(t,c,h){const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;}
function imgFmt(d){if(/webp/i.test(d.slice(0,20)))return 'WEBP';return /png/i.test(d.slice(0,20))?'PNG':'JPEG';}
function compress(dataURL,maxDim,q){return new Promise(res=>{const im=new Image();im.onload=()=>{const s=Math.min(1,maxDim/Math.max(im.width,im.height));const cw=Math.round(im.width*s),ch=Math.round(im.height*s);const o=document.createElement('canvas');o.width=cw;o.height=ch;o.getContext('2d').drawImage(im,0,0,cw,ch);res(o.toDataURL('image/jpeg',q));};im.onerror=()=>res(null);im.src=dataURL;});}
function autoFlip(){const now=new Date();JOBS.forEach(o=>{if(o.status==="scheduled"&&o.date===dstr(today)){let startH;if(SLOTS[o.slot]){startH=SLOTS[o.slot].start;}else if(o.slot&&/^\d{1,2}:\d{2}$/.test(o.slot)){const[h,m]=o.slot.split(':').map(Number);startH=h+m/60;}else return;const start=new Date(today);start.setHours(Math.floor(startH),Math.round((startH%1)*60),0,0);if(now>=new Date(start.getTime()-3*3600*1000))o.status="callpending";}});}

/* ============== LIST ============== */
let selDay=dstr(today);
function listView(){
  autoFlip();
  if($("#meName"))$("#meName").textContent=ME.name;
  if($("#meType"))$("#meType").textContent=(ME.type==="wallpaper"?"Wallpaper":"Flooring")+" Installer";
  const todayStr=dstr(today);
  const days=Array.from({length:37},(_,i)=>addDays(i-30));
  const tabs=days.map(d=>{const ds=dstr(d);const n=JOBS.filter(j=>j.date===ds).length;
    const isToday=ds===todayStr;
    return `<div class="day ${selDay===ds?'on':''}" data-day="${ds}">
      <div class="dn">${isToday?'Today':d.toLocaleDateString('en-IN',{weekday:'short'})}</div>
      <div class="dd">${d.getDate()}</div><div class="ct">${n>0?n+(n!==1?' jobs':' job'):''}</div></div>`;}).join("");
  const list=JOBS.filter(j=>j.date===selDay).sort((a,b)=>(a.slot||'').localeCompare(b.slot||''));
  const todo=list.filter(j=>j.status!=="completed"),done=list.filter(j=>j.status==="completed");
  // Jobs with no date — completely invisible without this section
  const unscheduled=JOBS.filter(j=>!j.date&&!['completed','reschedule'].includes(j.status));
  // Past-date jobs that are still active — only shown as alert on today's view to avoid duplication
  const overdue=selDay===todayStr?JOBS.filter(j=>j.date&&j.date<todayStr&&!['completed','reschedule'].includes(j.status)):[];
  const card=j=>`<div class="jobcard" data-key="${j.pi}|${j.sjId}">
    <div class="time">${slotsLabel(j)}</div>
    <div class="nm">${j.name}</div>
    <div class="ad">${j.addr}</div>
    <span class="typetag ${j.type==='wallpaper'?'wp':'fl'}">${j.type==='wallpaper'?'Wallpaper':'Wooden Flooring'}</span>
    <div class="statusrow">${badge(j.status)}</div></div>`;
  const unschCard=j=>`<div class="jobcard" data-key="${j.pi}|${j.sjId}" style="border-color:var(--amber);">
    <div class="time" style="color:var(--amber)">No date set — tap to open</div>
    <div class="nm">${j.name}</div>
    <div class="ad">${j.addr}</div>
    <span class="typetag ${j.type==='wallpaper'?'wp':'fl'}">${j.type==='wallpaper'?'Wallpaper':'Wooden Flooring'}</span>
    <div class="statusrow">${badge(j.status)}</div></div>`;
  const overdueCard=j=>`<div class="jobcard" data-key="${j.pi}|${j.sjId}" style="border-color:var(--red);">
    <div class="time" style="color:var(--red)">Overdue — ${fmtDate(j.date)}</div>
    <div class="nm">${j.name}</div>
    <div class="ad">${j.addr}</div>
    <span class="typetag ${j.type==='wallpaper'?'wp':'fl'}">${j.type==='wallpaper'?'Wallpaper':'Wooden Flooring'}</span>
    <div class="statusrow">${badge(j.status)}</div></div>`;
  const alertSection=(unscheduled.length||overdue.length)?`
    ${overdue.length?`<div class="sechead" style="color:var(--red)">Overdue — action needed</div>${overdue.map(overdueCard).join("")}`:''}
    ${unscheduled.length?`<div class="sechead" style="color:var(--amber)">Unscheduled — awaiting date from office</div>${unscheduled.map(unschCard).join("")}`:''}
  `:'';
  return `${alertSection}<div class="days">${tabs}</div>
    <div class="sechead">${selDay===todayStr?'Today':'Jobs'} — ${fmtDate(selDay)}</div>
    ${todo.map(card).join("")||`<div class="empty">No jobs for this day.</div>`}

}
function renderList(){$("#listView").innerHTML=listView();
  document.querySelectorAll("[data-day]").forEach(c=>c.onclick=()=>{selDay=c.dataset.day;renderList();});
  document.querySelectorAll(".jobcard[data-key]").forEach(c=>c.onclick=()=>openDetail(c.dataset.key));
  const strip=document.querySelector('.days');const sel=strip&&strip.querySelector('.day.on');
  if(strip&&sel)strip.scrollLeft=Math.max(0,sel.offsetLeft-(strip.clientWidth/2)+(sel.offsetWidth/2));
}

function wireDetail(j){
  $("#detBack").onclick=()=>{$("#detailScreen").classList.add("hide");renderList();};
  let _advBusy=false;
  const adv=async(st,msg,logOverride)=>{
    if(_advBusy)return;_advBusy=true;
    document.querySelectorAll('#detBody .bigbtn').forEach(b=>b.disabled=true);
    const prev=j.status;j.status=st;
    const logMsg=logOverride||{callpending:"Pre-install call started",onway:"Installer on the way · customer confirmed",reschedule:"Customer declined → sent to office to reschedule",atsite:"Installer arrived at site",completed:"Installation completed"}[st]||st;
    if(j.id&&j.sjId){
      try{
        const parentRows=await sbGet('install_orders?id=eq.'+j.id+'&select=subjobs,log,status');
        if(Array.isArray(parentRows)&&parentRows[0]){
          const subjobs=parentRows[0].subjobs||[];
          const sj=subjobs.find(s=>s.id===j.sjId);
          if(!sj){toast("Job not found — please refresh");j.status=prev;_advBusy=false;document.querySelectorAll('#detBody .bigbtn').forEach(b=>b.disabled=false);return;}
          const dbSt=st==='scheduled'?'assigned':st;
          if(sj.assignments&&sj.assignments.length){
            const myA=sj.assignments.find(a=>a.installer_email===ME.email);
            if(myA)myA.status=dbSt;
            else sj.status=dbSt;
            // sj.status driven by the primary installer; additional installers don't affect it
            const primaryA=sj.assignments.find(a=>a.primary===true)||sj.assignments[0];
            const amPrimary=myA&&(myA.primary===true||(!sj.assignments.some(a=>a.primary)&&sj.assignments.indexOf(myA)===0));
            if(amPrimary){sj.status=dbSt;}
            // else: non-primary — their assignment is updated above but sj.status unchanged
          }else{sj.status=dbSt;}
          const freshLog=Array.isArray(parentRows[0].log)?[...parentRows[0].log]:[];
          freshLog.push({t:logMsg,d:new Date().toISOString(),by:"auto"});
          const parentStatus=rollupStatus(subjobs,parentRows[0].status||'scheduled');
          await sbPatch('install_orders',j.id,{subjobs,status:parentStatus,log:freshLog});
        }
      }catch(e){j.status=prev;_advBusy=false;document.querySelectorAll('#detBody .bigbtn').forEach(b=>b.disabled=false);toast("Network error — try again");return;}
    }
    await loadJobs();toast(msg);openDetail(j.pi+'|'+j.sjId);
  };
  function showRescheduleForm(){
    $("#detBody").innerHTML=`
      <div class="panel">
        <h2 style="color:var(--red);margin:0 0 12px">Reschedule installation</h2>
        <p style="font-size:14px;color:var(--muted);margin:0 0 16px">Explain why this visit can't proceed. This will be sent to the office to pick a new time.</p>
        <label style="font-weight:700;font-size:15px">Reason <span style="color:var(--red)">*</span></label>
        <textarea id="reschedReason" placeholder="e.g. Customer not available, site not ready, access issue, material problem…" style="display:block;width:100%;box-sizing:border-box;margin-top:8px;padding:14px;border:1.5px solid var(--line);border-radius:14px;font-size:15px;min-height:120px;resize:vertical;font-family:inherit"></textarea>
      </div>
      <button class="bigbtn red" id="confirmResched" style="margin-top:8px">Confirm Reschedule</button>
      <button class="bigbtn ghost" id="cancelResched">Cancel</button>`;
    $("#cancelResched").onclick=()=>openDetail(j.pi+'|'+j.sjId);
    $("#confirmResched").onclick=()=>{
      const reason=($("#reschedReason").value||'').trim();
      if(!reason){toast("Please enter a reason for rescheduling");return;}
      adv("reschedule","Sent to office to reschedule","Reschedule requested: "+reason);
    };
  }
  if($("#toCall"))$("#toCall").onclick=()=>adv("callpending","Now: call the customer");
  if($("#yes"))$("#yes").onclick=()=>adv("onway","Marked: on the way");
  if($("#reached"))$("#reached").onclick=()=>adv("atsite","You are at the site");
  if($("#openJC"))$("#openJC").onclick=()=>openJobCard(j);
  if($("#triggerReschedule"))$("#triggerReschedule").onclick=()=>showRescheduleForm();
  if($("#viewAuditBtn"))$("#viewAuditBtn").onclick=()=>openAudit(j);
  if($("#viewAudit"))$("#viewAudit").onclick=()=>openAudit(j);
  if($("#dlPdf"))$("#dlPdf").onclick=async()=>{
    if(!j.jobcard){
      const rows=await sbGet('install_orders?id=eq.'+j.id+'&select=subjobs');
      if(Array.isArray(rows)&&rows[0]){
        const sj=(rows[0].subjobs||[]).find(s=>s.id===j.sjId);
        if(sj&&sj.jobcard)j.jobcard=sj.jobcard;
      }
    }
    if(j.jobcard)genPDF(j);else toast("Job card not available");
  };
}

/* ============== INSTALLATION CARD (simple) ============== */
let jcJob=null, jcRooms=[], jcSeq=0, jcSignPad=null;
class SignPad{
  constructor(c){this.c=c;this.ctx=c.getContext('2d');this.strokes=[];this.cur=null;this.draw=false;this.fit();this.bind();}
  fit(){const dpr=window.devicePixelRatio||1;const r=this.c.getBoundingClientRect();if(!r.width)return;this.w=r.width;this.h=r.height;this.c.width=Math.round(r.width*dpr);this.c.height=Math.round(r.height*dpr);this.ctx.setTransform(dpr,0,0,dpr,0,0);this.render();}
  bind(){const pos=e=>{const r=this.c.getBoundingClientRect();const p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)/r.width,y:(p.clientY-r.top)/r.height};};
    this.c.addEventListener('pointerdown',e=>{e.preventDefault();this.draw=true;this.cur=[pos(e)];this.strokes.push(this.cur);});
    this.c.addEventListener('pointermove',e=>{if(!this.draw)return;e.preventDefault();this.cur.push(pos(e));this.render();});
    window.addEventListener('pointerup',()=>{this.draw=false;this.cur=null;});}
  render(){const x=this.ctx,w=this.w,h=this.h;if(!w)return;x.clearRect(0,0,w,h);x.fillStyle='#fff';x.fillRect(0,0,w,h);x.strokeStyle='#13294a';x.lineWidth=2.6;x.lineJoin='round';x.lineCap='round';for(const st of this.strokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*w,Y=p.y*h;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}}
  clear(){this.strokes=[];this.render();} isEmpty(){return this.strokes.length===0;}
  export(){const W=900,H=Math.round(900*((this.h/this.w)||0.4));const o=document.createElement('canvas');o.width=W;o.height=H;const x=o.getContext('2d');x.fillStyle='#fff';x.fillRect(0,0,W,H);x.strokeStyle='#13294a';x.lineWidth=3;x.lineJoin='round';x.lineCap='round';for(const st of this.strokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*W,Y=p.y*H;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}return o.toDataURL('image/jpeg',0.9);}
}

function openJobCard(j){
  jcJob=j;jcRooms=[];jcSeq=0;
  $("#jcSub").textContent=j.pi+" · "+j.name;
  $("#jcBody").innerHTML=`
    <div class="note blue">Fill one block per room. Each room needs a photo after installation. <span class="reqstar">★</span> = required.</div>
    <div id="roomsWrap"></div>`;
  $("#jcScreen").classList.remove("hide");
  // restore from localStorage draft first, then DB jobcard
  let rooms=null;
  try{const d=JSON.parse(localStorage.getItem('md_install_'+j.pi+'_'+j.sjId)||'null');if(d&&d.rooms&&d.rooms.length)rooms=d.rooms;}catch(e){}
  if(!rooms&&j.jobcard&&j.jobcard.rooms&&j.jobcard.rooms.length)rooms=j.jobcard.rooms;
  if(rooms&&rooms.length)rooms.forEach(r=>addRoom(r));else addRoom();
  $("#jcBack").onclick=()=>{j.jobcard={rooms:collectRooms()};autosave();$("#jcScreen").classList.add("hide");openDetail(j.pi+'|'+j.sjId);};
  $("#jcAddRoom").onclick=()=>{addRoom();autosave();};
  $("#jcDone").onclick=()=>finishCard(j);
}
function addRoom(restore){
  const id=++jcSeq;
  const room={id,name:restore?restore.name:'',sku:restore?restore.sku:(jcJob.sku[0]?jcJob.sku[0].code:''),qty:restore?restore.qty||'':(jcJob.sku[0]&&jcJob.sku[0].qty?jcJob.sku[0].qty:''),height:restore?restore.height||'':'',width:restore?restore.width||'':'',photos:restore?(restore.photos||(restore.photo?[restore.photo]:[])):[],comments:restore?restore.comments:''};
  const block=el('div','roomblock');block.dataset.id=id;
  const top=el('div','roomtop');top.appendChild(el('div','rn','Room '+(jcRooms.length+1)));

function renumber(){[...document.querySelectorAll('#roomsWrap .roomblock')].forEach((b,i)=>{const rn=b.querySelector('.rn');if(rn)rn.textContent='Room '+(i+1);});}
function collectRooms(){return jcRooms.map(r=>({name:r.name,sku:r.sku,qty:r.qty||'',height:r.height||'',width:r.width||'',photos:r.photos||[],comments:r.comments}));}
let _autosaveTimer=null;
let _autosaveSeq=0;
let _completionWrite=null;
function autosave(){
  if(!jcJob)return;
  const key='md_install_'+jcJob.pi+'_'+jcJob.sjId;
  try{localStorage.setItem(key,JSON.stringify({rooms:collectRooms(),ts:Date.now()}));}catch(e){}
  showSaveStatus('saving');
  clearTimeout(_autosaveTimer);
  const mySeq=++_autosaveSeq;
  _autosaveTimer=setTimeout(async()=>{
    if(_autosaveSeq!==mySeq)return;
    if(!jcJob||!jcJob.id||!jcJob.sjId){showSaveStatus('local');return;}
    try{
      const parentRows=await sbGet('install_orders?id=eq.'+jcJob.id+'&select=subjobs');
      if(_autosaveSeq!==mySeq)return;
      if(Array.isArray(parentRows)&&parentRows[0]){
        const subjobs=parentRows[0].subjobs||[];
        const sj=subjobs.find(s=>s.id===jcJob.sjId);
        const draftRooms=collectRooms().map(({photos,...rest})=>rest);
        if(sj)sj.jobcard={draft:true,rooms:draftRooms};
        if(_autosaveSeq!==mySeq)return;
        await sbPatch('install_orders',jcJob.id,{subjobs});
        // If completion fired while this draft was in-flight, re-issue completion now
        if(_completionWrite){try{await sbPatch('install_orders',jcJob.id,_completionWrite);}catch(e){}}
        else if(_autosaveSeq===mySeq)showSaveStatus('saved');
      }
    }catch(e){showSaveStatus('local');}
  },3000);
}
function showSaveStatus(state){
  const s=document.getElementById('autosaveStatus');if(!s)return;
  if(state==='saving'){s.textContent='Saving…';s.style.color='var(--amber)';}
  else if(state==='saved'){s.textContent='✓ Saved';s.style.color='var(--green)';}
  else{s.textContent='✓ Saved locally';s.style.color='var(--muted)';}
}

async function markAdditionalComplete(j){
  clearTimeout(_autosaveTimer);_autosaveTimer=null;_autosaveSeq++;
  j.jobcard={rooms:collectRooms()};
  const prev=j.status;j.status="completed";
  toast("Saving...");
  try{
    const parentRows=await sbGet('install_orders?id=eq.'+j.id+'&select=subjobs,log,status');
    if(Array.isArray(parentRows)&&parentRows[0]){
      const subjobs=parentRows[0].subjobs||[];
      const sj=subjobs.find(s=>s.id===j.sjId);
      if(sj){
        if(sj.assignments&&sj.assignments.length){
          const myA=sj.assignments.find(a=>a.installer_email===ME.email);
          if(myA)myA.status='completed';
          // sj.jobcard saves even for additional installers (their rooms)
          sj.jobcard=j.jobcard;
          // sj.status only changes via primary — no-op here for additional
        }else{sj.status='completed';sj.jobcard=j.jobcard;}
      }
      const freshLog=Array.isArray(parentRows[0].log)?[...parentRows[0].log]:[];
      freshLog.push({t:(j.type==='wallpaper'?'Wallpaper':'Flooring')+" installation done (additional installer: "+ME.name+")",d:new Date().toISOString(),by:"auto"});
      const parentStatus=rollupStatus(subjobs,parentRows[0].status||'completed');
      await sbPatch('install_orders',j.id,{subjobs,status:parentStatus,log:freshLog});
      try{localStorage.removeItem('md_install_'+j.pi+'_'+j.sjId);}catch(e){}
    }
  }catch(e){j.status=prev;toast("Network error — couldn't save. Try again");return;}
  await loadJobs();
  document.querySelector(".footer").classList.remove("hide");
  $("#jcScreen").classList.add("hide");
  openDetail(j.pi+'|'+j.sjId);
  toast("Your part marked complete");
}

    toast("Job finished & sent to office");
  };

async function genPDF(j){
  const {jsPDF}=window.jspdf;const doc=new jsPDF('p','pt','a4');
  const W=doc.internal.pageSize.getWidth(),H=doc.internal.pageSize.getHeight(),M=40;let y=M;
  const navy=[31,58,95],blue=[46,108,168],muted=[90,100,120];
  const rooms=j.jobcard.rooms;
  function header(){doc.setFillColor(...navy);doc.rect(M,y,34,34,'F');doc.setTextColor(255,255,255);doc.setFont('helvetica','bold');doc.setFontSize(13);doc.text('MD',M+9,y+22);doc.setFontSize(10);doc.setTextColor(...blue);doc.text('MATERIAL DEPOT',M+44,y+13);doc.setFontSize(15);doc.setTextColor(...navy);doc.text('Installation Job Card',M+44,y+30);y+=46;doc.setDrawColor(...navy);doc.setLineWidth(1.2);doc.line(M,y,W-M,y);y+=14;}
  header();
  doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',styles:{fontSize:9,cellPadding:5,lineColor:[210,216,225]},columnStyles:{0:{cellWidth:130,fontStyle:'bold',textColor:navy,fillColor:[238,243,249]}},
    body:[['Proforma Invoice No.',j.pi],['Client Name',j.name],['Client Mobile',j.phone],['Site Address',j.addr],['BM',j.bm],['Installer',ME.name],['Type',j.type==='wallpaper'?'Wallpaper':'Wooden Flooring'],['Date',fmtDate(j.date)]]});
  y=doc.lastAutoTable.finalY+10;
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...navy);doc.text('Rooms installed',M,y+4);y+=10;
  doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',headStyles:{fillColor:navy,fontSize:8.5},styles:{fontSize:8.5,cellPadding:4,lineColor:[210,216,225]},head:[['#','Room','SKU No.','Qty','H × W']],body:rooms.map((r,i)=>[String(i+1),r.name||'-',r.sku||'-',r.qty||'-',[r.height,r.width].filter(Boolean).join(' × ')||'-'])});

  for(let i=0;i<rooms.length;i++){const r=rooms[i];
    doc.addPage();y=M;header();
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...navy);doc.text('Room '+(i+1)+': '+(r.name||'-'),M,y+2);y+=14;
    const hwStr=(r.height||r.width)?(' · H×W: '+[r.height,r.width].filter(Boolean).join(' × ')):'';
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(...muted);doc.text('SKU: '+(r.sku||'-')+(r.qty?' · Qty: '+r.qty:'')+hwStr,M,y+10);y+=24;
    const rPhotos=r.photos&&r.photos.length?r.photos:(r.photo?[r.photo]:[]);
    const piw=W-2*M,pih=piw*0.6;
    for(let pi=0;pi<rPhotos.length;pi++){
      const ph=await compress(rPhotos[pi],1600,0.88);
      if(!ph)continue;
      if(y+pih+20>H-M){doc.addPage();y=M;header();}
      doc.setFontSize(8.5);doc.setTextColor(...muted);doc.text(pi===0?'Photo after installation':'Additional photo '+(pi+1),M,y);
      try{doc.addImage(ph,'JPEG',M,y+6,piw,pih);}catch(e){}
      y+=pih+18;
    }
    if(r.comments){doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(...navy);doc.text('Comments',M,y);y+=12;doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);doc.text(doc.splitTextToSize(r.comments,W-2*M),M,y);}
  }

  // consent + signature
  doc.addPage();y=M;header();
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...navy);doc.text('Client Acknowledgement',M,y+4);y+=26;
  doc.setFont('helvetica','normal');doc.setFontSize(10.5);doc.setTextColor(40,40,40);
  const consent="I confirm that the installation for the above order has been carried out by the Material Depot installer, the rooms and products listed in this Job Card have been installed, and that I am satisfied with the service provided.";
  doc.text(doc.splitTextToSize(consent,W-2*M),M,y);y+=56;
  const R=j.jobcard.sign&&j.jobcard.sign.ratings;
  if(R){
    doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(...navy);doc.text('Client Feedback',M,y);y+=14;
    doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',styles:{fontSize:9,cellPadding:4},columnStyles:{0:{cellWidth:260,fontStyle:'bold',textColor:navy,fillColor:[238,243,249]}},
      body:[['Overall installation experience',String(R.q1||'—')+' / 10'],['Site Installer rating',String(R.q2||'—')+' / 10'],['Site cleanliness after installation',String(R.q3||'—')+' / 10'],...(R.comments?[['Comments',R.comments]]:[])]});
    y=doc.lastAutoTable.finalY+12;
  }
  doc.setFontSize(10);doc.setTextColor(...muted);doc.text('Client name: '+((j.jobcard.sign&&j.jobcard.sign.name)||j.name),M,y);y+=18;doc.text('Date: '+fmtDate(j.date),M,y);
  const sigW=200,sigH=80,sx=W-M-sigW,sy=H-M-sigH-24;
  if(j.jobcard.sign&&j.jobcard.sign.img){const si=await compress(j.jobcard.sign.img,800,0.88);if(si)try{doc.addImage(si,'JPEG',sx,sy-10,sigW,sigH);}catch(e){}}
  doc.setDrawColor(...muted);doc.setLineWidth(.8);doc.line(sx,sy+sigH-6,sx+sigW,sy+sigH-6);
  doc.setFontSize(9.5);doc.setTextColor(...muted);doc.text('Client signature',sx,sy+sigH+10);

  const fn=('Installation_'+(j.name||'client')+'_'+(j.pi||'')+'.pdf').replace(/[^a-z0-9_\-\.]/gi,'_');doc.save(fn);
}

/* audit PDF for installer read-only view */
const AU_FL=[{k:'area',label:'Area (sq.ft)'},{k:'boxes',label:'Boxes'},{k:'skirt',label:'Skirting (nos)'},{k:'skirtH',label:'Skirting height (mm)'},{k:'lprof',label:'L-profile (nos)'},{k:'rprof',label:'R-profile / Reducer (nos)'},{k:'tprof',label:'T-profile (nos)'},{k:'corner',label:'Corner beading (nos)'}];
const AU_WP=[{k:'warea',label:'Wall area (sq.ft)'},{k:'rolls',label:'No. of rolls'},{k:'repeat',label:'Pattern repeat (mm)'},{k:'match',label:'Match type'},{k:'adh',label:'Adhesive (packs)'},{k:'primer',label:'Primer needed'}];
function auFieldsFor(t){return t==='wallpaper'?AU_WP:AU_FL;}
function auRenderSketch(r){
  if(!r.sketchStrokes||!r.sketchStrokes.length)return null;
  const W=1000,H=500;const c=document.createElement('canvas');c.width=W;c.height=H;const x=c.getContext('2d');
  x.fillStyle='#fff';x.fillRect(0,0,W,H);const s=Math.round(22*(W/360));x.fillStyle='#b2b8c1';
  for(let yy=s;yy<H;yy+=s)for(let xx=s;xx<W;xx+=s){x.beginPath();x.arc(xx,yy,2,0,7);x.fill();}
  x.strokeStyle='#1F3A5F';x.lineWidth=3.2;x.lineJoin='round';x.lineCap='round';
  for(const st of r.sketchStrokes){if(st.length<1)continue;x.beginPath();st.forEach((p,i)=>{const X=p.x*W,Y=p.y*H;i?x.lineTo(X,Y):x.moveTo(X,Y);});x.stroke();}
  return c.toDataURL('image/jpeg',0.85);
}
let _auTicked=null,_auOrder=null;

  header();
  doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',styles:{fontSize:9,cellPadding:5,lineColor:[210,216,225]},columnStyles:{0:{cellWidth:130,fontStyle:'bold',textColor:navy,fillColor:[238,243,249]}},
    body:[['Proforma Invoice No.',o.pi],['Client Name',o.name],['Client Mobile',o.phone],['Site Address',o.addr],['BM',o.bm],['Auditor',a.auditor||'—'],['Date',fmtDate(o.date)]]});
  y=doc.lastAutoTable.finalY+10;
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...navy);doc.text('Rooms summary',M,y+4);y+=10;
  doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',headStyles:{fillColor:navy,fontSize:8.5},styles:{fontSize:8.5,cellPadding:4,lineColor:[210,216,225]},
    head:[['#','Room','Type','SKU No.']],body:rooms.map((r,i)=>[String(i+1),r.name||'-',r.type==='wallpaper'?'Wallpaper':'Flooring',r.sku||'NA'])});
  for(let i=0;i<rooms.length;i++){const r=rooms[i];
    doc.addPage();y=M;header();
    const fields=auFieldsFor(r.type);
    doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...navy);doc.text('Room '+(i+1)+': '+(r.name||'-'),M,y+2);y+=14;
    doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(...muted);doc.text((r.type==='wallpaper'?'Wallpaper':'Wooden Flooring')+'  ·  SKU: '+(r.sku||'NA'),M,y+10);y+=24;
    doc.autoTable({startY:y,margin:{left:M,right:M},theme:'grid',headStyles:{fillColor:navy,fontSize:9},styles:{fontSize:9,cellPadding:5,lineColor:[210,216,225]},columnStyles:{0:{cellWidth:230,fontStyle:'bold',textColor:navy,fillColor:[238,243,249]}},
      head:[['Calculation','Value']],body:fields.map(f=>[f.label,(r.calc&&r.calc[f.k])||''])});
    y=doc.lastAutoTable.finalY+12;const colW=(W-2*M-12)/2;const ih=colW*0.78;
    const sketchImg=auRenderSketch(r);
    if(sketchImg){doc.setFontSize(8.5);doc.setTextColor(...muted);doc.text('2D Diagram',M,y);try{doc.addImage(sketchImg,'JPEG',M,y+6,colW,ih);}catch(e){}}
    const auPhotos=r.photos&&r.photos.length?r.photos:(r.photo?[r.photo]:[]);
    if(auPhotos.length){const p0=await compress(auPhotos[0],1600,0.88);if(p0){doc.setFontSize(8.5);doc.setTextColor(...muted);doc.text('Room Photo',M+colW+12,y);try{doc.addImage(p0,'JPEG',M+colW+12,y+6,colW,ih);}catch(e){}}}
    y+=ih+18;
    for(let ap=1;ap<auPhotos.length;ap++){const ph=await compress(auPhotos[ap],1600,0.88);if(!ph)continue;if(y+colW*0.78+20>H-M){doc.addPage();y=M;header();}doc.setFontSize(8.5);doc.setTextColor(...muted);doc.text('Room Photo '+(ap+1),M,y);const aw=W-2*M,ah=aw*0.6;try{doc.addImage(ph,'JPEG',M,y+6,aw,ah);}catch(e){}y+=ah+18;}
    if(r.notes){doc.setFont('helvetica','bold');doc.setFontSize(9.5);doc.setTextColor(...navy);doc.text('Notes',M,y);y+=12;doc.setFont('helvetica','normal');doc.setTextColor(40,40,40);doc.text(doc.splitTextToSize(r.notes,W-2*M),M,y);}
  }
  doc.addPage();y=M;header();
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...navy);doc.text('Client Acknowledgement',M,y+4);y+=26;
  doc.setFont('helvetica','normal');doc.setFontSize(10.5);doc.setTextColor(40,40,40);
  doc.text(doc.splitTextToSize("I confirm that the site audit for the above order has been carried out by the Material Depot auditor, that the rooms, measurements and details recorded in this Job Card are correct, and that I am satisfied with the service provided.",W-2*M),M,y);y+=70;
  doc.setFontSize(10);doc.setTextColor(...muted);
  doc.text('Client name: '+((a.sign&&a.sign.name)||o.name),M,y);y+=18;doc.text('Date: '+fmtDate(o.date),M,y);
  const sigW=200,sigH=80,sx=W-M-sigW,sy=H-M-sigH-24;
  if(a.sign&&a.sign.img){const si=await compress(a.sign.img,800,0.88);if(si)try{doc.addImage(si,'JPEG',sx,sy-10,sigW,sigH);}catch(e){}}
  doc.setDrawColor(...muted);doc.setLineWidth(.8);doc.line(sx,sy+sigH-6,sx+sigW,sy+sigH-6);

  doc.save(('SiteAudit_'+(o.name||'client')+'_'+(o.pi||'')+'.pdf').replace(/[^a-z0-9_\-\.]/gi,'_'));
}
